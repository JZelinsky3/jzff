<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manager Profile · {{LEAGUE_NAME}}</title>
<link rel="stylesheet" href="/pams-template/assets/css/main.css">
<style>
.profile-header {
    position: relative; z-index: 10;
    text-align: center;
    padding: 3.5rem 1.5rem 2rem;
    max-width: 1000px;
    margin: 0 auto;
}
.profile-kicker {
    font-family: var(--mono); font-weight: 700;
    font-size: .62rem; letter-spacing: .35em; text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.2rem;
}
.profile-name {
    font-family: var(--serif);
    font-size: clamp(4rem, 12vw, 9rem);
    line-height: .9; letter-spacing: -.03em;
    color: var(--cream);
    margin-bottom: 1rem;
}
.profile-name em { font-style: italic; color: var(--gold); }
.profile-tagline {
    font-family: var(--serif); font-style: italic;
    font-size: 1.25rem; line-height: 1.4;
    color: var(--cream-soft);
    max-width: 56ch; margin: 0 auto 2rem;
}

.banner-row {
    display: flex; justify-content: center; align-items: center; gap: 1.5rem;
    margin: 2rem 0 1rem;
    flex-wrap: wrap;
}
.mini-seal { width: 90px; height: 90px; }
.banner-empty {
    font-family: var(--mono);
    font-size: .65rem; letter-spacing: .25em; text-transform: uppercase;
    color: var(--cream-mute);
    padding: 1rem;
    border: 1px dashed var(--ink-line);
    border-radius: 2px;
}

/* ── Manager DNA teaser card ───────────────────────────────────
   Sits between the masthead banner and the stat strip — visible
   the moment the profile loads. Compact: barcode, archetype name,
   tagline, two trait chips, a "see full DNA" link. Cyan/magenta
   palette ties it to the Manager DNA page; locked variant (no DNA
   data on the league, i.e. the commissioner isn't on Veteran+)
   greys it out with a small upgrade hint instead of a link. */
.profile-dna {
    position: relative;
    max-width: 720px;
    margin: 1rem auto 0;
    padding: 1.1rem 1.35rem 1.1rem 2.25rem;
    background: linear-gradient(90deg, rgba(20, 23, 42, .5), rgba(20, 23, 42, .25));
    border: 1px solid rgba(79, 209, 255, .18);
    border-radius: 4px;
    overflow: hidden;
}
.profile-dna::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0; left: 0;
    width: 2px;
    background: linear-gradient(180deg, rgba(79, 209, 255, .55), rgba(255, 93, 177, .45));
}
.profile-dna.is-locked {
    border-color: rgba(122, 131, 166, .25);
    background: rgba(20, 23, 42, .25);
    opacity: 0.72;
}
.profile-dna.is-locked::before {
    background: rgba(122, 131, 166, .4);
}

.pdna-head {
    display: flex;
    align-items: baseline;
    gap: .65rem;
    margin-bottom: .6rem;
    flex-wrap: wrap;
}
.pdna-lbl {
    font-family: var(--mono);
    font-size: .54rem;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: rgba(79, 209, 255, .8);
}
.is-locked .pdna-lbl { color: var(--cream-mute); }
.pdna-tier {
    margin-left: auto;
    padding: .15rem .45rem;
    font-family: var(--mono);
    font-size: .48rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(232, 200, 137, .35);
    border-radius: 2px;
}

.pdna-barcode {
    display: flex;
    height: 14px;
    gap: 2px;
    margin-bottom: .65rem;
}
.pdna-band {
    flex: 1;
    border-radius: 1px;
}
.pdna-band.b-cyan    { background: rgba(79, 209, 255, var(--a, .8)); }
.pdna-band.b-magenta { background: rgba(255, 93, 177, var(--a, .8)); }
.pdna-band.b-lime    { background: rgba(216, 255, 93,  var(--a, .8)); }
.pdna-band.b-amber   { background: rgba(255, 203, 107, var(--a, .8)); }
.pdna-band.b-mute    { background: rgba(122, 131, 166, var(--a, .3)); }

.pdna-arch {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.4rem;
    color: #f0f2ff;
    line-height: 1.05;
    margin-bottom: .15rem;
}
.is-locked .pdna-arch { color: var(--cream-soft); }
.pdna-tagline {
    font-family: var(--mono);
    font-size: .58rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: rgba(255, 93, 177, .8);
    margin-bottom: .6rem;
}
.is-locked .pdna-tagline { color: var(--cream-mute); }

.pdna-traits {
    display: flex;
    flex-wrap: wrap;
    gap: .35rem;
    margin-bottom: .85rem;
}
.pdna-trait {
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    padding: .25rem .55rem;
    background: rgba(79, 209, 255, .05);
    border: 1px solid rgba(79, 209, 255, .22);
    border-radius: 2px;
    font-family: var(--mono);
    font-size: .52rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--cream-soft);
}
.pdna-trait::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #4fd1ff;
    flex-shrink: 0;
}

.pdna-cta {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    padding: .4rem .75rem;
    background: rgba(79, 209, 255, .04);
    border: 1px solid rgba(79, 209, 255, .22);
    border-radius: 2px;
    font-family: var(--mono);
    font-size: .58rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: rgba(181, 185, 214, .9);
    text-decoration: none;
    transition: background .2s, color .2s, border-color .2s;
}
.pdna-cta:hover {
    background: rgba(79, 209, 255, .14);
    border-color: rgba(79, 209, 255, .5);
    color: #82e0ff;
}
.pdna-cta.is-locked {
    cursor: not-allowed;
    border-color: rgba(122, 131, 166, .3);
    background: rgba(122, 131, 166, .08);
    color: var(--cream-mute);
}
.pdna-cta.is-locked:hover { background: rgba(122, 131, 166, .08); color: var(--cream-mute); }
.pdna-cta-arrow { font-family: var(--serif); font-style: italic; }

.pdna-locked-msg {
    font-family: var(--serif);
    font-style: italic;
    font-size: .85rem;
    color: var(--cream-soft);
    margin-bottom: .85rem;
    line-height: 1.45;
}

.stat-strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 0;
    border-top: 1px solid var(--ink-line);
    border-bottom: 1px solid var(--ink-line);
    margin-bottom: 3rem;
}
.strip-item {
    padding: 1.5rem 1.25rem;
    border-right: 1px solid var(--ink-line);
    text-align: center;
}
.strip-item:last-child { border-right: none; }
.strip-label {
    font-family: var(--mono); font-weight: 700;
    font-size: .55rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--cream-mute);
    margin-bottom: .5rem;
}
.strip-value {
    font-family: var(--serif); font-style: italic;
    font-size: 2rem; line-height: 1;
    color: var(--gold);
    margin-bottom: .25rem;
}
.strip-value.cream { color: var(--cream); font-style: normal; }
.strip-detail {
    font-family: var(--mono);
    font-size: .55rem; letter-spacing: .15em; text-transform: uppercase;
    color: var(--cream-mute);
}

.split-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 3rem;
}
@media (max-width: 700px) { .split-row { grid-template-columns: 1fr; } }
.split-col {
    background: rgba(26, 37, 50, .3);
    border: 1px solid var(--ink-line);
    padding: 1.5rem 1.75rem;
    position: relative;
}
.split-col::before {
    content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
    background: var(--gold);
}
.split-col.playoff::before { background: var(--rust); }
.split-label {
    font-family: var(--mono); font-weight: 700;
    font-size: .6rem; letter-spacing: .25em; text-transform: uppercase;
    color: var(--gold); margin-bottom: .8rem;
}
.split-col.playoff .split-label { color: var(--rust); }
.split-record {
    font-family: var(--serif);
    font-size: 2.5rem; line-height: 1; letter-spacing: -.02em;
    color: var(--cream);
    margin-bottom: .35rem;
}
.split-pct {
    font-family: var(--mono); font-weight: 700;
    font-size: .8rem; letter-spacing: .15em;
    color: var(--cream-soft);
    margin-bottom: .8rem;
}
.split-pf {
    font-family: var(--mono);
    font-size: .65rem; letter-spacing: .15em; text-transform: uppercase;
    color: var(--cream-mute);
}

.ledger-section { margin-bottom: 4rem; }
.season-ledger,
.h2h-table,
.top5-table {
    background: var(--ink-card);
    border: 1px solid var(--ink-line);
    overflow-x: auto;
}
.season-ledger table,
.h2h-table table,
.top5-table table {
    width: 100%; border-collapse: collapse;
    font-family: var(--sans);
}
.season-ledger thead,
.h2h-table thead,
.top5-table thead {
    background: var(--ink-soft); border-bottom: 1px solid var(--ink-line);
}
.season-ledger th,
.h2h-table th,
.top5-table th {
    padding: .85rem 1rem;
    font-family: var(--mono); font-weight: 700;
    font-size: .6rem; letter-spacing: .2em; text-transform: uppercase;
    color: var(--cream-mute);
    text-align: left; white-space: nowrap;
}
.season-ledger th.num,
.h2h-table th.num,
.top5-table th.num { text-align: right; }
.season-ledger td,
.h2h-table td,
.top5-table td {
    padding: 1rem;
    border-top: 1px solid var(--ink-line-soft);
    font-size: .9rem;
    color: var(--cream-soft);
    vertical-align: middle;
}
.season-ledger td.num,
.h2h-table td.num,
.top5-table td.num { text-align: right; font-variant-numeric: tabular-nums; }

.top5-table td.rank {
    font-family: var(--mono); font-weight: 700;
    font-size: .8rem;
    color: var(--cream-mute);
    width: 3rem;
}
.top5-table td.rank.gold { color: var(--gold); }
.top5-table td.score {
    font-family: var(--serif); font-style: italic;
    font-size: 1.25rem;
    color: var(--gold);
}
.top5-table td.opp {
    font-family: var(--serif);
    font-size: 1rem;
    color: var(--cream);
}
.top5-table td.result {
    font-family: var(--mono); font-weight: 700;
    font-size: .7rem; letter-spacing: .1em;
}
.top5-table td.result.win  { color: var(--gold); }
.top5-table td.result.loss { color: var(--rust); }
.top5-table tbody tr:hover { background: rgba(232, 200, 137, .03); }
.season-ledger td.year {
    font-family: var(--serif); font-style: italic;
    font-size: 1.25rem;
    color: var(--gold);
    width: 5rem;
}
.season-ledger td.team { color: var(--cream); font-weight: 500; }
.season-ledger td.finish {
    font-family: var(--mono); font-weight: 700;
    font-size: .75rem;
}
.season-ledger td.finish.gold { color: var(--gold); }
.season-ledger td.finish.silver { color: #c0c0c0; }
.season-ledger td.finish.bronze { color: #cd7f32; }
.h2h-table td.opp {
    font-family: var(--serif);
    font-size: 1.1rem;
    color: var(--cream);
    width: 8rem;
}
.h2h-table td.record { font-family: var(--mono); font-weight: 700; }
.h2h-table td.record.winning { color: var(--gold); }
.h2h-table td.record.losing  { color: var(--rust); }
.h2h-table td.record.even    { color: var(--cream-soft); }
.season-ledger tbody tr:hover,
.h2h-table tbody tr:hover { background: rgba(232, 200, 137, .03); }

.error-state, .loading-state {
    text-align: center;
    padding: 4rem 2rem;
}
.error-state h1, .loading-state h1 {
    font-family: var(--serif); font-style: italic;
    font-size: 3rem;
    color: var(--cream);
    margin-bottom: 1rem;
}
.error-state p, .loading-state p {
    font-family: var(--serif); font-style: italic;
    font-size: 1.2rem;
    color: var(--cream-soft);
    margin-bottom: 1.5rem;
}
.error-state a {
    font-family: var(--mono); font-weight: 700;
    font-size: .7rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--gold);
    text-decoration: none;
}
.error-state a:hover { color: var(--gold-bright); }

/* ── Mobile ── */
@media (max-width: 640px) {
    .profile-header { padding: 2.5rem 1rem 1.25rem; }
    .profile-tagline { font-size: 1.05rem; }
    .mini-seal { width: 70px; height: 70px; }

    .stat-strip { grid-template-columns: repeat(2, 1fr); }
    .strip-item {
        padding: 1.1rem .75rem;
        border-right: 1px solid var(--ink-line);
        border-bottom: 1px solid var(--ink-line);
    }
    .strip-item:nth-child(2n) { border-right: none; }
    .strip-item:nth-last-child(-n+2) { border-bottom: none; }
    .strip-value { font-size: 1.55rem; }
    .strip-label { font-size: .52rem; letter-spacing: .18em; }

    .split-record { font-size: 2rem; }
    .split-col { padding: 1.1rem 1.25rem; }

    /* Tables: keep horizontal scroll, but tighten padding + type */
    .season-ledger th,
    .h2h-table th,
    .top5-table th { padding: .65rem .6rem; font-size: .54rem; letter-spacing: .14em; }
    .season-ledger td,
    .h2h-table td,
    .top5-table td { padding: .75rem .6rem; font-size: .82rem; }
    .season-ledger td.year { font-size: 1rem; width: auto; }
    .h2h-table td.opp { font-size: .95rem; width: auto; }
    .top5-table td.score { font-size: 1rem; }
    .top5-table td.opp { font-size: .9rem; }
    .top5-table td.rank { width: 1.4rem; font-size: .7rem; }

    /* Scroll hint */
    .season-ledger,
    .h2h-table,
    .top5-table {
        background-image:
            linear-gradient(to right, var(--ink-card), var(--ink-card)),
            linear-gradient(to right, var(--ink-card), var(--ink-card)),
            linear-gradient(to right, rgba(0,0,0,.5), rgba(0,0,0,0)),
            linear-gradient(to left,  rgba(0,0,0,.5), rgba(0,0,0,0));
        background-position: left center, right center, left center, right center;
        background-repeat: no-repeat;
        background-size: 20px 100%, 20px 100%, 14px 100%, 14px 100%;
        background-attachment: local, local, scroll, scroll;
    }
}

@media (max-width: 420px) {
    .stat-strip { grid-template-columns: 1fr 1fr; }
    .profile-tagline { font-size: .95rem; }
    .strip-value { font-size: 1.4rem; }
    .season-ledger th,
    .h2h-table th,
    .top5-table th { padding: .55rem .5rem; }
    .season-ledger td,
    .h2h-table td,
    .top5-table td { padding: .65rem .5rem; font-size: .78rem; }
}
</style>
</head>
<body>

<div class="site-glow"></div>
<div class="site-grain"></div>

<div class="ticker">
    <div class="ticker-track">
        <div class="ticker-group" id="ticker-1">
            <span class="ticker-item"><span class="ticker-star">★</span> {{LEAGUE_NAME_UPPER}} · MANAGER PROFILE</span>
        </div>
        <div class="ticker-group" id="ticker-2">
            <span class="ticker-item"><span class="ticker-star">★</span> {{LEAGUE_NAME_UPPER}} · MANAGER PROFILE</span>
        </div>
    </div>
</div>

<nav id="site-nav"
     data-page="manager-detail"
     data-chapter="CH. II · PROFILE"
     data-back-label="← Managers"
     data-back-href="managers/"
     data-title-id="nav-name"
     data-title-href="managers/"></nav>
<script src="/pams-template/assets/js/nav.js"></script>

<div id="profile-body">
    <div class="loading-state">
        <h1>Loading…</h1>
        <p>Fetching the records.</p>
    </div>
</div>

<footer class="site-footer">
    <span>Built by <em>jzFF</em> · {{LEAGUE_ABBR}} · Since {{LEAGUE_FOUNDED_ROMAN}}</span><a href="/login?mode=signup" style="display:block;padding:1.1rem 0 0;font-family:var(--mono);font-size:.9rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);text-decoration:none;">Start your own league</a>
</footer>


<script>

function getUserIdFromURL() {
    return new URLSearchParams(window.location.search).get('id');
}

function toRoman(num) {
    const romans = [
        [1000, 'M'], [900, 'CM'], [500, 'D'], [400, 'CD'],
        [100, 'C'], [90, 'XC'], [50, 'L'], [40, 'XL'],
        [10, 'X'], [9, 'IX'], [5, 'V'], [4, 'IV'], [1, 'I'],
    ];
    let result = '';
    for (const [v, s] of romans) { while (num >= v) { result += s; num -= v; } }
    return result;
}

function miniSeal(year) {
    return `
        <svg class="mini-seal" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <path id="topArc${year}" d="M 20,100 A 80,80 0 0 1 180,100" fill="none"/>
                <path id="bottomArc${year}" d="M 24,108 A 76,76 0 0 0 176,108" fill="none"/>
            </defs>
            <circle cx="100" cy="100" r="92" fill="none" stroke="#e8c889" stroke-width="1.5" opacity="0.4"/>
            <circle cx="100" cy="100" r="86" fill="none" stroke="#e8c889" stroke-width="0.5" opacity="0.6"/>
            <g fill="#e8c889">
                <circle cx="100" cy="14" r="1.5"/><circle cx="186" cy="100" r="1.5"/>
                <circle cx="100" cy="186" r="1.5"/><circle cx="14" cy="100" r="1.5"/>
            </g>
            <text fill="#e8c889" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" letter-spacing="3">
                <textPath href="#topArc${year}" startOffset="50%" text-anchor="middle">★ {{LEAGUE_ABBR}} · CHAMPION ·</textPath>
            </text>
            <text fill="#e8c889" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" letter-spacing="3">
                <textPath href="#bottomArc${year}" startOffset="50%" text-anchor="middle">${toRoman(year)}</textPath>
            </text>
            <g fill="#e8c889">
                <polygon points="100,42 102,49 109,49 103,53 105,60 100,56 95,60 97,53 91,49 98,49"/>
            </g>
            <text x="100" y="125" fill="#f4ebd8" font-family="DM Serif Display, serif" font-style="italic"
                  font-size="58" font-weight="400" letter-spacing="-0.04em" text-anchor="middle">I</text>
            <line x1="78" y1="138" x2="122" y2="138" stroke="#e8c889" stroke-width="0.8"/>
            <text x="100" y="152" fill="#c9c0ad" font-family="JetBrains Mono, monospace"
                  font-size="6.5" font-weight="700" letter-spacing="2" text-anchor="middle">${year}</text>
        </svg>
    `;
}

function finishClass(rank) {
    if (rank === 1) return 'gold';
    if (rank === 2) return 'silver';
    if (rank === 3) return 'bronze';
    return '';
}

function recordClass(record) {
    if (!record || record === '—') return 'even';
    const parts = record.split('-').map(Number);
    if (parts.length < 2 || isNaN(parts[0])) return 'even';
    const [w, l] = parts;
    if (w > l) return 'winning';
    if (l > w) return 'losing';
    return 'even';
}

function fmtPct(p) {
    if (p == null) return '—';
    return p.toFixed(3).replace(/^0\./, '.');
}

function showError(msg) {
    document.getElementById('profile-body').innerHTML = `
        <div class="error-state">
            <h1>Manager not found.</h1>
            <p>${msg}</p>
            <a href="managers/">← View all managers</a>
        </div>
    `;
}

async function loadProfile() {
    const userId = getUserIdFromURL();
    if (!userId) return showError("No manager ID was specified.");

    let m;
    try {
        const res = await fetch(`data/managers/${userId}.json`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        m = await res.json();
    } catch (err) {
        return showError(`Couldn't load profile (${err.message}). Did you run build_data.py?`);
    }

    let top5 = [];
    try {
        const res = await fetch('data/manager_highs.json');
        if (res.ok) {
            const highs = await res.json();
            const entry = highs.find(h => String(h.user_id) === String(userId));
            if (entry && Array.isArray(entry.top5)) top5 = entry.top5;
        }
    } catch (_) { /* non-fatal */ }

    // Manager DNA — Veteran-tier feature. The exporter only emits this
    // bundle when the commissioner is on Veteran+. If the file 404s OR the
    // payload is null OR this manager isn't in the manager list, we render
    // the locked variant instead of nothing — gives non-Veteran leagues a
    // visible "upgrade to unlock" prompt rather than an invisible feature.
    let dnaEntry = null;
    let dnaAvailable = false;
    try {
        const res = await fetch('data/manager_dna.json');
        if (res.ok) {
            const dna = await res.json();
            if (dna && Array.isArray(dna.managers)) {
                dnaAvailable = true;
                dnaEntry = dna.managers.find(d => String(d.uid) === String(userId)) ?? null;
            }
        }
    } catch (_) { /* non-fatal */ }

    // Anything that throws below leaves the page stuck on the loading state
    // (the old failure mode for managers with empty stats). Surface it instead.
    try {
        renderProfile(m, top5, dnaEntry, dnaAvailable);
    } catch (err) {
        showError(`Couldn't render profile (${err.message}). Please report this.`);
    }
}

// Tiny helper for the DNA teaser barcode — 12 bands, first 5 keyed off
// the manager's signal genotype, rest are decorative + seeded by name so
// repeat archetypes still look distinct. Mirrors the bigger version on the
// Manager DNA page so the teaser visually previews the destination.
function dnaTeaserBarcode(signals, seed) {
    function classifyBand(v, lo, hi, midColor, lowColor, highColor) {
        if (v == null) return { cls: 'mute', a: 0.3 };
        if (v < lo) return { cls: lowColor, a: 0.55 };
        if (v > hi) return { cls: highColor, a: 0.85 };
        return { cls: midColor, a: 0.65 };
    }
    const bands = [
        classifyBand(signals.efficiency_pct, 50, 80, 'cyan', 'amber', 'lime'),
        classifyBand(signals.lineup_churn_pct, 12, 28, 'cyan', 'lime', 'magenta'),
        classifyBand(signals.volatility_pct, 14, 26, 'cyan', 'lime', 'amber'),
        classifyBand(signals.draft_rb_share_pct, 30, 60, 'cyan', 'lime', 'amber'),
        classifyBand(signals.trades_per_season, 0.6, 2.5, 'cyan', 'mute', 'magenta'),
    ];
    const palette = ['cyan', 'magenta', 'mute', 'cyan', 'lime', 'mute', 'magenta'];
    let h = seed;
    while (bands.length < 12) {
        bands.push({ cls: palette[h % palette.length], a: 0.3 + ((h % 50) / 100) });
        h = Math.floor(h / 3) + (h * 11) % 233;
    }
    return bands.map(b => `<span class="pdna-band b-${b.cls}" style="--a:${b.a.toFixed(2)}"></span>`).join('');
}

function escapeHtmlDna(s) {
    return String(s ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
}

function hashStr(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    return Math.abs(h);
}

function renderDnaCard(dnaEntry, dnaAvailable, managerName) {
    // Locked variant when the league owner isn't on Veteran+. Greyed out
    // with an upgrade hint and no link to the full DNA page.
    if (!dnaAvailable || !dnaEntry) {
        return `
            <div class="profile-dna is-locked">
                <div class="pdna-head">
                    <span class="pdna-lbl">Manager DNA</span>
                    <span class="pdna-tier">★ Veteran ★</span>
                </div>
                <div class="pdna-arch">Sequencing locked.</div>
                <p class="pdna-locked-msg">
                    Behavioral DNA — archetypes, trait markers, and the genome lab — unlocks
                    when this league&apos;s commissioner is on the Veteran tier.
                </p>
                <span class="pdna-cta is-locked">
                    Manager DNA <span class="pdna-cta-arrow">→</span>
                </span>
            </div>
        `;
    }

    const traits = (dnaEntry.traits ?? []).slice(0, 2);
    const traitsHtml = traits
        .map(t => `<span class="pdna-trait" title="${escapeHtmlDna(t.detail)}">${escapeHtmlDna(t.label)}</span>`)
        .join('');
    const seed = hashStr((managerName || '') + '|' + (dnaEntry.archetype?.key || ''));
    const barcode = dnaTeaserBarcode(dnaEntry.signals ?? {}, seed);

    // Unlocked variant: no Veteran badge — the link is itself proof the
    // viewer has access. The badge stays on the locked variant above as a
    // hint about what gates the feature.
    return `
        <div class="profile-dna">
            <div class="pdna-head">
                <span class="pdna-lbl">Manager DNA · Specimen</span>
            </div>
            <div class="pdna-barcode">${barcode}</div>
            <div class="pdna-arch">${escapeHtmlDna(dnaEntry.archetype.name)}</div>
            <div class="pdna-tagline">${escapeHtmlDna(dnaEntry.archetype.tagline)}</div>
            ${traits.length > 0 ? `<div class="pdna-traits">${traitsHtml}</div>` : ''}
            <a class="pdna-cta" href="live/manager-dna/">
                See full strand <span class="pdna-cta-arrow">→</span>
            </a>
        </div>
    `;
}

function renderProfile(m, top5, dnaEntry, dnaAvailable) {
    document.getElementById('nav-name').innerHTML = `${m.name} <em>·</em>`;
    document.title = `${m.name} · {{LEAGUE_NAME}}`;

    document.querySelectorAll('#ticker-1, #ticker-2').forEach(el => {
        el.innerHTML = `
            <span class="ticker-item"><span class="ticker-star">★</span> ${m.name.toUpperCase()} · MANAGER PROFILE</span>
            <span class="ticker-item"><span class="ticker-star">★</span> ${m.seasons_played} SEASONS · ${m.total_games} GAMES</span>
            <span class="ticker-item"><span class="ticker-star">★</span> ${m.championships > 0 ? m.championships + ' CHIP' + (m.championships>1?'S':'') + ' · ' + m.championship_seasons.join(', ') : 'CHASING FIRST CHIP'}</span>
            <span class="ticker-item"><span class="ticker-star">★</span> {{LEAGUE_NAME_UPPER}} · EST. {{LEAGUE_FOUNDED}}</span>
        `;
    });

    // Banner
    let bannerHTML;
    if (m.championships > 0) {
        bannerHTML = `<div class="banner-row">${m.championship_seasons.map(y => miniSeal(y)).join('')}</div>`;
    } else {
        bannerHTML = `<div class="banner-row"><div class="banner-empty">— No championships yet —</div></div>`;
    }

    // Season ledger
    let ledgerHTML;
    if (m.season_ledger && m.season_ledger.length > 0) {
        ledgerHTML = `
            <div class="season-ledger">
                <table>
                    <thead>
                        <tr>
                            <th>Year</th>
                            <th>Team</th>
                            <th class="num">Finish</th>
                            <th class="num">Reg. Rank</th>
                            <th class="num">Reg. Record</th>
                            <th class="num">Reg. PF</th>
                            <th class="num">Playoffs</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${m.season_ledger.map(s => `
                            <tr>
                                <td class="year">${s.year}</td>
                                <td class="team">${s.team_name}</td>
                                <td class="num finish ${finishClass(s.final_rank)}">${s.final_rank === 1 ? '★ 1st' : (s.final_rank ? '#' + s.final_rank : '—')}</td>
                                <td class="num">${s.reg_season_rank ?? '—'}</td>
                                <td class="num">${s.reg_record}</td>
                                <td class="num">${s.reg_pf != null ? s.reg_pf.toFixed(1) : '—'}</td>
                                <td class="num">${s.playoff_record}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    } else {
        ledgerHTML = `<p style="font-family: var(--serif); font-style: italic; color: var(--cream-mute); padding: 1rem;">No season data on file.</p>`;
    }

    // H2H
    let h2hHTML;
    if (m.h2h && m.h2h.length > 0) {
        const h2hWithGames = m.h2h.filter(h => h.total_games > 0);
        if (h2hWithGames.length === 0) {
            h2hHTML = `<p style="font-family: var(--serif); font-style: italic; color: var(--cream-mute); padding: 1rem;">No head-to-head matchups on file.</p>`;
        } else {
            h2hHTML = `
                <div class="h2h-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Opponent</th>
                                <th class="num">Reg. Record</th>
                                <th class="num">Playoffs</th>
                                <th class="num">All-Time</th>
                                <th class="num">Games</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${h2hWithGames.map(h => `
                                <tr>
                                    <td class="opp">${h.opp_name}</td>
                                    <td class="num record ${recordClass(h.reg_record)}">${h.reg_record}</td>
                                    <td class="num record ${recordClass(h.playoff_record)}">${h.playoff_record}</td>
                                    <td class="num record ${recordClass(h.total_record)}">${h.total_record}</td>
                                    <td class="num">${h.total_games}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
    } else {
        h2hHTML = `<p style="font-family: var(--serif); font-style: italic; color: var(--cream-mute); padding: 1rem;">No head-to-head data on file.</p>`;
    }

    // Top 5 weeks
    let top5HTML;
    if (top5.length > 0) {
        top5HTML = `
            <div class="top5-table">
                <table>
                    <thead>
                        <tr>
                            <th class="num">#</th>
                            <th class="num">Score</th>
                            <th>Opponent</th>
                            <th class="num">Opp Score</th>
                            <th class="num">Result</th>
                            <th class="num">Year</th>
                            <th class="num">Week</th>
                            <th>Team</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${top5.map((g, i) => `
                            <tr>
                                <td class="rank${i === 0 ? ' gold' : ''}">${i + 1}</td>
                                <td class="num score">${g.score.toFixed(2)}</td>
                                <td class="opp">${g.opp_name}</td>
                                <td class="num">${g.opp_score.toFixed(2)}</td>
                                <td class="num result ${g.result === 'W' ? 'win' : 'loss'}">${g.result}</td>
                                <td class="num">${g.season}</td>
                                <td class="num">W${g.week}</td>
                                <td>${g.team || '—'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    } else if (window.__DC && window.__DC.leagueTier === 'udfa') {
        // UDFA leagues 404 manager_highs.json by design — render a
        // matched-style locked card so users see "this is gated" instead
        // of the generic "no data" message that's confusing for a fresh
        // free-tier league.
        top5HTML = `
            <div class="profile-dna is-locked" style="margin:0">
                <div class="pdna-head">
                    <span class="pdna-lbl">Top Performances</span>
                    <span class="pdna-tier">★ Paid Tier ★</span>
                </div>
                <div class="pdna-arch">Top weeks locked.</div>
                <p class="pdna-locked-msg">
                    Career highs unlock when this league's commissioner is on a paid plan.
                </p>
                <a class="pdna-cta is-locked" href="/pricing" target="_top">
                    <span>Upgrade to unlock</span>
                    <span class="pdna-cta-arrow">→</span>
                </a>
            </div>`;
    } else {
        top5HTML = `<p style="font-family: var(--serif); font-style: italic; color: var(--cream-mute); padding: 1rem;">No top performances on file.</p>`;
    }

    const dnaCardHTML = renderDnaCard(dnaEntry, dnaAvailable, m.name);

    document.getElementById('profile-body').innerHTML = `
        <div class="profile-header">
            <div class="profile-kicker">★ ${m.seasons_played} Seasons · ${m.championships} ${m.championships === 1 ? 'Chip' : 'Chips'} ★</div>
            <h1 class="profile-name">${m.name}<em>.</em></h1>
            <p class="profile-tagline">${m.tagline}</p>
            ${bannerHTML}
            ${dnaCardHTML}
        </div>

        <div class="section">
            <div class="stat-strip">
                <div class="strip-item">
                    <div class="strip-label">Total Games</div>
                    <div class="strip-value cream">${m.total_games}</div>
                    <div class="strip-detail">${m.seasons_played} seasons</div>
                </div>
                <div class="strip-item">
                    <div class="strip-label">High Score</div>
                    <div class="strip-value">${m.high_score != null ? m.high_score.toFixed(1) : '—'}</div>
                    <div class="strip-detail">Career best</div>
                </div>
                <div class="strip-item">
                    <div class="strip-label">Avg PPG</div>
                    <div class="strip-value">${m.avg_ppg != null ? m.avg_ppg.toFixed(1) : '—'}</div>
                    <div class="strip-detail">All games</div>
                </div>
                <div class="strip-item">
                    <div class="strip-label">Top-3 Finishes</div>
                    <div class="strip-value">${m.top_three_finishes}</div>
                    <div class="strip-detail">${m.top_three_finishes ? 'In the hunt' : 'Still chasing'}</div>
                </div>
                <div class="strip-item">
                    <div class="strip-label">Longest Win Streak</div>
                    <div class="strip-value">${m.longest_win_streak?.length ?? 0}</div>
                    <div class="strip-detail">${m.longest_win_streak?.when || '—'}</div>
                </div>
                <div class="strip-item">
                    <div class="strip-label">Longest Loss Streak</div>
                    <div class="strip-value">${m.longest_loss_streak?.length ?? 0}</div>
                    <div class="strip-detail">${m.longest_loss_streak?.when || '—'}</div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <span class="section-num">§ 01 · Career</span>
                <span class="section-title">Regular season &amp; postseason —</span>
                <span class="section-meta">all-time splits</span>
            </div>
            <div class="split-row">
                <div class="split-col">
                    <div class="split-label">Regular Season</div>
                    <div class="split-record">${m.reg_record}</div>
                    <div class="split-pct">${fmtPct(m.reg_win_pct)} win pct</div>
                    <div class="split-pf">PF ${Math.round(m.reg_pf)} · PA ${Math.round(m.reg_pa)}</div>
                </div>
                <div class="split-col playoff">
                    <div class="split-label">Playoffs</div>
                    <div class="split-record">${m.playoff_record}</div>
                    <div class="split-pct">${fmtPct(m.playoff_win_pct)} win pct</div>
                    <div class="split-pf">PF ${Math.round(m.playoff_pf)} · PA ${Math.round(m.playoff_pa)}</div>
                </div>
            </div>
        </div>

        <div class="section ledger-section">
            <div class="section-header">
                <span class="section-num">§ 02 · Season Ledger</span>
                <span class="section-title">Year by year —</span>
                <span class="section-meta">${m.seasons_played} seasons</span>
            </div>
            ${ledgerHTML}
        </div>

        <div class="section ledger-section">
            <div class="section-header">
                <span class="section-num">§ 03 · Top Performances</span>
                <span class="section-title">Highest scoring weeks —</span>
                <span class="section-meta">all-time top 5</span>
            </div>
            ${top5HTML}
        </div>

        <div class="section">
            <div class="section-header">
                <span class="section-num">§ 04 · Rivalries</span>
                <span class="section-title">Head-to-head —</span>
                <span class="section-meta">all opponents</span>
            </div>
            ${h2hHTML}
        </div>
    `;
}

loadProfile();
</script>
