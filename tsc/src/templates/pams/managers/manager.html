    'tampa bay buccaneers': 'TB', 'tennessee titans': 'TEN',
    'washington commanders': 'WAS', 'washington football team': 'WAS', 'washington redskins': 'WAS',
};
function defAbbr(name) { return DEF_ABBR[(name || '').trim().toLowerCase()] || null; }
// A known team name → its city (drop the nickname): "Buffalo Bills" → "Buffalo".
function defCity(name) { return defAbbr(name) ? (name || '').trim().replace(/\s+\S+$/, '') : null; }
// Full label incl. " DEF" for use where no position chip sits alongside.
function draftName(name) { var c = defCity(name); return c ? c + ' DEF' : name; }

function renderPodium(mount, uid, years, files) {
    var mine = [];
    files.forEach(function (f, i) {
        if (!f || !Array.isArray(f.picks)) return;
        f.picks.forEach(function (p) {
            if (String(p.user_id) === String(uid)) mine.push(Object.assign({ year: years[i] }, p));
        });
    });
    if (!mine.length) { mount.remove(); return; }

    var yearsDrafted = {};
    var posCounts = {};
    var nameCounts = {};
    var namePickSum = {};
    var round1 = [];
    mine.forEach(function (p) {
        yearsDrafted[p.year] = 1;
        var pos = (p.position || '?').toUpperCase();
        posCounts[pos] = (posCounts[pos] || 0) + 1;
        if (p.player_name) {
            nameCounts[p.player_name] = (nameCounts[p.player_name] || 0) + 1;
            namePickSum[p.player_name] = (namePickSum[p.player_name] || 0) + (p.overall_pick || p.round_pick || 0);
        }
        if (p.round === 1) round1.push(p);
    });
    round1.sort(function (a, b) { return a.year - b.year; });

    // Most-drafted: just the top name. If several tie for the top count,
    // show 2 — the ones with the best (lowest) average draft slot, so a
    // late-round repeat loses out to earlier-drafted repeats.
    var maxCount = 0;
    Object.keys(nameCounts).forEach(function (n) { if (nameCounts[n] > maxCount) maxCount = nameCounts[n]; });
    var topNames = Object.keys(nameCounts)
        .filter(function (n) { return nameCounts[n] === maxCount; })
        .sort(function (a, b) { return (namePickSum[a] / nameCounts[a]) - (namePickSum[b] / nameCounts[b]); });
    var repeats = maxCount >= 2 ? topNames.slice(0, topNames.length > 1 ? 2 : 1) : [];

    var favSlot = round1.length
        ? (round1.reduce(function (acc, p) { return acc + (p.round_pick || 0); }, 0) / round1.length)
        : null;

    var posOrder = ['QB', 'RB', 'WR', 'TE', 'K', 'DEF'];
    var posMax = Math.max.apply(null, posOrder.map(function (p) { return posCounts[p] || 0; }).concat([1]));
    var bars = posOrder.filter(function (p) { return posCounts[p]; }).map(function (p) {
        var n = posCounts[p];
        var w = Math.round((n / posMax) * 100);
        var cls = 'pp-' + p.toLowerCase();
        return '<div class="pod-bar-row">' +
            '<span class="pod-bar-pos ' + cls + '">' + p + '</span>' +
            '<span class="pod-bar-track"><span class="pod-bar-fill ' + cls + '" style="width:' + w + '%"></span></span>' +
            '<span class="pod-bar-n">' + n + ' · ' + Math.round((n / mine.length) * 100) + '%</span>' +
        '</div>';
    }).join('');

    function factRow(label, valHtml) {
        return '<div class="pod-fact">' +
            '<span class="pod-fact-label">' + label + '</span>' +
            '<span class="pod-fact-dots"></span>' +
            '<span class="pod-fact-val">' + valHtml + '</span>' +
        '</div>';
    }
    /* "Drafted most often": top name gets its own line, the runners-up
       share the second so the row stays two lines tall. */
    var repeatsHtml = '';
    if (repeats.length) {
        var fmt = function (n) { return esc(draftName(n)) + ' <span class="sub">×' + nameCounts[n] + '</span>'; };
        repeatsHtml = fmt(repeats[0]);
        if (repeats.length > 1) {
            repeatsHtml += '<br>' + repeats.slice(1).map(fmt).join(' · ');
        }
    }
    var facts =
        factRow('Drafts attended', Object.keys(yearsDrafted).length + '<span class="sub">of ' + years.length + ' on file</span>') +
        factRow('Career picks', String(mine.length)) +
        factRow('First-round picks', String(round1.length)) +
        (favSlot != null ? factRow('Avg first-round slot', favSlot.toFixed(1)) : '') +
        (repeatsHtml ? factRow('Drafted most often', repeatsHtml) : '');

    var lineage = round1.map(function (p) {
        var pos = (p.position || '?').toUpperCase();
        // DEF already gets a chip below, so show just the city (Buffalo), not "Buffalo DEF".
        var disp = defCity(p.player_name) || p.player_name || '?';
        return '<div class="lineage-row">' +
            '<span class="lineage-year">' + p.year + '</span>' +
            '<span class="lineage-player">' + esc(disp) + '</span>' +
            '<span class="lineage-pos pp-' + pos.toLowerCase() + '">' + pos + '</span>' +
            '<span class="lineage-slot">Pick ' + (p.round_pick || p.overall_pick) + '</span>' +
        '</div>';
    }).join('');

    mount.innerHTML =
        '<div class="fs-head">' +
            '<span class="fs-num">§ 05 · At the Podium</span>' +
            '<span class="fs-title">Draft identity</span>' +
            '<span class="fs-note">' + mine.length + ' picks · ' + Object.keys(yearsDrafted).length + ' drafts</span>' +
        '</div>' +
        '<div class="podium-grid">' +
            '<div>' + facts +
                '<div class="pod-bars">' +
                    '<div class="pod-bars-label">Position mix · all picks</div>' + bars +
                '</div>' +
            '</div>' +
            '<div>' +
                '<div class="lineage-label">First-round lineage</div>' +
                (lineage || '<p class="fs-empty">No first-round picks on file.</p>') +
                '<a class="pod-link" href="draft/">Read the full dossier in the Draft Annual</a>' +
            '</div>' +
        '</div>';
    watchReveals();
}

/* ── Main render ───────────────────────────────────────────── */
function renderProfile(m, top5, dnaEntry, dnaAvailable, recordBook, currentForm, userId) {
    document.getElementById('nav-name').innerHTML = esc(m.name) + ' <em>·</em>';
    document.title = m.name + ' · {{LEAGUE_NAME}}';

    document.querySelectorAll('#ticker-1, #ticker-2').forEach(function (el) {
        el.innerHTML =
            '<span class="ticker-item"><span class="ticker-star">★</span> ' + esc(m.name.toUpperCase()) + ' · THE MANAGER FILE</span>' +
            '<span class="ticker-item"><span class="ticker-star">★</span> ' + m.seasons_played + ' SEASONS · ' + m.total_games + ' GAMES</span>' +
            '<span class="ticker-item"><span class="ticker-star">★</span> ' + (m.championships > 0
                ? m.championships + ' CHIP' + (m.championships > 1 ? 'S' : '') + ' · ' + m.championship_seasons.join(', ')
                : 'CHASING THE FIRST CHIP') + '</span>' +
            '<span class="ticker-item"><span class="ticker-star">★</span> {{LEAGUE_NAME_UPPER}} · EST. {{LEAGUE_FOUNDED}}</span>';
    });

    var firstYear = (m.season_ledger && m.season_ledger.length) ? m.season_ledger[0].year : '{{LEAGUE_FOUNDED}}';
    var lastYear = (m.season_ledger && m.season_ledger.length) ? m.season_ledger[m.season_ledger.length - 1].year : '';
    var isCurrent = m.is_current !== false;
    var status = isCurrent ? 'Active member' : 'Alumnus';

    /* The lede: set from the career line like an editor would. */
    var pct = m.reg_win_pct != null ? fmtPct(m.reg_win_pct) : '·';
    var chipsPhrase = m.championships > 0
        ? m.championships + ' championship' + (m.championships === 1 ? '' : 's') + ' (' + m.championship_seasons.join(', ') + ')'
        : 'no championships yet';
    var lede = m.seasons_played + ' season' + (m.seasons_played === 1 ? '' : 's') +
        ' under the {{LEAGUE_NAME}} masthead. A regular-season mark of ' + m.reg_record +
        ' (' + pct + '), ' + chipsPhrase +
        ', and a single-week high of ' + (m.high_score != null ? m.high_score.toFixed(1) : '·') +
        '. This is the complete file on ' + m.name + '.';

    /* Seals: cap the rendered row at 4, then a +N more line. */
    var sealsHtml;
    if (m.championships > 0) {
        var shown = m.championship_seasons.slice(0, 4);
        sealsHtml = shown.map(function (y) { return miniSeal(y); }).join('') +
            (m.championship_seasons.length > 4
                ? '<span class="fp-seals-more">+' + (m.championship_seasons.length - 4) + ' more</span>'
                : '');
    } else {
        sealsHtml = '<div class="fp-seals-none">No championships on file</div>';
    }

    var portrait = m.avatar
        ? '<img src="' + esc(m.avatar) + '" alt="" onerror="this.outerHTML=\'<div class=&quot;fp-mono&quot;>' + esc(initials(m.name)) + '</div>\'">'
        : '<div class="fp-mono">' + esc(initials(m.name)) + '</div>';

    /* Agate band: the eight numbers that follow this manager around. */
    var agate =
        agateCell('Seasons', String(m.seasons_played), firstYear + (lastYear && lastYear !== firstYear ? ' to ' + lastYear : ''), true) +
        agateCell('Career games', String(m.total_games), 'reg + playoffs', true) +
        agateCell('High score', m.high_score != null ? m.high_score.toFixed(1) : '·', 'career best', false) +
        agateCell('Avg PPG', m.avg_ppg != null ? m.avg_ppg.toFixed(1) : '·', 'all games', false) +
        agateCell('Top-3 finishes', String(m.top_three_finishes), m.top_three_finishes ? 'podium visits' : 'still chasing', false) +
        agateCell('Playoff trips', String(m.playoff_appearances != null ? m.playoff_appearances : '·'), 'appearances', false) +
        agateCell('Best streak', String((m.longest_win_streak || {}).length || 0), (m.longest_win_streak || {}).when || '·', false) +
        agateCell('Worst skid', String((m.longest_loss_streak || {}).length || 0), (m.longest_loss_streak || {}).when || '·', false);

    /* Season ledger — newest year on top. */
    var ledgerHtml;
    if (m.season_ledger && m.season_ledger.length) {
        ledgerHtml =
            '<div class="ptable-wrap"><table class="ptable"><thead><tr>' +
                '<th>Year</th><th>Team</th><th class="num">Finish</th><th class="num">Reg rank</th>' +
                '<th class="num">Record</th><th class="num">PF</th><th class="num">PPG</th>' +
                '<th class="num">High week</th><th class="num">Playoffs</th>' +
            '</tr></thead><tbody>' +
            m.season_ledger.slice().reverse().map(function (s) {
                var champ = s.final_rank === 1;
                return '<tr' + (champ ? ' class="champ-row"' : '') + '>' +
                    '<td class="year">' + s.year + '</td>' +
                    '<td class="strong">' + esc(s.team_name) + '</td>' +
                    '<td class="num fin ' + finishClass(s.final_rank) + '">' + (champ ? '★ 1st' : (s.final_rank ? '#' + s.final_rank : '·')) + '</td>' +
                    '<td class="num">' + (s.reg_season_rank != null ? s.reg_season_rank : '·') + '</td>' +
                    '<td class="num rec ' + recordClass(s.reg_record) + '">' + esc(s.reg_record) + '</td>' +
                    '<td class="num">' + (s.reg_pf != null ? s.reg_pf.toFixed(1) : '·') + '</td>' +
                    '<td class="num">' + (s.avg_ppg ? s.avg_ppg.toFixed(1) : '·') + '</td>' +
                    '<td class="num">' + (s.high_week_score ? s.high_week_score.toFixed(1) + (s.high_week ? ' <span style="color:var(--cream-mute);font-size:.62rem">W' + s.high_week + '</span>' : '') : '·') + '</td>' +
                    '<td class="num">' + esc(s.playoff_record) + '</td>' +
                '</tr>';
            }).join('') +
            '</tbody></table></div>';
    } else {
        ledgerHtml = '<p class="fs-empty">No season data on file.</p>';
    }

    /* Top performances */
    var topHtml;
    if (top5.length) {
        topHtml =
            '<div class="ptable-wrap"><table class="ptable"><thead><tr>' +
                '<th class="num">No.</th><th class="num">Score</th><th>Opponent</th><th class="num">Their score</th>' +
                '<th class="num">Result</th><th class="num">Year</th><th class="num">Week</th><th>Team</th>' +
            '</tr></thead><tbody>' +
            top5.map(function (g, i) {
                return '<tr>' +
                    '<td class="num fin' + (i === 0 ? ' gold' : '') + '">' + (i + 1) + '</td>' +
                    '<td class="num score">' + g.score.toFixed(2) + '</td>' +
                    '<td class="strong">' + esc(g.opp_name) + '</td>' +
                    '<td class="num">' + g.opp_score.toFixed(2) + '</td>' +
                    '<td class="num ' + (g.result === 'W' ? 'win' : 'loss') + '">' + g.result + '</td>' +
                    '<td class="num">' + g.season + '</td>' +
                    '<td class="num">W' + g.week + '</td>' +
                    '<td>' + esc(g.team || '·') + '</td>' +
                '</tr>';
            }).join('') +
            '</tbody></table></div>';
    } else if (isUdfa()) {
        topHtml = '<div class="locked-note"><span class="lk">★ Paid Tier ★</span>' +
            'Career highs unlock when this league’s commissioner is on a paid plan. ' +
            '<a href="/pricing" target="_top">Upgrade to unlock</a></div>';
    } else {
        topHtml = '<p class="fs-empty">No top performances on file.</p>';
    }

    /* Head-to-head: callouts + full ledger */
    var h2hRows = (m.h2h || []).filter(function (h) { return h.total_games > 0; });
    var h2hHtml;
    var calloutsHtml = '';
    if (h2hRows.length) {
        var qualified = h2hRows.filter(function (h) { return h.total_games >= 3; });
        if (qualified.length >= 2) {
            var scored = qualified.map(function (h) {
                var r = parseRecord(h.total_record);
                var games = r.w + r.l + r.t;
                return { h: h, pct: games ? r.w / games : 0, rec: h.total_record };
            });
            scored.sort(function (a, b) { return b.pct - a.pct || b.h.total_games - a.h.total_games; });
            var best = scored[0];
            var worst = scored[scored.length - 1];
            if (best !== worst) {
                calloutsHtml =
                    '<div class="h2h-callouts">' +
                        '<div class="h2h-call">' +
                            '<div class="h2h-call-label">Owns</div>' +
                            '<div class="h2h-call-name">' + esc(best.h.opp_name) + '</div>' +
                            '<div class="h2h-call-rec">' + esc(best.rec) + ' all-time · ' + best.h.total_games + ' meetings</div>' +
                        '</div>' +
                        '<div class="h2h-call bogey">' +
                            '<div class="h2h-call-label">Haunted by</div>' +
                            '<div class="h2h-call-name">' + esc(worst.h.opp_name) + '</div>' +
                            '<div class="h2h-call-rec">' + esc(worst.rec) + ' all-time · ' + worst.h.total_games + ' meetings</div>' +
                        '</div>' +
                    '</div>';
            }
        }
        h2hHtml =
            '<div class="ptable-wrap"><table class="ptable"><thead><tr>' +
                '<th>Opponent</th><th class="num">Reg</th><th class="num">Playoffs</th>' +
                '<th class="num">All-time</th><th class="num">Games</th><th class="num">Pt diff</th>' +
            '</tr></thead><tbody>' +
            h2hRows.map(function (h) {
                var diff = (h.reg_pf + (h.playoff_pf || 0)) - (h.reg_pa + (h.playoff_pa || 0));
                var diffStr = (diff > 0 ? '+' : '') + diff.toFixed(1);
                return '<tr>' +
                    '<td class="strong">' + esc(h.opp_name) + '</td>' +
                    '<td class="num rec ' + recordClass(h.reg_record) + '">' + esc(h.reg_record) + '</td>' +
                    '<td class="num rec ' + recordClass(h.playoff_record) + '">' + esc(h.playoff_record) + '</td>' +
                    '<td class="num rec ' + recordClass(h.total_record) + '">' + esc(h.total_record) + '</td>' +
                    '<td class="num">' + h.total_games + '</td>' +
                    '<td class="num" style="color:' + (diff >= 0 ? 'var(--gold)' : 'var(--rust)') + '">' + diffStr + '</td>' +
                '</tr>';
            }).join('') +
            '</tbody></table></div>';
    } else {
        h2hHtml = '<p class="fs-empty">No head-to-head data on file.</p>';
    }

    var railHtml =
        renderNowRail(currentForm, userId) +
        renderRecordsRail(recordBook, userId, m.name) +
        renderNotebook(m, top5) +
        '<div class="rail-card fs-reveal">' +
            '<div class="rail-head"><span>Cross-References</span></div>' +
            '<a class="xref-link" href="managers/all-time?id=' + encodeURIComponent(userId) + '">The All-Time Team<span class="sub">team sheet</span></a>' +
            '<a class="xref-link" href="records.html">The Record Book<span class="sub">every mark</span></a>' +
            '<a class="xref-link" href="draft/">The Draft Annual<span class="sub">full dossier</span></a>' +
            '<a class="xref-link" href="rivalries/">The Rivalries<span class="sub">grudge files</span></a>' +
        '</div>';

    document.getElementById('profile-body').innerHTML =
        '<header class="mast">' +
            '<div class="mast-kick">{{LEAGUE_NAME}} · The Manager File</div>' +
            '<div class="mast-orn">✦ ✦ ✦</div>' +
            '<h1 class="mast-title">' + esc(m.name) + '<em>.</em></h1>' +
            '<p class="mast-sub">' + esc(m.tagline) + '</p>' +
            '<div class="mast-wire">File No. <strong>' + esc(initials(m.name)) + '-' + firstYear + '</strong>' +
                ' · Opened ' + firstYear +
                ' · Status <strong>' + status.toUpperCase() + '</strong>' +
                (m.championships ? ' · <strong>' + m.championships + '×</strong> CHAMPION' : '') +
            '</div>' +
        '</header>' +

        '<div class="profile-main" style="padding-bottom:0">' +
            '<div class="id-card fs-reveal is-in">' +
                '<div class="fp-portrait' + (isCurrent ? '' : ' vintage') + '">' + portrait +
                    '<span class="fp-stamp' + (isCurrent ? '' : ' alum') + '">' + status + '</span>' +
                '</div>' +
                '<div>' +
                    '<div class="fp-name">' + esc(m.name) + '<em>.</em></div>' +
                    '<div class="fp-dateline">' + firstYear + (lastYear && lastYear !== firstYear ? ' to ' + lastYear : '') +
                        ' · ' + m.seasons_played + ' season' + (m.seasons_played === 1 ? '' : 's') +
                        ' · ' + m.total_games + ' games</div>' +
                    '<p class="fp-lede">' + esc(lede) + '</p>' +
                '</div>' +
                '<div class="fp-seals">' + sealsHtml + '</div>' +
            '</div>' +
        '</div>' +

        '<div class="agate-band fs-reveal is-in"><div class="agate-inner">' + agate + '</div></div>' +

        '<main class="profile-main">' +

            '<div class="fp-plates fs-reveal is-in">' +
                renderAllTimePlate(m, userId) +
                renderDnaPlate(dnaEntry, dnaAvailable, m.name) +
            '</div>' +

            '<div class="spread">' +
                '<div class="spread-main">' +

                    '<section class="region fs-reveal">' +
                        '<div class="fs-head">' +
                            '<span class="fs-num">§ 01 · Career</span>' +
                            '<span class="fs-title">Regular season and postseason</span>' +
                            '<span class="fs-note">all-time splits</span>' +
                        '</div>' +
                        '<div class="split-row">' +
                            '<div class="split-col">' +
                                '<div class="split-label">Regular Season</div>' +
                                '<div class="split-record">' + esc(m.reg_record) + '</div>' +
                                '<div class="split-pct">' + fmtPct(m.reg_win_pct) + ' win pct</div>' +
                                '<div class="split-pf">PF ' + Math.round(m.reg_pf).toLocaleString() + ' · PA ' + Math.round(m.reg_pa).toLocaleString() + '</div>' +
                            '</div>' +
                            '<div class="split-col playoff">' +
                                '<div class="split-label">Playoffs</div>' +
                                '<div class="split-record">' + esc(m.playoff_record) + '</div>' +
                                '<div class="split-pct">' + fmtPct(m.playoff_win_pct) + ' win pct</div>' +
                                '<div class="split-pf">PF ' + Math.round(m.playoff_pf).toLocaleString() + ' · PA ' + Math.round(m.playoff_pa).toLocaleString() + '</div>' +
                            '</div>' +
                        '</div>' +
                    '</section>' +

                    '<section class="region fs-reveal" data-accent="cream">' +
                        '<div class="fs-head">' +
                            '<span class="fs-num">§ 02 · The Season Ledger</span>' +
                            '<span class="fs-title">Year by year</span>' +
                            '<span class="fs-note">newest first · ' + m.seasons_played + ' seasons on file</span>' +
                        '</div>' +
                        ledgerHtml +
                    '</section>' +

                    '<section class="region fs-reveal" data-accent="steel">' +
                        '<div class="fs-head">' +
                            '<span class="fs-num">§ 03 · Top Performances</span>' +
                            '<span class="fs-title">The five loudest weeks</span>' +
                            '<span class="fs-note">all-time top 5</span>' +
                        '</div>' +
                        topHtml +
                    '</section>' +

                    '<section class="region fs-reveal" data-accent="rust">' +
                        '<div class="fs-head">' +
                            '<span class="fs-num">§ 04 · Head-to-Head</span>' +
                            '<span class="fs-title">The rivalry ledger</span>' +
                            '<span class="fs-note">every opponent faced</span>' +
                        '</div>' +
                        calloutsHtml + h2hHtml +
                    '</section>' +

                    '<section class="region fs-reveal" id="podium-section" data-accent="cream">' +
                        '<div class="fs-head">' +
                            '<span class="fs-num">§ 05 · At the Podium</span>' +
                            '<span class="fs-title">Draft identity</span>' +
                            '<span class="fs-note">loading the annual…</span>' +
                        '</div>' +
                    '</section>' +

                '</div>' +
                '<aside class="spread-rail">' + railHtml + '</aside>' +
            '</div>' +

            '<div class="file-folio">✦ End of file <b>' + esc(initials(m.name)) + '-' + firstYear + '</b> · {{LEAGUE_NAME_UPPER}} archives ✦</div>' +

        '</main>';

    watchReveals();
}

function agateCell(label, value, detail, plain) {
    return '<div class="ag-cell">' +
        '<div class="ag-label">' + label + '</div>' +
        '<div class="ag-value' + (plain ? ' plain' : '') + '">' + value + '</div>' +
        '<div class="ag-detail">' + esc(detail) + '</div>' +
    '</div>';
}

/* Scroll-in reveals. Re-run after async sections mount. */
var revealObserver = null;
function watchReveals() {
    if (!('IntersectionObserver' in window)) {
        document.querySelectorAll('.fs-reveal').forEach(function (el) { el.classList.add('is-in'); });
        return;
    }
    if (!revealObserver) {
        revealObserver = new IntersectionObserver(function (entries) {
            entries.forEach(function (e) {
                if (e.isIntersecting) {
                    e.target.classList.add('is-in');
                    revealObserver.unobserve(e.target);
                }
            });
        }, { rootMargin: '0px 0px -8% 0px' });
    }
    document.querySelectorAll('.fs-reveal:not(.is-in)').forEach(function (el) { revealObserver.observe(el); });
}

loadProfile();
</script>
