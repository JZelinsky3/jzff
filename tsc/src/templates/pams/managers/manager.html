<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manager File · {{LEAGUE_NAME}}</title>
<link rel="stylesheet" href="/pams-template/assets/css/main.css">
<style>
/* ============================================================
   THE MANAGER FILE — one manager's complete dossier, laid out
   like a working desk instead of a scrolling column. Site navy
   chrome; paper shows up only as artifacts (the index card, a
   notebook page in the margin).
     Index card    — portrait, lede, seals
     Agate band    — full-bleed, the eight numbers
     Plates        — All-Time Team (with the real seven) + DNA
     The spread    — main column of exhibits beside a margin
                     rail: current form, records held, notebook
                     jottings, cross-references
   ============================================================ */

:root {
    /* Paper inks — only inside the paper artifacts. */
    --paper:          #efe5cd;
    --paper-soft:     #e6dabd;
    --paper-line:     rgba(40, 30, 12, .22);
    --paper-line-soft:rgba(40, 30, 12, .11);
    --ink-print:      #241c0e;
    --ink-print-soft: #55482e;
    --ink-print-mute: #7f7154;
    --gold-print:     #7a5c14;
    --rust-print:     #8c2b1e;

    /* Position inks on navy. */
    --pos-qb:  #6ba3cc;
    --pos-rb:  #5fae7f;
    --pos-wr:  #d4a94c;
    --pos-te:  #a07fd0;
    --pos-k:   #b98b56;
    --pos-def: #8a9a80;
}

/* ══ Masthead ════════════════════════════════════════════════ */
.mast {
    position: relative; z-index: 10;
    max-width: 1080px; margin: 0 auto;
    padding: 3.4rem 1.5rem 0;
    text-align: center;
}
.mast-kick {
    font-family: var(--mono); font-weight: 700;
    font-size: .62rem; letter-spacing: .42em; text-transform: uppercase;
    color: var(--gold);
}
.mast-orn {
    margin: 1.1rem 0 .9rem;
    font-size: .7rem; color: var(--cream-mute); letter-spacing: .8em;
}
.mast-title {
    font-family: var(--serif);
    font-size: clamp(3.4rem, 9vw, 7rem);
    line-height: .94; letter-spacing: -.02em;
    color: var(--cream);
}
.mast-title em { font-style: italic; color: var(--gold); }
.mast-sub {
    font-family: var(--serif); font-style: italic;
    font-size: 1.15rem; color: var(--cream-soft);
    margin-top: .9rem;
}
.mast-wire {
    margin: 1.9rem auto 0; max-width: 760px;
    padding: .55rem 1rem;
    border-top: 1px solid var(--ink-line);
    border-bottom: 1px solid var(--ink-line);
    font-family: var(--mono); font-weight: 700;
    font-size: .58rem; letter-spacing: .26em; text-transform: uppercase;
    color: var(--cream-mute);
}
.mast-wire strong { color: var(--gold); font-weight: 700; }

/* ══ Page scaffold ═══════════════════════════════════════════ */
.profile-main {
    position: relative; z-index: 10;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem 4.5rem;
}

/* ══ The index card: the paper artifact ══════════════════════ */
.id-card {
    position: relative;
    display: grid;
    grid-template-columns: 168px 1fr auto;
    gap: 2.2rem;
    align-items: start;
    max-width: 1140px;
    margin: 2.8rem auto 0;
    background:
        linear-gradient(168deg, var(--paper) 0%, var(--paper) 78%, var(--paper-soft) 100%);
    color: var(--ink-print);
    border: 1px solid #47402f;
    border-radius: 5px;
    padding: 1.9rem 2.1rem;
    box-shadow: 0 22px 55px rgba(0, 0, 0, .45), inset 0 0 42px rgba(60, 44, 16, .08);
    transform: rotate(-.35deg);
}
/* Ruled index-card line along the top edge. */
.id-card::after {
    content: '';
    position: absolute; top: 12px; left: 0; right: 0;
    height: 2px;
    background: var(--rust-print);
    opacity: .28;
}
.fp-portrait {
    position: relative;
    width: 168px; height: 168px;
    border: 1px solid var(--paper-line);
    border-radius: 3px;
    background: var(--paper-soft);
    overflow: hidden;
    box-shadow: 2px 3px 0 rgba(40, 30, 12, .12);
}
.fp-portrait img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
}
/* Alumni portraits get the archive treatment: sepia halftone.
   Active members stay in modern color. */
.fp-portrait.vintage img {
    filter: grayscale(1) sepia(.4) contrast(1.06) brightness(1.02);
    mix-blend-mode: multiply;
}
.fp-portrait.vintage::after {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(40, 30, 12, .28) 1px, transparent 1px);
    background-size: 3.5px 3.5px;
    mix-blend-mode: overlay;
    pointer-events: none;
}
.fp-portrait .fp-mono {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-style: italic;
    font-size: 4.2rem; color: var(--gold-print);
}
.fp-stamp {
    position: absolute; left: 50%; bottom: 10px;
    transform: translateX(-50%) rotate(-6deg);
    padding: .22rem .6rem;
    border: 2px solid var(--gold-print);
    border-radius: 2px;
    font-family: var(--mono); font-weight: 700;
    font-size: .52rem; letter-spacing: .24em; text-transform: uppercase;
    color: var(--gold-print);
    background: rgba(239, 229, 205, .82);
    white-space: nowrap;
    z-index: 2;
}
.fp-stamp.alum { color: var(--rust-print); border-color: var(--rust-print); }

.fp-name {
    font-family: var(--serif);
    font-size: clamp(2.2rem, 4.6vw, 3.2rem);
    line-height: .96; letter-spacing: -.02em;
    color: var(--ink-print);
    margin-bottom: .45rem;
}
.fp-name em { font-style: italic; color: var(--gold-print); }
.fp-dateline {
    font-family: var(--mono); font-weight: 700;
    font-size: .56rem; letter-spacing: .26em; text-transform: uppercase;
    color: var(--ink-print-mute);
    margin-bottom: 1.05rem;
}
.fp-lede {
    font-family: var(--serif);
    font-size: 1rem; line-height: 1.7;
    color: #3a3020;
    max-width: 56ch;
}
.fp-lede::first-letter {
    font-family: var(--serif);
    font-size: 3.2rem; line-height: .78;
    float: left;
    padding: .26rem .5rem 0 0;
    color: var(--gold-print);
}
.fp-seals { display: flex; flex-direction: column; gap: .6rem; align-items: center; }
.fp-seals .mini-seal { width: 84px; height: 84px; display: block; }
.fp-seals-none {
    max-width: 130px;
    padding: .9rem .8rem;
    border: 1px dashed var(--paper-line);
    border-radius: 2px;
    text-align: center;
    font-family: var(--mono);
    font-size: .54rem; letter-spacing: .2em; text-transform: uppercase;
    color: var(--ink-print-mute);
}
.fp-seals-more {
    font-family: var(--mono); font-weight: 700;
    font-size: .54rem; letter-spacing: .2em; text-transform: uppercase;
    color: var(--gold-print);
}

/* ══ Agate band — full-bleed across the viewport ═════════════ */
.agate-band {
    position: relative; z-index: 10;
    margin-top: 2.8rem;
    border-top: 1px solid var(--ink-line);
    border-bottom: 1px solid var(--ink-line);
    background: rgba(22, 32, 44, .38);
}
.agate-inner {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    max-width: 1500px;
    margin: 0 auto;
}
.ag-cell {
    padding: 1.15rem .9rem 1.05rem;
    text-align: center;
    border-right: 1px solid var(--ink-line-soft);
}
.ag-cell:last-child { border-right: none; }
.ag-label {
    font-family: var(--mono); font-weight: 700;
    font-size: .52rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--cream-mute);
    margin-bottom: .45rem;
}
.ag-value {
    font-family: var(--serif); font-style: italic;
    font-size: 1.75rem; line-height: 1;
    color: var(--gold);
}
.ag-value.plain { color: var(--cream); font-style: normal; }
.ag-detail {
    margin-top: .35rem;
    font-family: var(--mono);
    font-size: .52rem; letter-spacing: .12em; text-transform: uppercase;
    color: var(--cream-mute);
}

/* ══ Plates: All-Time Team + Manager DNA ═════════════════════ */
.fp-plates {
    display: grid;
    grid-template-columns: 1.15fr 1fr;
    gap: 1.5rem;
    margin-top: 2.6rem;
}
.plate {
    position: relative;
    background: linear-gradient(155deg, rgba(22, 32, 44, .9), rgba(14, 22, 32, .95));
    border: 1px solid var(--ink-line);
    border-radius: 6px;
    padding: 1.4rem 1.5rem 1.45rem;
    box-shadow: 0 14px 34px rgba(0, 0, 0, .35);
    overflow: hidden;
}
.plate.gold { border-color: rgba(232, 200, 137, .35); }
.plate-kick {
    display: flex; align-items: baseline; gap: .65rem;
    font-family: var(--mono); font-weight: 700;
    font-size: .54rem; letter-spacing: .28em; text-transform: uppercase;
    color: var(--gold);
    margin-bottom: .85rem;
}
.plate-kick .tier {
    margin-left: auto;
    padding: .15rem .45rem;
    font-size: .48rem; letter-spacing: .22em;
    color: var(--gold);
    border: 1px solid rgba(232, 200, 137, .35);
    border-radius: 2px;
}
.plate-title {
    font-family: var(--serif); font-style: italic;
    font-size: 1.55rem; line-height: 1.05;
    color: var(--cream);
    margin-bottom: .5rem;
}
.plate-sub {
    font-family: var(--serif); font-style: italic;
    font-size: .86rem; line-height: 1.55;
    color: var(--cream-soft);
    margin-bottom: 1.05rem;
}
.plate-cta {
    display: inline-block;
    padding: .55rem 1.05rem;
    font-family: var(--mono); font-weight: 700;
    font-size: .6rem; letter-spacing: .2em; text-transform: uppercase;
    color: var(--ink);
    background: var(--gold);
    border: 1px solid var(--gold);
    border-radius: 2px;
    text-decoration: none;
    transition: background .15s, color .15s;
}
.plate-cta:hover { background: var(--gold-bright); }
.plate-cta.ghost { background: transparent; color: var(--gold); }
.plate-cta.ghost:hover { background: rgba(232, 200, 137, .1); color: var(--gold-bright); }
.plate-cta.locked {
    background: transparent;
    border-color: var(--ink-line);
    color: var(--cream-mute);
    cursor: not-allowed;
}
.plate.is-locked { opacity: .78; }
.plate.is-locked .plate-title { color: var(--cream-soft); }

/* The lineup shelf: numbered tiles at first, then the real seven
   (headshot + finish) once the pool data streams in. */
.plate-slots { display: flex; gap: .45rem; margin-bottom: 1.15rem; }
.plate-slot {
    flex: 1;
    aspect-ratio: 3 / 3.8;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: .3rem;
    border: 1px solid rgba(232, 200, 137, .3);
    border-radius: 3px;
    background: linear-gradient(180deg, rgba(232, 200, 137, .08), rgba(232, 200, 137, .02));
    font-family: var(--mono); font-weight: 700;
    font-size: .56rem; letter-spacing: .12em;
    color: var(--gold);
    overflow: hidden;
    padding: 0;
}
.plate-slot i {
    font-family: var(--serif); font-style: italic; font-weight: 400;
    font-size: 1.05rem; color: var(--cream-soft);
}
.plate-slot.filled { justify-content: flex-end; gap: .25rem; padding-bottom: .4rem; position: relative; }
.plate-slot.filled img {
    position: absolute; top: 0; left: 0; right: 0;
    width: 100%; height: 62%;
    object-fit: cover; object-position: center top;
    border-bottom: 1px solid rgba(232, 200, 137, .25);
}
.plate-slot.filled .ps-fin {
    margin-top: auto;
    font-size: .6rem; letter-spacing: .1em;
    line-height: 1;
}
.plate-slot.filled .ps-year {
    font-family: var(--mono); font-weight: 400;
    font-size: .48rem; letter-spacing: .14em;
    color: var(--cream-mute);
}
.plate.is-locked .plate-slot { border-color: var(--ink-line-soft); color: var(--cream-mute); }
.plate.is-locked .plate-slot i { color: var(--cream-mute); }

/* Manager DNA plate — the cyan specimen keeps its lab identity. */
.plate.dna { border-color: rgba(79, 209, 255, .22); }
.plate.dna .plate-kick { color: rgba(79, 209, 255, .85); }
.pdna-barcode { display: flex; height: 14px; gap: 2px; margin-bottom: .8rem; }
.pdna-band { flex: 1; border-radius: 1px; }
.pdna-band.b-cyan    { background: rgba(79, 209, 255, var(--a, .8)); }
.pdna-band.b-magenta { background: rgba(255, 93, 177, var(--a, .8)); }
.pdna-band.b-lime    { background: rgba(216, 255, 93,  var(--a, .8)); }
.pdna-band.b-amber   { background: rgba(255, 203, 107, var(--a, .8)); }
.pdna-band.b-mute    { background: rgba(122, 131, 166, var(--a, .3)); }
.pdna-arch {
    font-family: var(--serif); font-style: italic;
    font-size: 1.45rem; line-height: 1.05;
    color: #f0f2ff;
    margin-bottom: .2rem;
}
.pdna-tagline {
    font-family: var(--mono);
    font-size: .56rem; letter-spacing: .2em; text-transform: uppercase;
    color: rgba(255, 93, 177, .8);
    margin-bottom: .7rem;
}
.pdna-traits { display: flex; flex-wrap: wrap; gap: .35rem; margin-bottom: .85rem; }
.pdna-trait {
    display: inline-flex; align-items: center; gap: .35rem;
    padding: .25rem .55rem;
    background: rgba(79, 209, 255, .05);
    border: 1px solid rgba(79, 209, 255, .22);
    border-radius: 2px;
    font-family: var(--mono);
    font-size: .52rem; letter-spacing: .14em; text-transform: uppercase;
    color: var(--cream-soft);
}
.pdna-trait::before {
    content: '';
    width: 5px; height: 5px; border-radius: 50%;
    background: #4fd1ff; flex-shrink: 0;
}
/* Signal readouts fill out the specimen card. */
.pdna-sigs {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: .45rem .9rem;
    margin-bottom: 1rem;
    padding-top: .75rem;
    border-top: 1px dashed rgba(79, 209, 255, .18);
}
.pdna-sig { display: flex; justify-content: space-between; align-items: baseline; gap: .5rem; }
.pdna-sig-label {
    font-family: var(--mono);
    font-size: .5rem; letter-spacing: .14em; text-transform: uppercase;
    color: var(--cream-mute);
}
.pdna-sig-val {
    font-family: var(--mono); font-weight: 700;
    font-size: .66rem;
    color: #82e0ff;
}
.plate.dna .plate-cta.ghost { border-color: rgba(79, 209, 255, .35); color: #82e0ff; }
.plate.dna .plate-cta.ghost:hover { background: rgba(79, 209, 255, .1); }
.plate.dna.is-locked { border-color: var(--ink-line); }
.pdna-locked-msg {
    font-family: var(--serif); font-style: italic;
    font-size: .85rem; line-height: 1.5;
    color: var(--cream-soft);
    margin-bottom: 1rem;
}

/* ══ The spread: main column + margin rail ═══════════════════ */
.spread {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 340px;
    gap: 1.8rem;
    align-items: start;
    margin-top: 2.6rem;
}
.spread-main { min-width: 0; }

.region {
    position: relative;
    background: linear-gradient(180deg, rgba(26, 37, 50, .5), rgba(26, 37, 50, .22));
    border: 1px solid var(--ink-line);
    border-radius: 6px;
    padding: 1.7rem 1.9rem 1.9rem;
    overflow: hidden;
}
.region + .region { margin-top: 2rem; }
.region::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--gold);
    opacity: .75;
}
.region[data-accent="steel"]::before { background: var(--steel); }
.region[data-accent="rust"]::before  { background: var(--rust); }
.region[data-accent="cream"]::before { background: var(--cream-soft); opacity: .4; }

.fs-head {
    display: flex; align-items: baseline; gap: 1.2rem;
    border-bottom: 3px double var(--ink-line);
    padding-bottom: .7rem;
    margin-bottom: 1.4rem;
}
.fs-num {
    font-family: var(--mono); font-weight: 700;
    font-size: .56rem; letter-spacing: .3em; text-transform: uppercase;
    color: var(--gold); flex-shrink: 0;
}
.fs-title {
    font-family: var(--serif); font-style: italic;
    font-size: 1.45rem; letter-spacing: -.01em;
    color: var(--cream);
}
.fs-note {
    margin-left: auto; flex-shrink: 0;
    font-family: var(--mono);
    font-size: .53rem; letter-spacing: .15em; text-transform: uppercase;
    color: var(--cream-mute);
}
.fs-empty {
    font-family: var(--serif); font-style: italic;
    font-size: .95rem; color: var(--cream-mute);
    padding: .4rem 0 .2rem;
}

/* ── Margin rail ── */
.spread-rail { min-width: 0; }
.rail-card {
    border: 1px solid var(--ink-line);
    border-radius: 6px;
    background: rgba(22, 32, 44, .35);
    padding: 1.15rem 1.25rem 1.2rem;
}
.rail-card + .rail-card, .note-card + .rail-card, .rail-card + .note-card { margin-top: 1.4rem; }
.rail-head {
    display: flex; align-items: baseline; justify-content: space-between; gap: .7rem;
    font-family: var(--mono); font-weight: 700;
    font-size: .54rem; letter-spacing: .26em; text-transform: uppercase;
    color: var(--gold);
    padding-bottom: .55rem; margin-bottom: .95rem;
    border-bottom: 2px solid var(--ink-line);
}
.rail-head .sub { color: var(--cream-mute); letter-spacing: .14em; font-weight: 400; }

/* Current form, compact for the rail. */
.now-rank { display: flex; align-items: baseline; gap: .55rem; margin-bottom: .8rem; }
.now-pos {
    font-family: var(--serif); font-style: italic;
    font-size: 2.6rem; line-height: 1;
    color: var(--gold);
}
.now-delta { font-family: var(--mono); font-weight: 700; font-size: .6rem; letter-spacing: .1em; }
.now-delta.up { color: #7fc79a; }
.now-delta.down { color: var(--rust); }
.now-delta.flat { color: var(--cream-mute); }
.now-team {
    margin-left: auto;
    font-family: var(--mono);
    font-size: .52rem; letter-spacing: .12em; text-transform: uppercase;
    color: var(--cream-mute);
    text-align: right;
}
.now-row {
    display: flex; align-items: baseline; gap: .55rem;
    padding: .4rem 0;
    border-bottom: 1px solid var(--ink-line-soft);
}
.now-row:last-of-type { border-bottom: none; }
.now-row-label {
    flex-shrink: 0;
    font-family: var(--mono); font-weight: 700;
    font-size: .52rem; letter-spacing: .16em; text-transform: uppercase;
    color: var(--cream-mute);
}
.now-row-dots { flex: 1; border-bottom: 1px dotted var(--ink-line); transform: translateY(-3px); }
.now-row-val {
    font-family: var(--sans); font-weight: 600;
    font-size: .78rem; color: var(--cream);
}
.form-dots { display: inline-flex; gap: .3rem; }
.form-dot {
    width: 15px; height: 15px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-weight: 700; font-size: .48rem;
    border: 1px solid var(--ink-line);
    color: var(--ink);
}
.form-dot.w { background: var(--gold); border-color: var(--gold); }
.form-dot.l { background: var(--rust); border-color: var(--rust); color: var(--cream); }
.form-dot.t { background: var(--cream-mute); border-color: var(--cream-mute); }

/* Records held, stacked for the rail. */
.rec-plate {
    position: relative;
    border: 1px solid var(--ink-line);
    background: rgba(14, 22, 32, .45);
    border-radius: 4px;
    padding: .85rem 1rem .8rem;
}
.rec-plate + .rec-plate { margin-top: .7rem; }
.rec-plate::before {
    content: ''; position: absolute; top: -1px; left: -1px; bottom: -1px;
    width: 3px; background: var(--gold);
    border-radius: 4px 0 0 4px;
}
.rec-plate.dub::before { background: var(--rust); }
.rec-cat {
    font-family: var(--mono); font-weight: 700;
    font-size: .5rem; letter-spacing: .18em; text-transform: uppercase;
    color: var(--cream-mute);
    margin-bottom: .35rem;
}
.rec-val {
    font-family: var(--serif); font-style: italic;
    font-size: 1.4rem; line-height: 1;
    color: var(--gold);
    margin-bottom: .3rem;
}
.rec-plate.dub .rec-val { color: var(--rust); }
.rec-ctx {
    font-family: var(--mono);
    font-size: .54rem; letter-spacing: .08em; text-transform: uppercase;
    color: var(--cream-mute);
}
.rec-shared {
    position: absolute; top: .6rem; right: .65rem;
    font-family: var(--mono); font-weight: 700;
    font-size: .46rem; letter-spacing: .14em; text-transform: uppercase;
    color: var(--cream-mute);
    border: 1px solid var(--ink-line);
    border-radius: 2px;
    padding: .08rem .28rem;
}
.rec-mentions {
    margin-top: .9rem;
    font-family: var(--serif); font-style: italic;
    font-size: .85rem; color: var(--cream-soft);
    line-height: 1.5;
}
.rec-mentions a { color: var(--gold); }

/* The notebook page: paper, taped into the margin. */
.note-card {
    position: relative;
    background:
        linear-gradient(172deg, var(--paper) 0%, var(--paper-soft) 100%);
    color: var(--ink-print);
    border: 1px solid #47402f;
    border-radius: 3px;
    padding: 1.5rem 1.3rem 1.2rem;
    box-shadow: 0 14px 30px rgba(0, 0, 0, .4);
    transform: rotate(.5deg);
    margin-top: 1.4rem;
}
/* The tape. */
.note-card::before {
    content: '';
    position: absolute; top: -9px; left: 50%;
    transform: translateX(-50%) rotate(-1.5deg);
    width: 92px; height: 20px;
    background: rgba(239, 229, 205, .5);
    border: 1px solid rgba(40, 30, 12, .12);
}
.note-head {
    font-family: var(--mono); font-weight: 700;
    font-size: .54rem; letter-spacing: .26em; text-transform: uppercase;
    color: var(--gold-print);
    padding-bottom: .5rem; margin-bottom: .8rem;
    border-bottom: 2px solid var(--paper-line);
}
.note-line {
    display: flex; gap: .55rem;
    font-family: var(--serif); font-style: italic;
    font-size: .92rem; line-height: 1.5;
    color: #3a3020;
    padding: .3rem 0;
}
.note-line + .note-line { border-top: 1px dotted var(--paper-line-soft); }
.note-line::before { content: '✦'; flex-shrink: 0; color: var(--gold-print); font-style: normal; font-size: .7rem; padding-top: .25rem; }

/* Cross-references. */
.xref-link {
    display: flex; align-items: baseline; gap: .6rem;
    padding: .55rem 0;
    border-bottom: 1px solid var(--ink-line-soft);
    font-family: var(--mono); font-weight: 700;
    font-size: .6rem; letter-spacing: .18em; text-transform: uppercase;
    color: var(--cream-soft);
    text-decoration: none;
    transition: color .15s;
}
.xref-link:last-child { border-bottom: none; }
.xref-link:hover { color: var(--gold-bright); }
.xref-link::before { content: '✦'; color: var(--gold); font-size: .55rem; }
.xref-link .sub { margin-left: auto; color: var(--cream-mute); font-weight: 400; letter-spacing: .1em; }

/* ══ § Career splits ═════════════════════════════════════════ */
.split-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.4rem; }
.split-col {
    position: relative;
    border: 1px solid var(--ink-line);
    background: rgba(14, 22, 32, .45);
    border-radius: 4px;
    padding: 1.3rem 1.5rem 1.2rem;
}
.split-col::before {
    content: ''; position: absolute; top: -1px; left: -1px; bottom: -1px;
    width: 3px; background: var(--gold);
    border-radius: 4px 0 0 4px;
}
.split-col.playoff::before { background: var(--rust); }
.split-label {
    font-family: var(--mono); font-weight: 700;
    font-size: .56rem; letter-spacing: .25em; text-transform: uppercase;
    color: var(--gold); margin-bottom: .7rem;
}
.split-col.playoff .split-label { color: var(--rust); }
.split-record {
    font-family: var(--serif);
    font-size: 2.5rem; line-height: 1; letter-spacing: -.02em;
    color: var(--cream);
    margin-bottom: .35rem;
}
.split-pct {
    font-family: var(--mono); font-weight: 700;
    font-size: .78rem; letter-spacing: .15em;
    color: var(--cream-soft);
    margin-bottom: .7rem;
}
.split-pf {
    font-family: var(--mono);
    font-size: .62rem; letter-spacing: .15em; text-transform: uppercase;
    color: var(--cream-mute);
}

/* ══ Tables (ledger, top5, h2h) ══════════════════════════════ */
.ptable-wrap {
    overflow-x: auto;
    border: 1px solid var(--ink-line);
    border-radius: 4px;
    background: rgba(14, 22, 32, .45);
}
.ptable { width: 100%; min-width: max-content; border-collapse: collapse; font-size: .82rem; }
.ptable thead th {
    font-family: var(--mono); font-weight: 700;
    font-size: .55rem; letter-spacing: .18em; text-transform: uppercase;
    padding: .65rem .8rem;
    background: rgba(22, 32, 44, .9);
    border-bottom: 2px solid var(--ink-line);
    color: var(--cream-mute);
    text-align: left; white-space: nowrap;
}
.ptable th.num { text-align: right; }
.ptable td {
    padding: .7rem .8rem;
    border-bottom: 1px solid var(--ink-line-soft);

}
.ptable tbody tr:last-child td { border-bottom: none; }
.ptable tbody tr:hover td { background: rgba(232, 200, 137, .04); }
.ptable td.num { text-align: right; font-variant-numeric: tabular-nums; }
.ptable td.year {

}

.ptable td.fin.silver { color: #c0c0c0; }
.ptable td.fin.bronze { color: #cd7f32; }
.ptable td.win  { color: var(--gold); font-family: var(--mono); font-weight: 700; }
.ptable td.loss { color: var(--rust); font-family: var(--mono); font-weight: 700; }
.ptable td.rec { font-family: var(--mono); font-weight: 700; font-size: .72rem; }
.ptable td.rec.winning { color: var(--gold); }
.ptable td.rec.losing  { color: var(--rust); }
.ptable td.score {
    font-family: var(--serif); font-style: italic;

}
tr.champ-row td { background: rgba(232, 200, 137, .06) !important; }

/* ══ § Head-to-head callouts ═════════════════════════════════ */
.h2h-callouts { display: grid; grid-template-columns: 1fr 1fr; gap: 1.4rem; margin-bottom: 1.3rem; }
.h2h-call {

}
.h2h-call::before {

}
.h2h-call.bogey::before { background: var(--rust); }
.h2h-call-label {
    font-family: var(--mono); font-weight: 700;
    font-size: .52rem; letter-spacing: .24em; text-transform: uppercase;
    color: var(--gold);
    margin-bottom: .4rem;
}
.h2h-call.bogey .h2h-call-label { color: var(--rust); }
.h2h-call-name {
    font-family: var(--serif); font-style: italic;
    font-size: 1.45rem; line-height: 1;
    color: var(--cream);
    margin-bottom: .35rem;
}
.h2h-call-rec {
    font-family: var(--mono); font-weight: 700;
    font-size: .62rem; letter-spacing: .12em; text-transform: uppercase;

}

/* ══ § At the podium ═════════════════════════════════════════ */
.podium-grid {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 2.4rem;
    align-items: start;
}
.pod-fact {
    display: flex; align-items: baseline; gap: .7rem;

    border-bottom: 1px solid var(--ink-line-soft);
}
.pod-fact:first-child { border-top: 1px solid var(--ink-line); }
.pod-fact-label {
    flex-shrink: 0;
    font-family: var(--mono); font-weight: 700;
    font-size: .55rem; letter-spacing: .2em; text-transform: uppercase;
    color: var(--cream-mute);
}
.pod-fact-dots { flex: 1; border-bottom: 1px dotted var(--ink-line); transform: translateY(-3px); }
.pod-fact-val {
    font-family: var(--sans); font-weight: 600;

}
.pod-fact-val .sub { font-family: var(--mono); font-weight: 400; font-size: .6rem; color: var(--cream-mute); margin-left: .3em; }
.pod-bars { margin-top: 1.5rem; }
.pod-bars-label, .lineage-label {
    font-family: var(--mono); font-weight: 700;
    font-size: .55rem; letter-spacing: .3em; text-transform: uppercase;
    color: var(--cream-mute);
    padding-bottom: .55rem;
    border-bottom: 2px solid var(--ink-line);
}
.pod-bars-label { margin-bottom: .7rem; }
.lineage-label { margin-bottom: .2rem; }
.pod-bar-row { display: flex; align-items: center; gap: .7rem; margin-bottom: .5rem; }
.pod-bar-pos {
    flex-shrink: 0; width: 2.4rem;
    font-family: var(--mono); font-weight: 700; font-size: .6rem;

}
.pod-bar-track { flex: 1; height: 10px; background: rgba(232, 200, 137, .07); border-radius: 1px; overflow: hidden; }
.pod-bar-fill { display: block; height: 100%; border-radius: 1px; }
.pod-bar-n {
    flex-shrink: 0; width: 3.4rem; text-align: right;

}
.pp-qb  { color: var(--pos-qb); }  .pod-bar-fill.pp-qb  { background: var(--pos-qb); }
.pp-rb  { color: var(--pos-rb); }  .pod-bar-fill.pp-rb  { background: var(--pos-rb); }
.pp-wr  { color: var(--pos-wr); }  .pod-bar-fill.pp-wr  { background: var(--pos-wr); }
.pp-te  { color: var(--pos-te); }  .pod-bar-fill.pp-te  { background: var(--pos-te); }
.pp-k   { color: var(--pos-k); }   .pod-bar-fill.pp-k   { background: var(--pos-k); }
.pp-def { color: var(--pos-def); } .pod-bar-fill.pp-def { background: var(--pos-def); }

.lineage-row {

.lineage-year {

}
.lineage-player {

}
.lineage-pos {
    flex-shrink: 0;
    font-family: var(--mono); font-weight: 700;

}

    margin-left: auto; flex-shrink: 0;
    font-family: var(--mono); font-size: .56rem;
    color: var(--cream-mute);
}
.pod-link {
    display: inline-block; margin-top: 1.3rem;
    font-family: var(--mono); font-weight: 700;
    font-size: .58rem; letter-spacing: .2em; text-transform: uppercase;
    color: var(--gold);
    text-decoration: none;
    border-bottom: 1px solid var(--ink-line);
    padding-bottom: .2rem;
}
.pod-link:hover { color: var(--gold-bright); }

/* ══ UDFA locked note ════════════════════════════════════════ */
.locked-note {
    border: 1px dashed var(--ink-line);
    border-radius: 4px;

    font-family: var(--serif); font-style: italic;

}
.locked-note a { color: var(--gold); }
.locked-note .lk {
    display: block;
    font-family: var(--mono); font-weight: 700; font-style: normal;
    font-size: .52rem; letter-spacing: .24em; text-transform: uppercase;
    color: var(--cream-mute);
    margin-bottom: .4rem;
}

/* ══ End of file ═════════════════════════════════════════════ */
.file-folio {
    margin-top: 3.4rem;
    text-align: center;
    font-family: var(--mono); font-weight: 700;
    font-size: .56rem; letter-spacing: .34em; text-transform: uppercase;
    color: var(--cream-mute);
}
.file-folio b { color: var(--gold); font-weight: 700; }

/* ══ States ══════════════════════════════════════════════════ */
.error-state, .loading-state { text-align: center; padding: 4.5rem 2rem; position: relative; z-index: 10; }
.error-state h1, .loading-state h1 {
    font-family: var(--serif); font-style: italic;
    font-size: 3rem; color: var(--cream); margin-bottom: 1rem;
}
.error-state p, .loading-state p {
    font-family: var(--serif); font-style: italic;
    font-size: 1.2rem; color: var(--cream-soft); margin-bottom: 1.5rem;
}
.error-state a {
    font-family: var(--mono); font-weight: 700;
    font-size: .7rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--gold); text-decoration: none;
}
.error-state a:hover { color: var(--gold-bright); }

/* Reveal: opacity only — transforms on big sections made the first
   scroll stutter, and the fade alone reads just as well. */
.fs-reveal { opacity: 0; transition: opacity .45s ease; }
.fs-reveal.is-in { opacity: 1; }
@media (prefers-reduced-motion: reduce) {
    .fs-reveal { opacity: 1; transition: none; }
}

/* ══ Responsive ══════════════════════════════════════════════ */
@media (max-width: 1100px) {
    .agate-inner { grid-template-columns: repeat(4, 1fr); }
    .ag-cell:nth-child(4n) { border-right: none; }

}

    .fp-plates { grid-template-columns: 1fr; }

}
@media (max-width: 640px) {

    .region { padding: 1.2rem 1rem 1.3rem; }
    .region + .region { margin-top: 1.5rem; }
    .spread-rail { grid-template-columns: 1fr; gap: 1.2rem; }
    .id-card { grid-template-columns: 1fr; gap: 1.3rem; padding: 1.4rem 1.2rem; transform: none; }

    .fp-name, .fp-dateline { text-align: center; }
    .fp-lede { max-width: none; }

    .ag-cell { border-right: 1px solid var(--ink-line-soft) !important; border-bottom: 1px solid var(--ink-line-soft); }
    .ag-cell:nth-child(2n) { border-right: none !important; }

    .split-row, .h2h-callouts { grid-template-columns: 1fr; }
    .fs-head { flex-wrap: wrap; gap: .5rem .9rem; }
    .fs-note { margin-left: 0; width: 100%; }
    .mast-title { font-size: clamp(2.6rem, 12vw, 4rem); }
}
</style>

<div class="site-glow"></div>

            <span class="ticker-item"><span class="ticker-star">★</span> {{LEAGUE_NAME_UPPER}} · THE MANAGER FILE</span>
        </div>
        <div class="ticker-group" id="ticker-2">
            <span class="ticker-item"><span class="ticker-star">★</span> {{LEAGUE_NAME_UPPER}} · THE MANAGER FILE</span>
        </div>
    </div>
</div>

<nav id="site-nav"
     data-page="manager-detail"
     data-chapter="CH. II · PROFILE"
     data-back-label="← Managers"
     data-back-href="managers/"
     data-title-id="nav-name"
     data-title-href="managers/"></nav>
<script src="/pams-template/assets/js/nav.js"></script>

<div id="profile-body">
    <div class="loading-state">
        <h1>Pulling the file…</h1>
        <p>Fetching the records.</p>
    </div>
</div>

<footer class="site-footer">
    <span>Built by <em>jzFF</em> · {{LEAGUE_ABBR}} · Since {{LEAGUE_FOUNDED}}</span><a href="/login?mode=signup" style="display:block;padding:1.1rem 0 0;font-family:var(--mono);font-size:.9rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);text-decoration:none;">Start your own league</a>
</footer>


<script>
/* ── Utilities ─────────────────────────────────────────────── */
function getUserIdFromURL() {
    return new URLSearchParams(window.location.search).get('id');
}

function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
}

function normName(name) {
    return (name || '').toLowerCase()
        .replace(/[.''']/g, '')
        .replace(/\s+(jr|sr|ii|iii|iv|v)$/i, '')
        .replace(/\s+/g, ' ')
        .trim();
}

function fmtPct(p) {
    if (p == null) return '·';
    return p.toFixed(3).replace(/^0\./, '.');
}

function finishClass(rank) {
    if (rank === 1) return 'gold';
    if (rank === 2) return 'silver';
    if (rank === 3) return 'bronze';
    return '';
}

function recordClass(record) {
    if (!record) return '';
    var parts = record.split('-').map(Number);
    if (parts.length < 2 || isNaN(parts[0])) return '';
    if (parts[0] > parts[1]) return 'winning';
    if (parts[1] > parts[0]) return 'losing';
    return '';
}

function parseRecord(record) {
    var p = String(record || '').split('-').map(Number);
    return { w: p[0] || 0, l: p[1] || 0, t: p[2] || 0 };
}

function initials(name) {
    return String(name || '?').trim().split(/\s+/).map(function (w) { return w[0]; })
        .join('').slice(0, 2).toUpperCase();
}

function hashStr(s) {
    var h = 0;
    for (var i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    return Math.abs(h);
}

function jget(url) {
    return fetch(url).then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; });
}

function isUdfa() {
    return !!(window.__DC && window.__DC.leagueTier === 'udfa');
}

/* Champion seal — printed inks, it lives on the paper index card. */
function miniSeal(year) {
    return '' +
        '<svg class="mini-seal" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">' +
            '<defs>' +
                '<path id="topArc' + year + '" d="M 20,100 A 80,80 0 0 1 180,100" fill="none"/>' +
                '<path id="bottomArc' + year + '" d="M 24,108 A 76,76 0 0 0 176,108" fill="none"/>' +
            '</defs>' +
            '<circle cx="100" cy="100" r="92" fill="none" stroke="#7a5c14" stroke-width="1.5" opacity="0.5"/>' +
            '<circle cx="100" cy="100" r="86" fill="none" stroke="#7a5c14" stroke-width="0.5" opacity="0.7"/>' +
            '<g fill="#7a5c14">' +
                '<circle cx="100" cy="14" r="1.5"/><circle cx="186" cy="100" r="1.5"/>' +
                '<circle cx="100" cy="186" r="1.5"/><circle cx="14" cy="100" r="1.5"/>' +
            '</g>' +
            '<text fill="#7a5c14" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" letter-spacing="3">' +
                '<textPath href="#topArc' + year + '" startOffset="50%" text-anchor="middle">★ {{LEAGUE_ABBR}} · CHAMPION ·</textPath>' +
            '</text>' +
            '<text fill="#7a5c14" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" letter-spacing="3">' +
                '<textPath href="#bottomArc' + year + '" startOffset="50%" text-anchor="middle">· ' + year + ' ·</textPath>' +
            '</text>' +
            '<g fill="#7a5c14">' +
                '<polygon points="100,42 102,49 109,49 103,53 105,60 100,56 95,60 97,53 91,49 98,49"/>' +
            '</g>' +
            '<text x="100" y="125" fill="#241c0e" font-family="DM Serif Display, serif" font-style="italic" ' +
                  'font-size="58" font-weight="400" letter-spacing="-0.04em" text-anchor="middle">' + year.toString().slice(-2) + '</text>' +
            '<line x1="70" y1="138" x2="130" y2="138" stroke="#7a5c14" stroke-width="0.8"/>' +
            '<text x="100" y="152" fill="#55482e" font-family="JetBrains Mono, monospace" ' +
                  'font-size="6.5" font-weight="700" letter-spacing="2" text-anchor="middle">CHAMPION</text>' +
        '</svg>';
}

function showError(msg) {
    document.getElementById('profile-body').innerHTML =
        '<div class="error-state">' +
            '<h1>Manager not found.</h1>' +
            '<p>' + esc(msg) + '</p>' +
            '<a href="managers/">View all managers</a>' +
        '</div>';
}

/* ── Load everything ───────────────────────────────────────── */
function loadProfile() {
    var userId = getUserIdFromURL();
    if (!userId) return showError('No manager ID was specified.');

    Promise.all([
        fetch('data/managers/' + encodeURIComponent(userId) + '.json')
            .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); }),
        jget('data/manager_highs.json'),
        jget('data/manager_dna.json'),
        jget('data/record_book.json'),
        jget('data/current_form.json'),
    ]).then(function (res) {
        var m = res[0];
        var highs = res[1];
        var dna = res[2];
        var recordBook = res[3];
        var currentForm = res[4];

        var top5 = [];
        if (highs && Array.isArray(highs)) {
            var entry = highs.find(function (h) { return String(h.user_id) === String(userId); });
            if (entry && Array.isArray(entry.top5)) top5 = entry.top5;
        }

        var dnaAvailable = !!(dna && Array.isArray(dna.managers));
        var dnaEntry = dnaAvailable
            ? (dna.managers.find(function (d) { return String(d.uid) === String(userId); }) || null)
            : null;

        try {
            renderProfile(m, top5, dnaEntry, dnaAvailable, recordBook, currentForm, userId);
        } catch (err) {
            showError('The file could not be rendered (' + err.message + '). Please report this.');
        }

        loadDraftIdentity(userId);
        enhanceAllTimePlate(userId);
    }).catch(function (err) {
        showError('The file could not be pulled (' + err.message + ').');
    });
}

/* ── Record book scan ──────────────────────────────────────── */
/* Category map: [group, key, label, dubious, keyFn, valueFn, ctxFn, matchFn]. */
function recordCategories() {
    function wCtx(r) { return 'W' + r.week + ' ' + r.season + ' vs ' + (r.opp_owner || '?'); }
    function sCtx(r) { return r.season + (r.team_name ? ' · ' + r.team_name : ''); }
    function stCtx(r) { return 'W' + r.start_week + ' ' + r.start_season + ' to W' + r.end_week + ' ' + r.end_season; }
    /* Weekly + season rows carry per-identity user_ids (a merged profile's
       NFL-era rows keep the NFL id), but every row is stamped with the
       profile's canonical owner name. Match on the name first, id second. */
    function selfMatch(r, uid, name) {
        return (r.owner && name && r.owner === name) || String(r.user_id) === String(uid);
    }
    function pairMatch(r, uid, name) {
        return selfMatch(r, uid, name) || (r.opp_owner && name && r.opp_owner === name) || String(r.opp_user_id) === String(uid);
    }
    return [
        ['weekly', 'highest_single_week_score', 'Highest single week', false,
            function (r) { return r.score; }, function (r) { return r.score.toFixed(2); }, wCtx, selfMatch],
        ['weekly', 'lowest_single_week_score', 'Lowest single week', true,
            function (r) { return r.score; }, function (r) { return r.score.toFixed(2); }, wCtx, selfMatch],
        ['weekly', 'biggest_blowouts', 'Biggest blowout', false,
            function (r) { return r.margin; }, function (r) { return '+' + r.margin.toFixed(2); }, wCtx, selfMatch],
        ['weekly', 'closest_games', 'Closest win', false,
            function (r) { return r.margin; }, function (r) { return '+' + r.margin.toFixed(2); }, wCtx, selfMatch],
        ['weekly', 'unluckiest_losses', 'Highest score in a loss', true,
            function (r) { return r.score; }, function (r) { return r.score.toFixed(2); }, wCtx, selfMatch],
        ['weekly', 'luckiest_wins', 'Lowest winning score', false,
            function (r) { return r.score; }, function (r) { return r.score.toFixed(2); }, wCtx, selfMatch],
        ['weekly', 'highest_combined_score', 'Highest combined score', false,
            function (r) { return r.combined_score; }, function (r) { return (r.combined_score || 0).toFixed(2); }, wCtx, pairMatch],
        ['weekly', 'lowest_combined_score', 'Lowest combined score', true,
            function (r) { return r.combined_score; }, function (r) { return (r.combined_score || 0).toFixed(2); }, wCtx, pairMatch],
        ['season', 'highest_season_pf', 'Most points in a season', false,
            function (r) { return r.reg_pf; }, function (r) { return Math.round(r.reg_pf).toLocaleString(); }, sCtx, selfMatch],
        ['season', 'highest_total_season_pf', 'Most points incl. playoffs', false,
            function (r) { return r.total_pf; }, function (r) { return Math.round(r.total_pf).toLocaleString(); }, sCtx, selfMatch],
        ['season', 'lowest_season_pf', 'Fewest points in a season', true,
            function (r) { return r.reg_pf; }, function (r) { return Math.round(r.reg_pf).toLocaleString(); }, sCtx, selfMatch],
        ['season', 'best_reg_season_records', 'Best season record', false,
            function (r) { return r.reg_win_pct; }, function (r) { return r.reg_record; }, sCtx, selfMatch],
        ['season', 'worst_reg_season_records', 'Worst season record', true,
            function (r) { return r.reg_win_pct; }, function (r) { return r.reg_record; }, sCtx, selfMatch],
        ['season', 'highest_ppg', 'Best PPG season', false,
            function (r) { return r.reg_ppg; }, function (r) { return r.reg_ppg.toFixed(1); }, sCtx, selfMatch],
        ['season', 'lowest_ppg', 'Worst PPG season', true,
            function (r) { return r.reg_ppg; }, function (r) { return r.reg_ppg.toFixed(1); }, sCtx, selfMatch],
        ['season', 'most_points_against', 'Most points against', true,
            function (r) { return r.reg_pa; }, function (r) { return Math.round(r.reg_pa).toLocaleString(); }, sCtx, selfMatch],
        ['career', 'longest_win_streaks', 'Longest win streak', false,
            function (r) { return r.length; }, function (r) { return r.length + ' straight'; }, stCtx, selfMatch],
        ['career', 'longest_loss_streaks', 'Longest losing streak', true,
            function (r) { return r.length; }, function (r) { return r.length + ' straight'; }, stCtx, selfMatch],
    ];
}

function scanRecordBook(recordBook, uid, name) {
    if (!recordBook || !recordBook.full_book) return null;
    var book = recordBook.full_book;
    var held = [];
    var mentions = 0;
    recordCategories().forEach(function (cat) {
        var group = cat[0], key = cat[1], label = cat[2], dubious = cat[3];
        var keyFn = cat[4], valFn = cat[5], ctxFn = cat[6], matchFn = cat[7];
        var rows = (book[group] || {})[key];
        if (!Array.isArray(rows) || rows.length === 0) return;
        var topVal = keyFn(rows[0]);
        var holders = rows.filter(function (r) { return keyFn(r) === topVal; });
        var mine = holders.find(function (r) { return matchFn(r, uid, name); });
        if (mine) {
            held.push({
                label: label,
                dubious: dubious,
                value: valFn(mine),
                ctx: ctxFn(mine),
                shared: holders.length > 1,
            });
        }
        rows.forEach(function (r) { if (matchFn(r, uid, name)) mentions++; });
    });
    return { held: held, mentions: mentions };
}

/* ── DNA plate ─────────────────────────────────────────────── */
function dnaTeaserBarcode(signals, seed) {
    function band(v, lo, hi, midColor, lowColor, highColor) {
        if (v == null) return { cls: 'mute', a: 0.3 };
        if (v < lo) return { cls: lowColor, a: 0.55 };
        if (v > hi) return { cls: highColor, a: 0.85 };
        return { cls: midColor, a: 0.65 };
    }
    var bands = [
        band(signals.efficiency_pct, 50, 80, 'cyan', 'amber', 'lime'),
        band(signals.lineup_churn_pct, 12, 28, 'cyan', 'lime', 'magenta'),
        band(signals.volatility_pct, 14, 26, 'cyan', 'lime', 'amber'),
        band(signals.draft_rb_share_pct, 30, 60, 'cyan', 'lime', 'amber'),
        band(signals.trades_per_season, 0.6, 2.5, 'cyan', 'mute', 'magenta'),
    ];
    var palette = ['cyan', 'magenta', 'mute', 'cyan', 'lime', 'mute', 'magenta'];
    var h = seed;
    while (bands.length < 12) {
        bands.push({ cls: palette[h % palette.length], a: 0.3 + ((h % 50) / 100) });
        h = Math.floor(h / 3) + (h * 11) % 233;
    }
    return bands.map(function (b) {
        return '<span class="pdna-band b-' + b.cls + '" style="--a:' + b.a.toFixed(2) + '"></span>';
    }).join('');
}

function renderDnaPlate(dnaEntry, dnaAvailable, managerName) {
    if (!dnaAvailable || !dnaEntry) {
        return '' +
            '<div class="plate dna is-locked">' +
                '<div class="plate-kick">Manager DNA<span class="tier">★ Veteran ★</span></div>' +
                '<div class="pdna-arch">Sequencing locked.</div>' +
                '<p class="pdna-locked-msg">Behavioral DNA, archetypes, trait markers, and the genome lab unlock when this league’s commissioner is on the Veteran tier.</p>' +
                '<span class="plate-cta locked">Manager DNA</span>' +
            '</div>';
    }
    var traits = (dnaEntry.traits || []).slice(0, 3);
    var traitsHtml = traits.map(function (t) {
        return '<span class="pdna-trait" title="' + esc(t.detail) + '">' + esc(t.label) + '</span>';
    }).join('');
    var seed = hashStr((managerName || '') + '|' + ((dnaEntry.archetype || {}).key || ''));
    var barcode = dnaTeaserBarcode(dnaEntry.signals || {}, seed);

    /* Signal readouts — fills the specimen card out with the numbers
       behind the barcode. Only signals that exist get a row. */
    var sig = dnaEntry.signals || {};
    function sigRow(label, v, fmt) {
        if (v == null) return '';
        return '<span class="pdna-sig"><span class="pdna-sig-label">' + label + '</span>' +
            '<span class="pdna-sig-val">' + fmt(v) + '</span></span>';
    }
    var sigs =
        sigRow('Efficiency', sig.efficiency_pct, function (v) { return Math.round(v) + '%'; }) +
        sigRow('Lineup churn', sig.lineup_churn_pct, function (v) { return Math.round(v) + '%'; }) +
        sigRow('Volatility', sig.volatility_pct, function (v) { return Math.round(v) + '%'; }) +
        sigRow('Trades / yr', sig.trades_per_season, function (v) { return v.toFixed(1); }) +
        sigRow('RB draft share', sig.draft_rb_share_pct, function (v) { return Math.round(v) + '%'; });
    var sigsHtml = sigs ? '<div class="pdna-sigs">' + sigs + '</div>' : '';

    return '' +
        '<div class="plate dna">' +
            '<div class="plate-kick">Manager DNA · Specimen</div>' +
            '<div class="pdna-barcode">' + barcode + '</div>' +
            '<div class="pdna-arch">' + esc(dnaEntry.archetype.name) + '</div>' +
            '<div class="pdna-tagline">' + esc(dnaEntry.archetype.tagline) + '</div>' +
            (traits.length ? '<div class="pdna-traits">' + traitsHtml + '</div>' : '') +
            sigsHtml +
            '<a class="plate-cta ghost" href="live/manager-dna/">See the full strand</a>' +
        '</div>';
}

/* After first paint: pull the pool + rank files and swap the numbered
   tiles for the real starting seven (headshot, finish, year). Quietly
   keeps the placeholders if anything is missing. */
function enhanceAllTimePlate(uid) {
    if (isUdfa()) return;
    var mount = document.getElementById('atSlots');
    if (!mount) return;
    Promise.all([jget('data/league.json'), jget('data/all_time_pool.json')]).then(function (res) {
        var profile = (res[0] && res[0].draft_scoring_profile) || 'ppr_6pt';
        var pool = res[1];
        if (!pool || !Array.isArray(pool.managers)) return;
        var mgr = pool.managers.find(function (x) { return String(x.user_id) === String(uid); });
        if (!mgr) return;
        var years = mgr.seasons.map(function (se) { return se.year; });
        Promise.all(years.map(function (y) {
            return jget('/data/fantasy_ranks/' + profile + '/' + y + '.json');
        })).then(function (files) {
            var ranks = {};
            files.forEach(function (d, i) {
                if (!d || !Array.isArray(d.players)) return;
                var byPos = {};
                d.players.forEach(function (p) {
                    var pos = (p.position || '?').toUpperCase();
                    (byPos[pos] = byPos[pos] || []).push(p);
                });
                var lookup = {};
                Object.keys(byPos).forEach(function (pos) {
                    byPos[pos].sort(function (a, b) { return (b.fpts || 0) - (a.fpts || 0); });
                    byPos[pos].forEach(function (p, j) {
                        lookup[normName(p.player_name)] = { fpts: p.fpts || 0, posRank: j + 1, pid: p.player_id || null, pos: pos };
                    });
                });
                ranks[years[i]] = lookup;
            });

            var best = {};
            mgr.seasons.forEach(function (se) {
                var lookup = ranks[se.year];
                if (!lookup) return;
                se.players.forEach(function (p) {
                    var key = normName(p.name);
                    var lk = lookup[key];
                    if (!lk || !lk.fpts) return;
                    var cand = { key: key, name: p.name, pos: lk.pos, year: se.year, fpts: lk.fpts, posRank: lk.posRank, pid: lk.pid };
                    if (!best[key] || cand.fpts > best[key].fpts) best[key] = cand;
                });
            });
            var all = Object.keys(best).map(function (k) { return best[k]; })
                .sort(function (a, b) { return b.fpts - a.fpts; });
            var used = {};
            function take(filter) {
                for (var i = 0; i < all.length; i++) {
                    var c = all[i];
                    if (used[c.key]) continue;
                    if (filter(c)) { used[c.key] = 1; return c; }
                }
                return null;
            }
            var picks = [
                take(function (c) { return c.pos === 'QB'; }),
                take(function (c) { return c.pos === 'RB'; }),
                take(function (c) { return c.pos === 'RB'; }),
                take(function (c) { return c.pos === 'WR'; }),
                take(function (c) { return c.pos === 'WR'; }),
                take(function (c) { return c.pos === 'TE'; }),
                take(function (c) { return c.pos === 'RB' || c.pos === 'WR' || c.pos === 'TE'; }),
            ];
            var labels = ['QB', 'RB', 'RB', 'WR', 'WR', 'TE', 'FLX'];
            if (!picks.some(function (p) { return p; })) return;
            mount.innerHTML = picks.map(function (p, i) {
                if (!p) return '<span class="plate-slot"><i>' + (i + 1) + '</i>' + labels[i] + '</span>';
                var img = p.pid
                    ? '<img loading="lazy" alt="" src="https://sleepercdn.com/content/nfl/players/thumb/' + p.pid + '.jpg" onerror="this.remove()">'
                    : '';
                return '<span class="plate-slot filled" title="' + esc(p.name) + ' · ' + p.fpts.toFixed(1) + ' pts">' +
                    img +
                    '<span class="ps-fin">' + p.pos + p.posRank + '</span>' +
                    '<span class="ps-year">’' + String(p.year).slice(-2) + '</span>' +
                '</span>';
            }).join('');
        });
    });
}

/* ── Current form (margin rail) ────────────────────────────── */
function renderNowRail(currentForm, uid) {
    if (!currentForm || !Array.isArray(currentForm.rows)) return '';
    var row = currentForm.rows.find(function (r) { return String(r.user_id) === String(uid); });
    if (!row) return '';
    var title = currentForm.is_final
        ? currentForm.year + ' Final'
        : 'Week ' + currentForm.week;
    var delta = row.pos_change || 0;
    var deltaHtml = delta > 0 ? '<span class="now-delta up">▲ ' + delta + '</span>'
        : delta < 0 ? '<span class="now-delta down">▼ ' + Math.abs(delta) + '</span>'
        : '<span class="now-delta flat">· even</span>';
    var formHtml = (row.form || []).slice().reverse().map(function (r) {
        return '<span class="form-dot ' + r.toLowerCase() + '">' + r + '</span>';
    }).join('');
    var gb = typeof row.gb === 'number'
        ? (row.gb > 0 ? '+' + row.gb.toFixed(1) : row.gb.toFixed(1))
        : '·';
    var diff = typeof row.pt_diff_5 === 'number'
        ? (row.pt_diff_5 > 0 ? '+' + row.pt_diff_5.toFixed(1) : row.pt_diff_5.toFixed(1))
        : '·';
    function nrow(label, val) {
        return '<div class="now-row"><span class="now-row-label">' + label + '</span>' +

    }
    return '' +
        '<div class="rail-card fs-reveal">' +
            '<div class="rail-head"><span>Current Form</span><span class="sub">' + esc(title) + '</span></div>' +
            '<div class="now-rank"><span class="now-pos">#' + row.pos + '</span>' + deltaHtml +
                '<span class="now-team">' + esc(row.team || '') + '</span></div>' +
            nrow('Record', esc(row.record)) +
            nrow('Points for', Math.round(row.pts).toLocaleString()) +
            nrow('PPG · last 5', (row.ppg5 || 0).toFixed(1)) +
            nrow('Pt diff · last 5', diff) +
            nrow('Games back', gb) +
            nrow('Form', '<span class="form-dots">' + formHtml + '</span>') +
        '</div>';
}

/* ── The notebook: margin jottings from the data ───────────── */
function renderNotebook(m, top5) {
    var notes = [];
    if (m.championships > 0) {
        notes.push('Champion in ' + m.championship_seasons.join(', ') + '.');
    } else {
        var ranks = (m.season_ledger || []).filter(function (s) { return s.final_rank != null; });
        if (ranks.length) {
            var bestRow = ranks.reduce(function (a, b) { return b.final_rank < a.final_rank ? b : a; });
            notes.push('Best finish so far: #' + bestRow.final_rank + ' in ' + bestRow.year + '. The first title is still out there.');
        }
    }
    if (top5 && top5.length) {
        var g = top5[0];
        notes.push('Career-high ' + g.score.toFixed(2) + ' came in W' + g.week + ' ' + g.season + ' against ' + g.opp_name + '.');
    }
    if (m.playoff_appearances != null && m.seasons_played) {
        notes.push('Reached the playoffs in ' + m.playoff_appearances + ' of ' + m.seasons_played + ' seasons.');
    }
    var careerPf = Math.round((m.reg_pf || 0) + (m.playoff_pf || 0));
    if (careerPf > 0) {
        notes.push(careerPf.toLocaleString() + ' career points' + (m.is_current === false ? ' in the books.' : ' and counting.'));
    }
    if (m.longest_win_streak && m.longest_win_streak.length >= 4) {
        notes.push('Longest heater: ' + m.longest_win_streak.length + ' straight wins (' + m.longest_win_streak.when + ').');
    }
    notes = notes.slice(0, 4);
    if (!notes.length) return '';
    return '' +
        '<div class="note-card fs-reveal">' +
            '<div class="note-head">From the notebook</div>' +
            notes.map(function (n) { return '<div class="note-line">' + esc(n) + '</div>'; }).join('') +
        '</div>';
}

    'kansas city chiefs': 'KC', 'las vegas raiders': 'LV', 'oakland raiders': 'LV',
    'los angeles chargers': 'LAC', 'san diego chargers': 'LAC',
    'los angeles rams': 'LAR', 'st. louis rams': 'LAR',
    'miami dolphins': 'MIA', 'minnesota vikings': 'MIN', 'new england patriots': 'NE',
    'new orleans saints': 'NO', 'new york giants': 'NYG', 'new york jets': 'NYJ',
    'philadelphia eagles': 'PHI', 'pittsburgh steelers': 'PIT',
