<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Season · {{LEAGUE_NAME}}</title>
<link rel="stylesheet" href="/pams-template/assets/css/main.css">
<style>
/* ============================================================
   SEASON DETAIL · "THE VOLUME"
   Navy room. Chapters render in order, numbered at runtime:
     Champion (seal + road to the title)
     Podium
     The Race        · standings position week by week   [needs matchups]
     The Postseason  · bracket by round                  [needs matchups]
     Final Table     · + luck column                     [luck needs matchups]
     Week by Week    · the score grid                    [needs matchups]
     Superlatives    · computed from the schedule        [needs matchups]
   Older data files without `matchups` just skip those chapters.
   ============================================================ */

/* Section titles pinned to the true center line, whatever the kicker and
   meta widths are on either side. */
@media (min-width: 720px) {
    .section-header {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: baseline;
    }
    .section-num   { justify-self: start; }
    .section-title { text-align: center; }
    .section-meta  { justify-self: end; text-align: right; }
}

/* ─── Hero ─── */
.season-hero {
    position: relative; z-index: 10;
    padding: 4rem 2rem 3rem;
    max-width: 1100px; margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 3rem;
    align-items: end;
}
@media (max-width: 700px) {
    .season-hero { grid-template-columns: 1fr; gap: 1.25rem; }
}
.hero-kicker {
    font-family: var(--mono); font-weight: 700;
    font-size: .65rem; letter-spacing: .4em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 1.2rem;
}
@media (max-width: 700px) {
    .hero-kicker {
        font-size: .5rem; letter-spacing: .25em;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        margin-bottom: .85rem;
    }
}
@media (max-width: 420px) {
    .hero-kicker { font-size: .44rem; letter-spacing: .18em; }
}
.hero-year {
    font-family: var(--serif); font-style: italic;
    font-size: clamp(6rem, 18vw, 14rem);
    line-height: .85; letter-spacing: -.05em;
    color: var(--cream);
    margin-bottom: 1rem;
}
.hero-sub {
    font-family: var(--serif); font-style: italic;
    font-size: 1.3rem; line-height: 1.4;
    color: var(--cream-soft);
}
.hero-sub strong { color: var(--gold); font-style: normal; font-family: var(--sans); font-weight: 700; }

.hero-right {
    display: flex; flex-direction: column;
    align-items: flex-end; gap: .6rem;
    padding-bottom: .5rem;
}
@media (max-width: 700px) {
    .hero-right {
        flex-direction: row !important;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: .5rem;
        padding-bottom: 0;
    }
}
.hero-nav-year {
    font-family: var(--mono); font-weight: 700;
    font-size: .6rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--cream-mute); text-decoration: none;
    padding: .5rem .8rem;
    border: 1px solid var(--ink-line);
    background: var(--ink-card);
    transition: color .2s, border-color .2s;
    white-space: nowrap;
}
.hero-nav-year:hover { color: var(--gold); border-color: rgba(232,200,137,.4); }

/* ─── Season Stats Strip ─── */
.season-strip {
    position: relative; z-index: 10;
    max-width: 1100px; margin: 0 auto;
    padding: 0 2rem;
}
.strip-inner {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    background: var(--ink-card);
    border: 1px solid var(--ink-line);
}
.strip-cell {
    padding: 1.2rem 1.4rem;
    border-right: 1px solid var(--ink-line-soft);
    text-align: center;
}
.strip-cell:last-child { border-right: none; }
.strip-label {
    font-family: var(--mono); font-weight: 700;
    font-size: .55rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--cream-mute); margin-bottom: .4rem;
}
.strip-val {
    font-family: var(--serif); font-style: italic;
    font-size: 1.7rem; line-height: 1;
    color: var(--gold);
}
.strip-val.cream { color: var(--cream); font-style: normal; }
.strip-detail {
    font-family: var(--mono);
    font-size: .58rem; letter-spacing: .15em; text-transform: uppercase;
    color: var(--cream-mute); margin-top: .25rem;
}

/* ─── Champion Block ─── */
.champ-block {
    background: linear-gradient(135deg, rgba(232,200,137,.08) 0%, rgba(232,200,137,.02) 60%, transparent 100%);
    border: 1px solid var(--ink-line);
    border-left: 5px solid var(--gold);
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 2.5rem;
    align-items: center;
    padding: 2.5rem 3rem;
    position: relative;
    overflow: hidden;
}
@media (max-width: 900px) {
    .champ-block { grid-template-columns: 1fr; gap: 1.5rem; padding: 2rem 1.5rem 2rem 2rem; }
    .champ-seal-wrap { display: flex; justify-content: center; }
    .champ-profile-link { align-self: flex-start; }
}
.champ-block-watermark {
    position: absolute; right: 2.5rem; top: 50%;
    transform: translateY(-50%);
    font-family: var(--serif); font-style: italic;
    font-size: 12rem; line-height: 1;
    color: var(--gold); opacity: .04;
    pointer-events: none; user-select: none;
}
.champ-seal { width: 140px; height: 140px; flex-shrink: 0; }

.champ-kicker {
    font-family: var(--mono); font-weight: 700;
    font-size: .6rem; letter-spacing: .35em; text-transform: uppercase;
    color: var(--gold); margin-bottom: .75rem;
}
.champ-team-name {
    font-family: var(--serif); font-style: italic;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    line-height: .95; letter-spacing: -.03em;
    color: var(--cream);
    margin-bottom: .6rem;
}
.champ-owner-name {
    font-family: var(--mono); font-weight: 700;
    font-size: .72rem; letter-spacing: .25em; text-transform: uppercase;
    color: var(--cream-soft); margin-bottom: 1rem;
}
.champ-facts {
    display: flex; flex-wrap: wrap; gap: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--ink-line-soft);
}
.champ-fact-label {
    font-family: var(--mono); font-weight: 700;
    font-size: .55rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--cream-mute); margin-bottom: .2rem;
}
.champ-fact-val {
    font-family: var(--serif);
    font-size: 1.4rem; line-height: 1;
    color: var(--gold);
}
.champ-profile-link {
    display: inline-flex; align-items: center; gap: .6rem;
    font-family: var(--mono); font-weight: 700;
    font-size: .65rem; letter-spacing: .2em; text-transform: uppercase;
    color: var(--gold); text-decoration: none;
    padding: .7rem 1.2rem;
    border: 1px solid rgba(232,200,137,.3);
    background: rgba(232,200,137,.06);
    transition: background .2s, border-color .2s;
    white-space: nowrap; flex-shrink: 0; align-self: center;
}
.champ-profile-link:hover { background: rgba(232,200,137,.12); border-color: rgba(232,200,137,.5); }
.champ-profile-link .arrow { transition: transform .25s; display: inline-block; }
.champ-profile-link:hover .arrow { transform: translateX(3px); }

/* Road to the title */
.champ-road {
    margin-top: 1.1rem;
    display: flex; flex-wrap: wrap; align-items: center; gap: .3rem;
}
.champ-road-label {
    font-family: var(--mono); font-weight: 700;
    font-size: .52rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--cream-mute);
    margin-right: .5rem; width: 100%;
    margin-bottom: .35rem;
}
.road-box {
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-weight: 700;
    font-size: .58rem;
    border-radius: 2px;
    cursor: default;
}
.road-box.w  { background: rgba(232,200,137,.16); color: var(--gold); border: 1px solid rgba(232,200,137,.35); }
.road-box.l  { background: rgba(160,72,48,.14);  color: #c96f4a;     border: 1px solid rgba(160,72,48,.35); }
.road-box.po { box-shadow: 0 0 0 1.5px var(--gold-deep); }
.road-box.title { background: var(--gold); color: var(--ink); border-color: var(--gold); }

/* ─── Podium ─── */
.podium-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
}
@media (max-width: 700px) {
    .podium-grid {
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
            "first  first"
            "second third";
        gap: .65rem;
    }
    .podium-card.first  { grid-area: first; }
    .podium-card.second { grid-area: second; }
    .podium-card.third  { grid-area: third; }
    .podium-card.second, .podium-card.third {
        padding: 1.1rem 1rem;
    }
    .podium-card.second .podium-medal-label,
    .podium-card.third  .podium-medal-label {
        font-size: .5rem; letter-spacing: .22em; margin-bottom: .55rem;
    }
    .podium-card.second .podium-place-num,
    .podium-card.third  .podium-place-num {
        font-size: 2.6rem; margin-bottom: .45rem;
    }
    .podium-card.second .podium-team,
    .podium-card.third  .podium-team {
        font-size: 1rem; line-height: 1.1;
    }
    .podium-card.second .podium-owner,
    .podium-card.third  .podium-owner {
        font-size: .52rem; letter-spacing: .14em;
    }
    .podium-card.second .podium-record,
    .podium-card.third  .podium-record {
        font-size: .5rem; letter-spacing: .1em; margin-top: .35rem;
    }
}

.podium-card {
    padding: 1.75rem 1.5rem;
    position: relative; overflow: hidden;
    border: 1px solid;
    text-decoration: none; color: inherit;
    transition: transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s;
    display: block;
}
.podium-card:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,.35); }

.podium-card.first {
    background: linear-gradient(145deg, rgba(232,200,137,.13), rgba(232,200,137,.04));
    border-color: rgba(232,200,137,.35);
}
.podium-card.second {
    background: linear-gradient(145deg, rgba(176,184,192,.1), rgba(176,184,192,.03));
    border-color: rgba(176,184,192,.25);
}
.podium-card.third {
    background: linear-gradient(145deg, rgba(160,120,72,.1), rgba(160,120,72,.03));
    border-color: rgba(160,120,72,.25);
}

.podium-medal-label {
    font-family: var(--mono); font-weight: 700;
    font-size: .6rem; letter-spacing: .3em; text-transform: uppercase;
    margin-bottom: .9rem;
}
.first  .podium-medal-label { color: var(--gold); }
.second .podium-medal-label { color: #9eaab3; }
.third  .podium-medal-label { color: #a07848; }

.podium-place-num {
    font-family: var(--serif); font-style: italic;
    font-size: 4.5rem; line-height: .85; letter-spacing: -.04em;
    margin-bottom: .75rem;
}
.first  .podium-place-num { color: var(--gold); }
.second .podium-place-num { color: #8e9aa3; }
.third  .podium-place-num { color: #957040; }

.podium-team {
    font-family: var(--serif);
    font-size: 1.35rem; line-height: 1.1; letter-spacing: -.01em;
    color: var(--cream); margin-bottom: .3rem;
}
.podium-owner {
    font-family: var(--mono); font-weight: 700;
    font-size: .62rem; letter-spacing: .2em; text-transform: uppercase;
    color: var(--cream-mute);
}
.podium-record {
    font-family: var(--mono);
    font-size: .6rem; letter-spacing: .14em; text-transform: uppercase;
    color: var(--cream-mute); margin-top: .5rem;
}

/* ─── The Race ─── */
.race-wrap {
    background: var(--ink-card);
    border: 1px solid var(--ink-line);
    padding: 1.5rem 1rem .5rem;
    overflow: hidden;
}
.race-svg { display: block; width: 100%; height: auto; }
.race-svg text { user-select: none; }
.race-g path.race-line { fill: none; stroke-width: 2; transition: opacity .25s, stroke-width .2s; }
.race-g.champ-line path.race-line { stroke-width: 3; }
.race-g circle { transition: opacity .25s; }
.race-g .race-label {
    font-family: var(--mono); font-weight: 700;
    font-size: 10.5px; letter-spacing: .06em;
    cursor: default;
    transition: opacity .25s;
}
.race-svg.focus .race-g:not(.on) { opacity: .1; }
.race-svg .race-g.on path.race-line { stroke-width: 3.5; }
.race-axis line { stroke: var(--ink-line-soft); }
.race-axis text {
    font-family: var(--mono);
    font-size: 9.5px; letter-spacing: .1em;
    fill: var(--cream-mute);
}
.race-note {
    font-family: var(--mono);
    font-size: .58rem; letter-spacing: .18em; text-transform: uppercase;
    color: var(--cream-mute);
    padding: .6rem .5rem .5rem;
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: .5rem;
}

/* ─── The Postseason ─── */
.bracket-wrap {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 1.25rem;
    align-items: start;
}
.round-col { display: flex; flex-direction: column; gap: .8rem; }
.round-head {
    font-family: var(--mono); font-weight: 700;
    font-size: .6rem; letter-spacing: .28em; text-transform: uppercase;
    color: var(--gold);
    padding-bottom: .5rem;
    border-bottom: 2px solid var(--ink-line);
}
.round-head .rh-week { color: var(--cream-mute); letter-spacing: .15em; }
.bracket-game {
    background: var(--ink-card);
    border: 1px solid var(--ink-line);
    padding: .9rem 1rem;
}
.bracket-game.final-game {
    border-color: rgba(232,200,137,.45);
    background: linear-gradient(145deg, rgba(232,200,137,.1), var(--ink-card));
}
.bracket-game.third-game { border-color: rgba(160,120,72,.4); }
.bg-tag {
    font-family: var(--mono); font-weight: 700;
    font-size: .5rem; letter-spacing: .25em; text-transform: uppercase;
    color: var(--cream-mute); margin-bottom: .55rem;
}
.final-game .bg-tag { color: var(--gold); }
.third-game .bg-tag { color: #a07848; }
.bg-team {
    display: flex; align-items: baseline; gap: .6rem;
    padding: .28rem 0;
    font-family: var(--sans); font-size: .88rem;
    color: var(--cream-soft);
}
.bg-team .seed {
    font-family: var(--mono); font-weight: 700;
    font-size: .55rem; color: var(--cream-mute);
    width: 1.4rem; flex-shrink: 0; text-align: right;
}
.bg-team .tn { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bg-team .sc {
    font-family: var(--mono); font-weight: 700; font-size: .8rem;
    font-variant-numeric: tabular-nums;
}
.bg-team.winner { color: var(--cream); }
.bg-team.winner .tn { font-weight: 600; }
.bg-team.winner .sc { color: var(--gold); }

/* ─── Standings table ─── */
.standings-table-wrap {
    background: var(--ink-card);
    border: 1px solid var(--ink-line);
    overflow-x: auto;
}
table.season-standings { width: 100%; border-collapse: collapse; }
table.season-standings thead {
    background: var(--ink-soft);
    border-bottom: 1px solid var(--ink-line);
}
table.season-standings th {
    padding: .85rem 1rem;
    font-family: var(--mono); font-weight: 700;
    font-size: .6rem; letter-spacing: .18em; text-transform: uppercase;
    color: var(--cream-mute); text-align: left; white-space: nowrap;
}
table.season-standings th.num { text-align: right; }
table.season-standings td {
    padding: .9rem 1rem;
    border-top: 1px solid var(--ink-line-soft);
    font-size: .88rem; color: var(--cream-soft);
    vertical-align: middle; white-space: nowrap;
}
table.season-standings td.num {
    text-align: right; font-variant-numeric: tabular-nums;
}
table.season-standings td.final-rank {
    font-family: var(--mono); font-weight: 700;
    font-size: .72rem; text-align: center; width: 2.5rem;
}
table.season-standings td.final-rank.gold   { color: var(--gold); }
table.season-standings td.final-rank.silver { color: #b0b8c0; }
table.season-standings td.final-rank.bronze { color: #a07848; }
table.season-standings td.final-rank.plain  { color: var(--cream-mute); }

table.season-standings td.team-name { color: var(--cream); font-weight: 500; min-width: 160px; }
table.season-standings td.owner-link { min-width: 90px; }
table.season-standings td.owner-link a {
    font-family: var(--serif);
    font-size: .95rem; color: var(--cream-soft);
    text-decoration: none; transition: color .2s;
}
table.season-standings td.owner-link a:hover { color: var(--gold); }
table.season-standings td.record {
    font-family: var(--mono); font-weight: 700; font-size: .78rem;
}
table.season-standings td.winpct {
    font-family: var(--serif); font-style: italic;
    font-size: 1rem; color: var(--gold);
}
table.season-standings td.pf-high { color: var(--gold); font-weight: 600; }
table.season-standings td.diff-pos { color: #8aad48; }
table.season-standings td.diff-neg { color: var(--rust); }
table.season-standings td.diff-neu { color: var(--cream-mute); }
table.season-standings tbody tr.podium-row { background: rgba(232,200,137,.04); }
table.season-standings tbody tr:hover { background: rgba(232,200,137,.03); }

.rank-delta {
    font-family: var(--mono); font-weight: 700;
    font-size: .6rem; letter-spacing: .05em;
}
.rank-delta.up   { color: #8aad48; }
.rank-delta.down { color: var(--rust); }
.rank-delta.same { color: var(--cream-mute); }
td.luck-pos { color: #8aad48; }
td.luck-neg { color: var(--rust); }

/* ─── Conference split ─── */
.conf-toggle-bar {
    display: flex; align-items: center; gap: .75rem;
    margin-bottom: 1.5rem;
}
.conf-toggle-label {
    font-family: var(--mono); font-weight: 700;
    font-size: .6rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--cream-mute);
}
.conf-btn {
    background: none;
    border: 1px solid var(--ink-line);
    color: var(--cream-mute);
    font-family: var(--mono); font-weight: 700;
    font-size: .62rem; letter-spacing: .18em; text-transform: uppercase;
    padding: .45rem .85rem;
    cursor: pointer; transition: all .2s; border-radius: 2px;
}
.conf-btn:hover { color: var(--cream); border-color: rgba(232,200,137,.3); }
.conf-btn.active {
    color: var(--gold);
    background: rgba(232,200,137,.08);
    border-color: rgba(232,200,137,.3);
}
.conf-header {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: .9rem 0 .6rem;
    margin-top: 1.75rem;
    border-bottom: 2px solid var(--ink-line);
    margin-bottom: .75rem;
}
.conf-header:first-of-type { margin-top: 0; }
.conf-name {
    font-family: var(--serif); font-style: italic;
    font-size: 1.3rem; color: var(--cream);
}
.conf-teams {
    font-family: var(--mono); font-weight: 700;
    font-size: .58rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--cream-mute);
}

/* ─── Week-by-week grid ─── */
.weeks-wrap {
    background: var(--ink-card);
    border: 1px solid var(--ink-line);
    overflow-x: auto;
}
table.weeks-grid { border-collapse: collapse; width: 100%; }
table.weeks-grid th, table.weeks-grid td {
    border: 1px solid var(--ink-line-soft);
}
table.weeks-grid th {
    font-family: var(--mono); font-weight: 700;
    font-size: .55rem; letter-spacing: .1em; text-transform: uppercase;
    color: var(--cream-mute);
    padding: .55rem .5rem;
    background: var(--ink-soft);
    white-space: nowrap;
}
table.weeks-grid th.wk-head { cursor: pointer; transition: color .2s, background .2s; min-width: 2.9rem; text-align: center; }
table.weeks-grid th.wk-head:hover { color: var(--gold); }
table.weeks-grid th.wk-head.po { color: var(--gold-deep); }
table.weeks-grid th.wk-head.active { color: var(--gold); background: rgba(232,200,137,.1); }
table.weeks-grid th.mgr-head {
    text-align: right;
    position: sticky; left: 0;
    background: var(--ink-soft);
    z-index: 2;
    padding: .55rem .8rem;
    color: var(--cream-soft);
}
table.weeks-grid td {
    font-family: var(--mono); font-weight: 500;
    font-size: .62rem;
    text-align: center;
    padding: .5rem .35rem;
    color: var(--cream-soft);
    font-variant-numeric: tabular-nums;
    cursor: default;
}
table.weeks-grid td.w { background: rgba(232,200,137,.1); color: var(--gold-bright); }
table.weeks-grid td.l { background: rgba(160,72,48,.1); color: #c9917d; }
table.weeks-grid td.t { background: rgba(107,138,168,.12); }
table.weeks-grid td.empty { color: var(--ink-line); }
table.weeks-grid td.title-cell { box-shadow: inset 0 0 0 1.5px var(--gold); }

.week-detail {
    margin-top: 1rem;
    background: var(--ink-card);
    border: 1px solid rgba(232,200,137,.25);
    padding: 1.2rem 1.5rem;
    display: none;
}
.week-detail.open { display: block; }
.week-detail-head {
    font-family: var(--mono); font-weight: 700;

const RACE_COLORS = ['#e8c889','#c96f4a','#6b8aa8','#7da26b','#a67ab5','#c4a05a',

function toRoman(n) {
    const vals = [[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],
                  [50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
    let r = '';
    for (const [v, s] of vals) { while (n >= v) { r += s; n -= v; } }
    return r;
}

        <line x1="78" y1="138" x2="122" y2="138" stroke="#a88a4a" stroke-width="0.8"/>
        <text x="100" y="152" fill="#837b6a" font-family="JetBrains Mono,monospace"
              font-size="6.5" font-weight="700" letter-spacing="2" text-anchor="middle">CHAMPION</text>
    </svg>`;
}

function rankClass(r) {
    if (r === 1) return 'gold';
    if (r === 2) return 'silver';
    if (r === 3) return 'bronze';
    return 'plain';
}
function fmtPct(p) { return p.toFixed(3).replace(/^0\./, '.'); }
function playoffCutoff(year) { return year === 2020 ? 8 : 6; }

function showError(msg) {
    document.getElementById('page-body').innerHTML = `
        <div class="error-state">
            <h1>Season not found.</h1>
            <p>${msg}</p>
            <a href="seasons/">← All seasons</a>
        </div>`;

/* ============================================================
   MATCHUP HELPERS · everything below tolerates a missing
   `matchups` array (older exports) by returning null/empty.
   ============================================================ */
function teamIndex(s) {
    const byUid = {};
    for (const t of s.standings) byUid[String(t.owner_user_id)] = t;
    return byUid;
}

// uid -> ordered [{week, score, opp, opp_score, win, tie, po, title}]
function gamesByTeam(s) {
    const map = {};
    for (const m of (s.matchups || [])) {
        for (const [uid, opp, sc, oppSc] of [
            [m.a_user_id, m.b_user_id, m.a_score, m.b_score],
            [m.b_user_id, m.a_user_id, m.b_score, m.a_score],
        ]) {
            const k = String(uid);
            (map[k] = map[k] || []).push({
                week: m.week, score: sc, opp: String(opp), opp_score: oppSc,
                win: sc > oppSc, tie: sc === oppSc,
                po: m.is_playoff, title: m.is_championship,
            });
        }
    }
    for (const k in map) map[k].sort((a, b) => a.week - b.week);
    return map;
}

function regWeeksOf(s) {
    return [...new Set((s.matchups || []).filter(m => !m.is_playoff).map(m => m.week))].sort((a, b) => a - b);
}

// All-play luck: expected wins from weekly all-play, minus actual reg wins.
// Positive = won more than the schedule earned them.
function computeLuck(s) {
    if (!(s.matchups || []).length) return null;
    const weeks = {};
    for (const m of s.matchups) {
        if (m.is_playoff) continue;
        (weeks[m.week] = weeks[m.week] || []).push(
            { uid: String(m.a_user_id), score: m.a_score },
            { uid: String(m.b_user_id), score: m.b_score });
    }
    const expected = {}, actual = {};
    for (const wk in weeks) {
        const field = weeks[wk];
        if (field.length < 3) continue;
        for (const t of field) {
            const beats = field.filter(o => o.uid !== t.uid && o.score < t.score).length;
            const tiesN = field.filter(o => o.uid !== t.uid && o.score === t.score).length;
            expected[t.uid] = (expected[t.uid] || 0) + (beats + tiesN * .5) / (field.length - 1);
        }
    }
    for (const m of s.matchups) {
        if (m.is_playoff) continue;
        const a = String(m.a_user_id), b = String(m.b_user_id);
        if (m.a_score > m.b_score) actual[a] = (actual[a] || 0) + 1;
        else if (m.b_score > m.a_score) actual[b] = (actual[b] || 0) + 1;
        else { actual[a] = (actual[a] || 0) + .5; actual[b] = (actual[b] || 0) + .5; }
    }
    const luck = {};
    for (const uid in expected) luck[uid] = (actual[uid] || 0) - expected[uid];
    return luck;
}

/* ─── Road to the title (champion's week-by-week) ─── */
function buildRoad(s) {
    if (!s.champion || !(s.matchups || []).length) return '';
    const byTeam = gamesByTeam(s);
    const games = byTeam[String(s.champion.owner_user_id)] || [];
    if (!games.length) return '';
    const byUid = teamIndex(s);
    const boxes = games.map(g => {
        const cls = ['road-box', g.win ? 'w' : 'l', g.po ? 'po' : '', g.title ? 'title' : ''].filter(Boolean).join(' ');
        const oppName = byUid[g.opp]?.owner_name ?? '?';
        const verb = g.win ? 'def.' : 'lost to';
        const label = g.title ? '★' : (g.win ? 'W' : 'L');
        return `<span class="${cls}" title="W${g.week} · ${verb} ${oppName} · ${g.score.toFixed(1)} to ${g.opp_score.toFixed(1)}">${label}</span>`;
    }).join('');
    return `<div class="champ-road">
        <span class="champ-road-label">Road to the title · ringed = playoffs · ★ = the final</span>
        ${boxes}
    </div>`;
}

/* ─── The Race · standings position by week ─── */
function buildRaceSection(s) {
    const regWeeks = regWeeksOf(s);
    if (regWeeks.length < 3) return null;
    const byUid = teamIndex(s);
    const uids = s.standings.map(t => String(t.owner_user_id));
    const n = uids.length;

    // Cumulative record through each week -> position.
    const cumW = {}, cumPF = {}, posByWeek = {};
    uids.forEach(u => { cumW[u] = 0; cumPF[u] = 0; });
    const weekGames = {};
    for (const m of (s.matchups || [])) {
        if (m.is_playoff) continue;
        (weekGames[m.week] = weekGames[m.week] || []).push(m);
    }
    for (const wk of regWeeks) {
        for (const m of (weekGames[wk] || [])) {
            const a = String(m.a_user_id), b = String(m.b_user_id);
            cumPF[a] += m.a_score; cumPF[b] += m.b_score;
            if (m.a_score > m.b_score) cumW[a] += 1;
            else if (m.b_score > m.a_score) cumW[b] += 1;
            else { cumW[a] += .5; cumW[b] += .5; }
        }
        const order = [...uids].sort((x, y) => (cumW[y] - cumW[x]) || (cumPF[y] - cumPF[x]));
        posByWeek[wk] = {};
        order.forEach((u, i) => { posByWeek[wk][u] = i + 1; });
    }

    const W = 1000, H = Math.max(300, 26 * n + 70), L = 30, R = 96, T = 16, B = 30;
    const x = (i) => L + i / (regWeeks.length - 1) * (W - L - R);
    const y = (pos) => T + (pos - 1) / (n - 1) * (H - T - B);

    let axis = '';
    regWeeks.forEach((wk, i) => {
        axis += `<text x="${x(i)}" y="${H - B + 18}" text-anchor="middle">W${wk}</text>`;
    });
    for (let p = 1; p <= n; p++) {
        axis += `<text x="${L - 8}" y="${y(p) + 3}" text-anchor="end">${p}</text>`;
    }

    const champUid = s.champion ? String(s.champion.owner_user_id) : null;
    const groups = s.standings.map((t, ti) => {
        const u = String(t.owner_user_id);
        const color = RACE_COLORS[ti % RACE_COLORS.length];
        const pts = regWeeks.map((wk, i) => ({ i, wk, pos: posByWeek[wk][u] }));
        const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${x(p.i).toFixed(1)},${y(p.pos).toFixed(1)}`).join(' ');
        const dots = pts.map(p =>
            `<circle cx="${x(p.i).toFixed(1)}" cy="${y(p.pos).toFixed(1)}" r="2.6" fill="${color}">
                <title>W${p.wk} · ${t.owner_name} sits ${p.pos}${p.pos === 1 ? 'st' : p.pos === 2 ? 'nd' : p.pos === 3 ? 'rd' : 'th'}</title>
            </circle>`).join('');
        const endPos = pts[pts.length - 1].pos;
        const isChamp = u === champUid;
        return `<g class="race-g${isChamp ? ' champ-line' : ''}" data-uid="${u}" style="opacity:.9">
            <path class="race-line" d="${d}" stroke="${isChamp ? 'var(--gold)' : color}"></path>
            ${dots}
            <text class="race-label" x="${x(regWeeks.length - 1) + 9}" y="${y(endPos) + 3.5}"
                fill="${isChamp ? 'var(--gold)' : color}">${(t.owner_name || '').toUpperCase()}${isChamp ? ' ★' : ''}</text>
        </g>`;
    }).join('');

    return {
        title: 'The race.',
        meta: 'Standings position, week by week',
        num: 'The Race',
        html: `<div class="race-wrap">
            <div id="race-chart"><svg class="race-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
                <g class="race-axis">${axis}</g>${groups}
            </svg></div>
            <div class="race-note">
                <span>Hover a line to isolate a team · regular season only</span>
                <span>Gold line: the eventual champion</span>
            </div>
        </div>`,
    };
}

/* ─── The Postseason ─── */
function buildBracketSection(s) {
    const games = (s.matchups || []).filter(m => m.is_playoff);
    if (!games.length) return null;
    const byUid = teamIndex(s);
    const cutoff = playoffCutoff(s.year);
    const weeks = [...new Set(games.map(g => g.week))].sort((a, b) => a - b);
    const champWeek = weeks[weeks.length - 1];

    const roundName = (wk) => {
        const fromEnd = weeks.length - 1 - weeks.indexOf(wk);
        if (fromEnd === 0) return 'Championship Week';
        if (fromEnd === 1) return 'Semifinals';
        if (fromEnd === 2) return 'Quarterfinals';
        return `Round ${weeks.indexOf(wk) + 1}`;
    };

    const seedOf = (uid) => byUid[String(uid)]?.reg_season_rank ?? null;
    const finalOf = (uid) => byUid[String(uid)]?.final_rank ?? null;

    const cols = weeks.map(wk => {
        const inWeek = games.filter(g => g.week === wk);
        // Title-bracket games only; consolation noise stays out of the
        // bracket. Championship on top, then the third-place game.
        const classified = inWeek.map(g => {
            const aF = finalOf(g.a_user_id), bF = finalOf(g.b_user_id);
            const titleBracket = (aF != null && aF <= cutoff) || (bF != null && bF <= cutoff);
            const thirdGame = wk === champWeek && !g.is_championship && titleBracket &&
                ((aF != null && aF <= 4) || (bF != null && bF <= 4));
            return { g, titleBracket, thirdGame };
        }).filter(c => c.titleBracket).sort((x, y) =>
            (y.g.is_championship - x.g.is_championship) ||
            (y.thirdGame - x.thirdGame));

        const cards = classified.map(({ g, thirdGame }) => {
            const cls = g.is_championship ? 'final-game' : thirdGame ? 'third-game' : '';
            const tag = g.is_championship ? '★ The Final' : thirdGame ? 'Third-Place Game' : 'Title Bracket';
            const teamRow = (uid, sc, oppSc) => {
                const t = byUid[String(uid)];
                const seed = seedOf(uid);
                return `<div class="bg-team${sc > oppSc ? ' winner' : ''}">
                    <span class="seed">${seed ? '#' + seed : ''}</span>
                    <span class="tn">${t?.owner_name ?? '?'}</span>
                    <span class="sc">${sc.toFixed(1)}</span>
                </div>`;
            };
            return `<div class="bracket-game ${cls}">
                <div class="bg-tag">${tag}</div>
                ${teamRow(g.a_user_id, g.a_score, g.b_score)}
                ${teamRow(g.b_user_id, g.b_score, g.a_score)}
            </div>`;
        }).join('');

        if (!cards) return '';
        return `<div class="round-col">
            <div class="round-head">${roundName(wk)} <span class="rh-week">· W${wk}</span></div>
            ${cards}
        </div>`;
    }).filter(Boolean).join('');
    if (!cols) return null;

    return {
        title: 'The postseason.',
        meta: 'Every bracket game',
        num: 'The Postseason',
        html: `<div class="bracket-wrap">${cols}</div>`,
    };
}

/* ─── Week-by-week grid ─── */
function buildWeeksSection(s) {
    if (!(s.matchups || []).length) return null;
    const byUid = teamIndex(s);
    const byTeam = gamesByTeam(s);
    const weeks = [...new Set(s.matchups.map(m => m.week))].sort((a, b) => a - b);
    const poWeeks = new Set(s.matchups.filter(m => m.is_playoff).map(m => m.week));

    const heads = weeks.map(wk =>
        `<th class="wk-head${poWeeks.has(wk) ? ' po' : ''}" data-week="${wk}" title="Click for the full week">
            ${poWeeks.has(wk) ? 'P·' : ''}W${wk}</th>`).join('');

    const rows = [...s.standings].sort((a, b) => (a.final_rank ?? 99) - (b.final_rank ?? 99)).map(t => {
        const u = String(t.owner_user_id);
        const games = byTeam[u] || [];
        const byWeek = {};
        for (const g of games) byWeek[g.week] = g;
        const cells = weeks.map(wk => {
            const g = byWeek[wk];
            if (!g) return `<td class="empty">·</td>`;
            const cls = [g.tie ? 't' : (g.win ? 'w' : 'l'), g.title ? 'title-cell' : ''].filter(Boolean).join(' ');
            const oppName = byUid[g.opp]?.owner_name ?? '?';
            const verb = g.tie ? 'tied' : (g.win ? 'def.' : 'lost to');
            return `<td class="${cls}" title="W${wk} · ${verb} ${oppName} · ${g.score.toFixed(1)} to ${g.opp_score.toFixed(1)}">${Math.round(g.score)}</td>`;
        }).join('');
        return `<tr><th class="mgr-head">${t.owner_name}</th>${cells}</tr>`;
    }).join('');

    return {
        title: 'Week by week.',
        meta: 'Click a week for the full slate',
        num: 'The Weeks',
        html: `<div class="weeks-wrap">
            <table class="weeks-grid">
                <thead><tr><th class="mgr-head"></th>${heads}</tr></thead>
                <tbody>${rows}</tbody>
            </table>
        </div>
        <div class="week-detail" id="week-detail"></div>`,
    };
}

function wireWeekDetail(s) {
    const detail = document.getElementById('week-detail');
    if (!detail) return;
    const byUid = teamIndex(s);
    document.querySelectorAll('th.wk-head').forEach(th => {
        th.addEventListener('click', () => {
            const wk = parseInt(th.dataset.week, 10);
            const already = th.classList.contains('active');
            document.querySelectorAll('th.wk-head').forEach(h => h.classList.remove('active'));
            if (already) { detail.classList.remove('open'); return; }
            th.classList.add('active');
            const games = s.matchups.filter(m => m.week === wk)
                .sort((a, b) => (b.is_championship - a.is_championship) || (b.is_playoff - a.is_playoff) ||
                    (Math.max(b.a_score, b.b_score) - Math.max(a.a_score, a.b_score)));
            detail.innerHTML = `
                <div class="week-detail-head">★ Week ${wk} · ${games.length} game${games.length === 1 ? '' : 's'}</div>
                ${games.map(g => {
                    const aWin = g.a_score >= g.b_score;
                    const w = aWin ? g : { a_user_id: g.b_user_id, a_score: g.b_score, b_user_id: g.a_user_id, b_score: g.a_score };
                    const wn = byUid[String(w.a_user_id)]?.owner_name ?? '?';
                    const ln = byUid[String(w.b_user_id)]?.owner_name ?? '?';
                    const verb = g.a_score === g.b_score ? 'tied' : 'def.';
                    const tag = g.is_championship ? '★ The Final' : (g.is_playoff ? 'Playoffs' : '');
                    return `<div class="week-game">
                        <span class="wg-win">${wn}</span>
                        <span>${verb}</span>
                        <span>${ln}</span>
                        <span class="wg-score">${w.a_score.toFixed(1)} to ${w.b_score.toFixed(1)}</span>
                        ${tag ? `<span class="wg-tag">${tag}</span>` : ''}
                    </div>`;
                }).join('')}`;
            detail.classList.add('open');
        });
    });
}

/* ─── Superlatives ─── */
function buildSuperSection(s) {
    const ms = s.matchups || [];
    if (ms.length < 6) return null;
    const byUid = teamIndex(s);
    const nameOf = uid => byUid[String(uid)]?.owner_name ?? '?';

    const withMargin = ms.map(m => ({ ...m, margin: Math.abs(m.a_score - m.b_score), combined: m.a_score + m.b_score }));
    const goty = [...withMargin].sort((a, b) => b.combined - a.combined)[0];
    const blowout = [...withMargin].sort((a, b) => b.margin - a.margin)[0];
    const closest = [...withMargin].filter(m => m.margin > 0).sort((a, b) => a.margin - b.margin)[0];

    let high = null, low = null;
    for (const m of ms) {
        for (const [uid, sc] of [[m.a_user_id, m.a_score], [m.b_user_id, m.b_score]]) {
            if (!high || sc > high.sc) high = { uid, sc, wk: m.week };
            if (!low  || sc < low.sc)  low  = { uid, sc, wk: m.week };
        }
    }

    // Longest in-season win streak (playoffs included).
    const byTeam = gamesByTeam(s);
    let heater = null;
    for (const uid in byTeam) {
        let run = 0, best = 0;
        for (const g of byTeam[uid]) {
            run = g.win ? run + 1 : 0;
            if (run > best) best = run;
        }
        if (!heater || best > heater.n) heater = { uid, n: best };
    }

    const vs = m => `${nameOf(m.a_score >= m.b_score ? m.a_user_id : m.b_user_id)} over
        ${nameOf(m.a_score >= m.b_score ? m.b_user_id : m.a_user_id)} ·
        ${Math.max(m.a_score, m.b_score).toFixed(1)} to ${Math.min(m.a_score, m.b_score).toFixed(1)} · W${m.week}`;

    const cards = [
        goty    ? { k: 'Game of the Year', v: goty.combined.toFixed(1), s: `combined points<br>${vs(goty)}` } : null,
        blowout ? { k: 'The Massacre', v: `+${blowout.margin.toFixed(1)}`, s: vs(blowout) } : null,
        closest ? { k: 'Photo Finish', v: closest.margin.toFixed(2), s: `margin of defeat<br>${vs(closest)}` } : null,
        high    ? { k: 'The High-Water Mark', v: high.sc.toFixed(1), s: `${nameOf(high.uid)} · Week ${high.wk}` } : null,
        low     ? { k: 'The Stinker', v: low.sc.toFixed(1), s: `${nameOf(low.uid)} · Week ${low.wk}` } : null,
        heater && heater.n >= 3 ? { k: 'The Heater', v: `W${heater.n}`, s: `${nameOf(heater.uid)} · ${heater.n} straight wins` } : null,
    ].filter(Boolean);
    if (!cards.length) return null;

    return {
        title: 'The superlatives.',
        meta: 'Computed from every box score',
        num: 'Superlatives',
        html: `<div class="super-grid">${cards.map(c => `
            <div class="super-card">
                <div class="super-kicker">★ ${c.k}</div>
                <div class="super-val">${c.v}</div>
                <div class="super-sub">${c.s}</div>
            </div>`).join('')}</div>`,
    };
}

/* ─── Final table ─── */
function buildStandingsSection(s, luck) {
    const maxPF = Math.max(...s.standings.map(t => t.points_for));

    function buildRow(t) {
        const diff = t.points_for - t.points_against;
        const diffCls = diff > 0 ? 'diff-pos' : diff < 0 ? 'diff-neg' : 'diff-neu';
        const pfCls = t.points_for === maxPF ? 'pf-high' : '';
        const delta = t.reg_season_rank != null ? t.reg_season_rank - t.final_rank : null;
        let deltaHTML = '';
        if (delta !== null) {
            if (delta > 0)      deltaHTML = `<span class="rank-delta up">↑${delta}</span>`;
            else if (delta < 0) deltaHTML = `<span class="rank-delta down">↓${Math.abs(delta)}</span>`;
            else                deltaHTML = `<span class="rank-delta same">—</span>`;
        }
        let luckHTML = '';
        if (luck) {
            const lv = luck[String(t.owner_user_id)];
            luckHTML = lv == null ? '<td class="num">—</td>' :
                `<td class="num ${lv > .25 ? 'luck-pos' : lv < -.25 ? 'luck-neg' : ''}"
                    title="Actual wins minus all-play expected wins">${lv >= 0 ? '+' : ''}${lv.toFixed(1)}</td>`;
        }
        return `<tr class="${t.final_rank <= 3 ? 'podium-row' : ''}">
            <td class="final-rank ${rankClass(t.final_rank)}">${t.final_rank}</td>
            <td class="team-name">${t.team_name}</td>
            <td class="owner-link"><a href="managers/manager.html?id=${t.owner_user_id}">${t.owner_name}</a></td>
            <td class="record num">${t.wins}–${t.losses}${t.ties ? '–'+t.ties : ''}</td>
            <td class="winpct num">${fmtPct(t.win_pct)}</td>
            <td class="num ${pfCls}">${t.points_for.toFixed(1)}</td>
            <td class="num">${t.points_against.toFixed(1)}</td>
            <td class="num ${diffCls}">${diff >= 0 ? '+' : ''}${diff.toFixed(1)}</td>
            <td class="num">${t.reg_season_rank ?? '—'}</td>
            <td class="num">${deltaHTML}</td>
            ${luckHTML}
        </tr>`;
    }

    const luckTh = luck ? `<th class="num" title="Actual wins minus all-play expected wins. Positive: the schedule was kind.">Luck</th>` : '';
    const thead = `<thead><tr>
        <th class="num">Finish</th><th>Team</th><th>Manager</th>
        <th class="num">Record</th><th class="num">Win %</th>
        <th class="num">PF</th><th class="num">PA</th><th class="num">+/−</th>
        <th class="num">Seed</th><th class="num">Δ</th>${luckTh}
    </tr></thead>`;

    function buildTable(teams) {
        const rows = [...teams].sort((a, b) => a.final_rank - b.final_rank).map(buildRow).join('');
        return `<div class="standings-table-wrap">
            <table class="season-standings">${thead}<tbody>${rows}</tbody></table>
        </div>`;
    }

    const divisions = Array.from(new Set(s.standings.map(t => t.division).filter(Boolean)));
    if (divisions.length === 2) {
        const whole = s.standings.filter(t => t.division === divisions[0]);
        const skim  = s.standings.filter(t => t.division === divisions[1]);
        return `
            <div class="conf-toggle-bar" id="conf-toggle-bar">
                <span class="conf-toggle-label">View</span>
                <button class="conf-btn active" data-view="split">By Conference</button>
                <button class="conf-btn" data-view="combined">Combined</button>
            </div>
            <div id="view-split">
                <div class="conf-header">
                    <span class="conf-name">${divisions[0]}</span>
                    <span class="conf-teams">${whole.length} teams</span>
                </div>
                ${buildTable(whole)}
                <div class="conf-header">
                    <span class="conf-name">${divisions[1]}</span>
                    <span class="conf-teams">${skim.length} teams</span>
                </div>
                ${buildTable(skim)}
            </div>
            <div id="view-combined" style="display:none;">
                ${buildTable(s.standings)}
            </div>`;
    }

    return buildTable(s.standings);
}

/* ============================================================
   MAIN
   ============================================================ */
async function loadSeason() {
    const year = parseInt(new URLSearchParams(window.location.search).get('year'));
    if (!year) return showError('No year specified in the URL.');

    try {
        const dirRes = await fetch('data/seasons_directory.json');
        if (dirRes.ok) {
            const dir = await dirRes.json();
            ALL_YEARS = (dir.seasons || []).map(s => s.year).sort((a, b) => a - b);
        }
    } catch (_) { /* leave ALL_YEARS empty */ }

    const foundedYear = ALL_YEARS[0] || year;
    const volNum = Math.max(1, year - foundedYear + 1);

    let s;
    try {
        const res = await fetch(`data/seasons/${year}.json`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        s = await res.json();
    } catch (e) {
        return showError(`The ${year} season could not be loaded (${e.message}).`);
    }

    document.title = `${year} Season · {{LEAGUE_NAME}}`;
    document.getElementById('nav-year').innerHTML = `${year} <em>Season.</em>`;

    const champLine = s.champion
        ? `CHAMPION · ${s.champion.owner_name.toUpperCase()} · ${s.champion.team_name.toUpperCase()}`
        : `${year} SEASON · IN PROGRESS`;
    ['ticker-a', 'ticker-b'].forEach(id => {
        document.getElementById(id).innerHTML = `
            <span class="ticker-item"><span class="ticker-star">★</span> ${year} SEASON · {{LEAGUE_NAME_UPPER}}</span>
            <span class="ticker-item"><span class="ticker-star">★</span> ${champLine}</span>
            <span class="ticker-item"><span class="ticker-star">★</span> ${s.total_teams} TEAMS · VOL. ${toRoman(volNum)}</span>
        `;
    });

    const totalPF    = s.standings.reduce((t, r) => t + r.points_for, 0);
    const totalGames = s.standings.reduce((t, r) => t + r.wins + r.losses + r.ties, 0) / 2;
    const avgPPG     = totalPF / (totalGames * 2);
    const highTeam   = [...s.standings].sort((a, b) => b.points_for - a.points_for)[0];
    const mostWins   = [...s.standings].sort((a, b) => b.wins - a.wins)[0];

    const idx = ALL_YEARS.indexOf(year);
    const prevYear = idx > 0 ? ALL_YEARS[idx - 1] : null;
    const nextYear = idx < ALL_YEARS.length - 1 ? ALL_YEARS[idx + 1] : null;
    const yearNavHTML = [
        prevYear ? `<a href="seasons/season.html?year=${prevYear}" class="hero-nav-year">← ${prevYear}</a>` : '',
        nextYear ? `<a href="seasons/season.html?year=${nextYear}" class="hero-nav-year">${nextYear} →</a>` : '',
    ].filter(Boolean).join('');

    const podiumDefs = [
        { cls: 'first',  roman: 'I',   label: '★ Champion',    rank: 1 },
        { cls: 'second', roman: 'II',  label: '● Runner-Up',   rank: 2 },
        { cls: 'third',  roman: 'III', label: '▲ Third Place', rank: 3 },
    ];
    const podiumHTML = podiumDefs.map(p => {
        const t = s.standings.find(r => r.final_rank === p.rank);
        if (!t) return '';
        return `<a href="managers/manager.html?id=${t.owner_user_id}" class="podium-card ${p.cls}">
            <div class="podium-medal-label">${p.label}</div>
            <div class="podium-place-num">${p.roman}</div>
            <div class="podium-team">${t.team_name}</div>
            <div class="podium-owner">${t.owner_name}</div>
            <div class="podium-record">${t.wins}–${t.losses} · ${t.points_for.toFixed(1)} PF</div>
        </a>`;
    }).join('');

    const blurb = s.champion
        ? `<strong>${s.champion.owner_name}</strong> claimed the ${year} title with ${s.champion.team_name}.`
        : `The ${year} season is still being written. Sync the latest results to keep the chronicle current.`;

    const luck = computeLuck(s);

    // Chapters, in reading order. Sections that need matchup data return
    // null on older files and simply don't print.
    const chapters = [];

    chapters.push(s.champion ? {
        num: 'Champion', title: `The ${year} title.`, meta: 'Final result',
        html: `<div class="champ-block">
            <div class="champ-seal-wrap">${miniSeal(year)}</div>
            <div class="champ-content">
                <div class="champ-kicker">★ ${year} · League Champion ★</div>
                <div class="champ-team-name">${s.champion.team_name}</div>
                <div class="champ-owner-name">${s.champion.owner_name}</div>
                <div class="champ-facts">
                    ${s.champion.record ? `<div class="champ-fact"><div class="champ-fact-label">Record</div><div class="champ-fact-val">${s.champion.record}</div></div>` : ''}
                    ${s.champion.points_for ? `<div class="champ-fact"><div class="champ-fact-label">Points For</div><div class="champ-fact-val">${s.champion.points_for.toFixed(1)}</div></div>` : ''}
                    ${(s.champion.title_score_for != null && s.champion.title_score_against != null) ? `<div class="champ-fact"><div class="champ-fact-label">The Final</div><div class="champ-fact-val">${s.champion.title_score_for.toFixed(1)} to ${s.champion.title_score_against.toFixed(1)}</div></div>` : ''}
                    ${s.runner_up?.owner_name ? `<div class="champ-fact"><div class="champ-fact-label">Runner-Up</div><div class="champ-fact-val" style="font-size:1.1rem;">${s.runner_up.owner_name}</div></div>` : ''}
                    ${s.third_place?.owner_name ? `<div class="champ-fact"><div class="champ-fact-label">Third Place</div><div class="champ-fact-val" style="font-size:1.1rem;">${s.third_place.owner_name}</div></div>` : ''}
                </div>
                ${buildRoad(s)}
            </div>
            <a href="managers/manager.html?id=${s.champion.owner_user_id}" class="champ-profile-link">
                View profile <span class="arrow">→</span>
            </a>
            <div class="champ-block-watermark">★</div>
        </div>`,
    } : {
        num: 'In Progress', title: 'No champion yet.', meta: 'Season ongoing',
        html: '',
    });

    chapters.push({
        num: 'Podium', title: 'Top three.', meta: 'Final finish',
        html: `<div class="podium-grid">${podiumHTML}</div>`,
    });

    const race = buildRaceSection(s);      if (race) chapters.push(race);
    const bracket = buildBracketSection(s); if (bracket) chapters.push(bracket);

    chapters.push({
        num: 'Standings', title: 'Final table.', meta: `${s.total_teams} managers`,
        html: buildStandingsSection(s, luck),
    });

    const weeks = buildWeeksSection(s);   if (weeks) chapters.push(weeks);
    const supers = buildSuperSection(s);  if (supers) chapters.push(supers);

    document.getElementById('page-body').innerHTML = `
        <div class="season-hero">
            <div class="hero-left">
                <div class="hero-kicker">★ Vol. ${toRoman(volNum)} · {{LEAGUE_NAME}} · ${year} ★</div>
                <div class="hero-year">${year}</div>
                <p class="hero-sub">${blurb}</p>
            </div>
            <div class="hero-right">${yearNavHTML}</div>
        </div>

        <div class="season-strip">
            <div class="strip-inner">
                <div class="strip-cell">
                    <div class="strip-label">Teams</div>
                    <div class="strip-val cream">${s.total_teams}</div>
                </div>
                <div class="strip-cell">
                    <div class="strip-label">Total Points</div>
                    <div class="strip-val">${Math.round(totalPF).toLocaleString()}</div>
                </div>
                <div class="strip-cell">
                    <div class="strip-label">Avg Per Game</div>
                    <div class="strip-val">${avgPPG.toFixed(1)}</div>
                </div>
                <div class="strip-cell">
                    <div class="strip-label">Most Points</div>
                    <div class="strip-val">${Math.round(highTeam.points_for)}</div>
                    <div class="strip-detail">${highTeam.owner_name}</div>
                </div>
                <div class="strip-cell">
                    <div class="strip-label">Most Wins</div>
                    <div class="strip-val">${mostWins.wins}</div>
                    <div class="strip-detail">${mostWins.owner_name}</div>
                </div>
                <div class="strip-cell">
                    <div class="strip-label">Champ Record</div>
                    <div class="strip-val">${s.champion?.record ?? '—'}</div>
                </div>
            </div>
        </div>

        ${chapters.map((c, i) => `
        <div class="section" style="margin-top: 3rem;${i === chapters.length - 1 ? ' margin-bottom: 4rem;' : ''}">
            <div class="section-header">
                <span class="section-num">§ ${String(i + 1).padStart(2, '0')} · ${c.num}</span>
                <span class="section-title">${c.title}</span>
                <span class="section-meta">${c.meta}</span>
            </div>
            ${c.html}
        </div>`).join('')}
    `;

    // Conference toggle (divisional seasons only)
    const toggleBar = document.getElementById('conf-toggle-bar');
    if (toggleBar) {
        toggleBar.addEventListener('click', e => {
            const btn = e.target.closest('.conf-btn');
            if (!btn) return;
            toggleBar.querySelectorAll('.conf-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const view = btn.dataset.view;
            document.getElementById('view-split').style.display    = view === 'split'    ? '' : 'none';
            document.getElementById('view-combined').style.display = view === 'combined' ? '' : 'none';
        });
    }

    wireWeekDetail(s);

    // Race chart draw-in, once on view.
    const svg = document.querySelector('#race-chart .race-svg');
    if (svg) {
        svg.querySelectorAll('.race-g').forEach(g => {
            g.addEventListener('mouseenter', () => { svg.classList.add('focus'); g.classList.add('on'); });
            g.addEventListener('mouseleave', () => { svg.classList.remove('focus'); g.classList.remove('on'); });
        });
        if (!REDUCED_MOTION) {
            const paths = [...svg.querySelectorAll('path.race-line')];
            paths.forEach(p => {
                const len = p.getTotalLength();
                p.style.strokeDasharray = `${len}`;
                p.style.strokeDashoffset = `${len}`;
            });
            const io = new IntersectionObserver((entries) => {
                if (!entries.some(e => e.isIntersecting)) return;
                io.disconnect();
                paths.forEach((p, i) => {
                    p.style.transition = `stroke-dashoffset 1s cubic-bezier(.4,0,.2,1) ${i * 40}ms`;
                    p.style.strokeDashoffset = '0';
                    p.addEventListener('transitionend', () => {
                        p.style.strokeDasharray = ''; p.style.transition = ''; p.style.strokeDashoffset = '';
                    }, { once: true });
                });
            }, { threshold: .25 });
            io.observe(svg);
        }
    }
}

loadSeason();
</script>
