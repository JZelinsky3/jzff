<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trade Grader · {{LEAGUE_NAME}}</title>
  <link rel="stylesheet" href="/pams-template/assets/css/main.css" />
  <style>
    /* ============================================================
       TRADES — Phase 1: list of completed trades, no grades yet
       Uses the shared site nav (nav.js) for consistency with the rest
       of the almanac pages.
       ============================================================ */
    :root {
      --tr-card:       #16202c;
      --tr-card-2:     #1c2939;
      --tr-line:       #2a3645;
      --tr-line-soft:  #1e2937;
    }

    .tr-wrap { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1rem 4rem; }

    /* ── Page header ── */
    .tr-page-head {
      text-align: center;
      padding: 1rem 0 2rem;
      border-bottom: 1px solid var(--tr-line-soft);
      margin-bottom: 2rem;
    }
    .tr-page-sup {
      font-family: var(--mono); font-size: .68rem;
      letter-spacing: .25em; color: var(--gold);
      text-transform: uppercase; margin-bottom: .8rem;
    }
    .tr-page-tier {
      display: inline-block; margin-left: .5rem;
      font-size: .58rem; letter-spacing: .2em;
      color: var(--gold); border: 1px solid var(--gold);
      padding: 1px 5px; border-radius: 2px;
    }
    .tr-page-title {
      font-family: var(--serif); font-size: clamp(2rem, 5vw, 3rem);
      color: var(--cream); line-height: 1.1; margin: 0;
    }
    .tr-page-title em { color: var(--gold); font-style: italic; }

    .tr-banner {
      background: var(--tr-card); border: 1px solid var(--tr-line);
      border-left: 3px solid var(--gold);
      padding: .9rem 1rem; margin-bottom: 2rem;
      font-size: .88rem; color: var(--cream-soft);
      border-radius: 3px;
    }

    .tr-empty {
      text-align: center; padding: 3rem 1rem; color: var(--cream-soft);
    }
    .tr-empty h2 { font-family: var(--serif); font-size: 1.6rem; color: var(--cream); margin-bottom: .6rem; }

    /* ── Trade cards ── */
    .tr-list { display: flex; flex-direction: column; gap: 1rem; }

    .tr-card {
      background: var(--tr-card); border: 1px solid var(--tr-line);
      border-radius: 3px; overflow: hidden;
    }

    .tr-card-head {
      display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--tr-line-soft);
      font-family: var(--mono); font-size: .68rem;
      letter-spacing: .18em; text-transform: uppercase;
      color: var(--cream-mute);
    }
    .tr-card-head .tr-date { color: var(--cream); }
    .tr-card-head .tr-week { color: var(--gold); }
    .tr-card-head .tr-plat {
      margin-left: auto;
      border: 1px solid var(--tr-line);
      padding: 1px 6px; border-radius: 2px;
    }

    .tr-sides {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1px;
      background: var(--tr-line-soft);
    }
    @media (min-width: 720px) {
      .tr-sides[data-count="2"] { grid-template-columns: 1fr 1fr; }
      .tr-sides[data-count="3"] { grid-template-columns: 1fr 1fr 1fr; }
      .tr-sides[data-count="4"] { grid-template-columns: 1fr 1fr 1fr 1fr; }
    }

    .tr-side {
      background: var(--tr-card);
      padding: 1rem 1.1rem;
      display: flex; flex-direction: column; gap: .65rem;
    }

    .tr-side-head { display: flex; align-items: center; gap: .65rem; }
    .tr-side-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--tr-card-2);
      flex-shrink: 0;
      object-fit: cover;
    }
    .tr-side-name {
      font-family: var(--serif); color: var(--cream);
      font-size: 1.05rem; line-height: 1.15;
    }
    .tr-side-team {
      font-family: var(--mono); font-size: .65rem;
      letter-spacing: .15em; color: var(--cream-mute);
      text-transform: uppercase;
    }

    .tr-side-label {
      font-family: var(--mono); font-size: .62rem;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--gold);
    }

    .tr-assets { display: flex; flex-direction: column; gap: .35rem; }
    .tr-asset {
      display: flex; align-items: baseline; gap: .5rem;
      padding: .35rem .55rem;
      background: var(--tr-card-2);
      border-radius: 2px;
      font-size: .9rem; color: var(--cream);
    }
    .tr-asset-pos {
      font-family: var(--mono); font-size: .62rem;
      letter-spacing: .12em;
      color: var(--cream-mute);
      flex-shrink: 0;
      min-width: 30px;
    }
    .tr-asset-name { flex: 1; }
    .tr-asset-team {
      font-family: var(--mono); font-size: .65rem;
      letter-spacing: .12em; color: var(--cream-mute);
    }
    .tr-asset.kind-pick .tr-asset-pos { color: var(--gold); }
    .tr-asset.kind-faab .tr-asset-pos { color: var(--gold); }

    .tr-grade-placeholder {
      margin-top: .35rem;
      font-family: var(--mono); font-size: .58rem;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--cream-mute);
    }

    .tr-footer {
      margin-top: 3rem; text-align: center;
      font-family: var(--mono); font-size: .65rem;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--cream-mute);
    }
  </style>
</head>
<body>
  <div class="site-glow" aria-hidden="true"></div>

  <nav id="site-nav" data-page="trades" data-chapter="LIVE · TRADE GRADER"
       data-back-href="live-season/" data-back-label="Back to Live Season"></nav>
  <script src="/pams-template/assets/js/nav.js"></script>

  <main class="tr-wrap">

    <header class="tr-page-head">
      <div class="tr-page-sup">{{LEAGUE_NAME_UPPER}}<span class="tr-page-tier">VET</span></div>
      <h1 class="tr-page-title">Trade <em>Grader.</em></h1>
    </header>

    <div class="tr-banner" id="banner">
      Trades are pulled automatically from your league platform. Grades + 4-week
      revisits arrive in the next build.
    </div>

    <div id="content">
      <div class="tr-empty">
        <h2>Loading…</h2>
        <p>Pulling completed trades.</p>
      </div>
    </div>

    <div class="tr-footer">{{LEAGUE_ABBR}} · Trade Grader · Phase 1</div>

  </main>

  <script src="/pams-template/assets/js/trades.js"></script>
</body>
</html>
