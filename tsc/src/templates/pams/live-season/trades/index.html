<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trades · {{LEAGUE_NAME}}</title>
  <link rel="stylesheet" href="/pams-template/assets/css/main.css" />
  <style>
    /* ============================================================
       TRADES — Phase 1: list of completed trades, no grades yet
       ============================================================ */
    :root {
      --tr-bg:         #0e1620;
      --tr-card:       #16202c;
      --tr-card-2:     #1c2939;
      --tr-line:       #2a3645;
      --tr-line-soft:  #1e2937;
      --tr-mute:       #837b6a;
    }
    body { background: var(--tr-bg); }

    /* ── Page nav (matches pickems/powerrank pattern) ── */
    .tr-nav {
      position: sticky; top: 0; z-index: 10;
      background: rgba(14,22,32,.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--tr-line);
    }
    .tr-nav-inner {
      max-width: 1100px; margin: 0 auto;
      display: grid; grid-template-columns: 44px 1fr 44px;
      align-items: center;
      padding: .9rem 1rem;
      gap: .75rem;
    }
    .tr-nav-back {
      background: transparent; border: none; cursor: pointer;
      color: var(--cream); padding: .4rem;
      border-radius: 2px;
    }
    .tr-nav-back:hover { background: var(--tr-card-2); }
    .tr-nav-center { text-align: center; }
    .tr-nav-title {
      font-family: var(--serif); font-size: 1.5rem; color: var(--cream);
      text-decoration: none; line-height: 1;
    }
    .tr-nav-title em { color: var(--gold); font-style: italic; }
    .tr-nav-kicker {
      font-family: var(--mono); font-size: .62rem;
      letter-spacing: .25em; color: var(--cream-mute);
      text-transform: uppercase; margin-top: 4px;
    }
    .tr-nav-tier {
      font-family: var(--mono); font-size: .58rem;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--gold); border: 1px solid var(--gold);
      padding: 2px 6px; border-radius: 2px;
      justify-self: end;
    }

    /* ── Wrap ── */
    .tr-app { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem 4rem; }

    .tr-banner {
      background: var(--tr-card); border: 1px solid var(--tr-line);
      border-left: 3px solid var(--gold);
      padding: .9rem 1rem; margin-bottom: 2rem;
      font-size: .88rem; color: var(--cream-soft);
      border-radius: 3px;
    }

    .tr-empty {
      text-align: center; padding: 4rem 1rem; color: var(--cream-soft);
    }
    .tr-empty h2 { font-family: var(--serif); font-size: 1.8rem; color: var(--cream); margin-bottom: .6rem; }

    /* ── Trade cards ── */
    .tr-list { display: flex; flex-direction: column; gap: 1rem; }

    .tr-card {
      background: var(--tr-card); border: 1px solid var(--tr-line);
      border-radius: 3px; overflow: hidden;
    }

    .tr-card-head {
      display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--tr-line-soft);
      font-family: var(--mono); font-size: .68rem;
      letter-spacing: .18em; text-transform: uppercase;
      color: var(--cream-mute);
    }
    .tr-card-head .tr-date { color: var(--cream); }
    .tr-card-head .tr-week { color: var(--gold); }
    .tr-card-head .tr-plat {
      margin-left: auto;
      border: 1px solid var(--tr-line);
      padding: 1px 6px; border-radius: 2px;
    }

    .tr-sides {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1px;
      background: var(--tr-line-soft);
    }
    @media (min-width: 720px) {
      .tr-sides[data-count="2"] { grid-template-columns: 1fr 1fr; }
      .tr-sides[data-count="3"] { grid-template-columns: 1fr 1fr 1fr; }
      .tr-sides[data-count="4"] { grid-template-columns: 1fr 1fr 1fr 1fr; }
    }

    .tr-side {
      background: var(--tr-card);
      padding: 1rem 1.1rem;
      display: flex; flex-direction: column; gap: .65rem;
    }

    .tr-side-head { display: flex; align-items: center; gap: .65rem; }
    .tr-side-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--tr-card-2);
      flex-shrink: 0;
      object-fit: cover;
    }
    .tr-side-name {
      font-family: var(--serif); color: var(--cream);
      font-size: 1.05rem; line-height: 1.15;
    }
    .tr-side-team {
      font-family: var(--mono); font-size: .65rem;
      letter-spacing: .15em; color: var(--cream-mute);
      text-transform: uppercase;
    }

    .tr-side-label {
      font-family: var(--mono); font-size: .62rem;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--gold);
    }

    .tr-assets { display: flex; flex-direction: column; gap: .35rem; }
    .tr-asset {
      display: flex; align-items: baseline; gap: .5rem;
      padding: .35rem .55rem;
      background: var(--tr-card-2);
      border-radius: 2px;
      font-size: .9rem; color: var(--cream);
    }
    .tr-asset-pos {
      font-family: var(--mono); font-size: .62rem;
      letter-spacing: .12em;
      color: var(--cream-mute);
      flex-shrink: 0;
      min-width: 30px;
    }
    .tr-asset-name { flex: 1; }
    .tr-asset-team {
      font-family: var(--mono); font-size: .65rem;
      letter-spacing: .12em; color: var(--cream-mute);
    }
    .tr-asset.kind-pick .tr-asset-pos { color: var(--gold); }
    .tr-asset.kind-faab .tr-asset-pos { color: var(--gold); }

    .tr-grade-placeholder {
      margin-top: .35rem;
      font-family: var(--mono); font-size: .58rem;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--cream-mute);
    }

    .tr-footer {
      margin-top: 3rem; text-align: center;
      font-family: var(--mono); font-size: .65rem;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--cream-mute);
    }
  </style>
</head>
<body>
  <div class="site-glow" aria-hidden="true"></div>

  <nav class="tr-nav">
    <div class="tr-nav-inner">
      <button class="tr-nav-back" onclick="history.back()" aria-label="Back">
        <svg viewBox="0 0 8 14" width="9" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 1 1 7 7 13"/></svg>
      </button>
      <div class="tr-nav-center">
        <a href="index.html" class="tr-nav-title">Trade <em>Grader.</em></a>
        <div class="tr-nav-kicker">{{LEAGUE_NAME_UPPER}}</div>
      </div>
      <span class="tr-nav-tier" title="Veteran tier feature">VET</span>
    </div>
  </nav>

  <main class="tr-app">

    <!-- SEO: visually-hidden H1 for crawlers. -->
    <h1 style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">
      Trades · {{LEAGUE_NAME}} fantasy football league
    </h1>

    <div class="tr-banner" id="banner">
      Trades are pulled automatically from your league platform. Grades + 4-week
      revisits arrive in the next build.
    </div>

    <div id="content">
      <div class="tr-empty">
        <h2>Loading…</h2>
        <p>Pulling completed trades.</p>
      </div>
    </div>

    <div class="tr-footer">{{LEAGUE_ABBR}} · Trade Grader · Phase 1</div>

  </main>

  <script src="/pams-template/assets/js/trades.js"></script>
</body>
</html>
