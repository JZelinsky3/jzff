<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trade Grader · {{LEAGUE_NAME}}</title>
  <link rel="stylesheet" href="/pams-template/assets/css/main.css" />
  <style>
    /* ============================================================
       TRADES — Phase 2: bucketed list with per-side LLM grades
       Sections: This Week / The Verdict (revisits) / Earlier
       Uses the shared site nav (nav.js) for consistency.
       ============================================================ */
    :root {
      --tr-card:       #16202c;
      --tr-card-2:     #1c2939;
      --tr-line:       #2a3645;
      --tr-line-soft:  #1e2937;
    }

    .tr-wrap { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1rem 4rem; }

    /* ── Page header ── */
    .tr-page-head {
      text-align: center;
      padding: 1rem 0 2rem;
      border-bottom: 1px solid var(--tr-line-soft);
      margin-bottom: 2rem;
    }
    .tr-page-sup {
      font-family: var(--mono); font-size: .68rem;
      letter-spacing: .25em; color: var(--gold);
      text-transform: uppercase; margin-bottom: .8rem;
    }
    .tr-page-tier {
      display: inline-block; margin-left: .5rem;
      font-size: .58rem; letter-spacing: .2em;
      color: var(--gold); border: 1px solid var(--gold);
      padding: 1px 5px; border-radius: 2px;
    }
    .tr-page-title {
      font-family: var(--serif); font-size: clamp(2rem, 5vw, 3rem);
      color: var(--cream); line-height: 1.1; margin: 0;
    }
    .tr-page-title em { color: var(--gold); font-style: italic; }

    .tr-empty {
      text-align: center; padding: 3rem 1rem; color: var(--cream-soft);
    }
    .tr-empty h2 { font-family: var(--serif); font-size: 1.6rem; color: var(--cream); margin-bottom: .6rem; }

    /* ── Tier-locked CTA ── */
    .tr-lock {
      text-align: center; padding: 3rem 1rem 4rem;
      background: var(--tr-card); border: 1px solid var(--tr-line);
      border-radius: 3px;
    }
    .tr-lock-icon {
      font-size: 2.5rem; color: var(--gold);
      letter-spacing: .3em; margin-bottom: 1rem;
    }
    .tr-lock h2 {
      font-family: var(--serif); font-size: clamp(1.4rem, 4vw, 2rem);
      color: var(--cream); margin-bottom: .9rem;
    }
    .tr-lock h2 em { color: var(--gold); font-style: italic; }
    .tr-lock p {
      max-width: 30rem; margin: 0 auto 1.5rem;
      color: var(--cream-soft); font-size: .92rem; line-height: 1.5;
    }
    .tr-lock-cta {
      display: inline-block;
      font-family: var(--mono); font-size: .7rem;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--ink); background: var(--gold);
      padding: .75rem 1.4rem; border-radius: 2px;
      text-decoration: none;
    }
    .tr-lock-cta:hover { background: var(--gold-bright); }

    /* ── Top-level tabs ── */
    .tr-tabs {
      display: flex;
      border-bottom: 1px solid var(--tr-line);
      margin-bottom: 2rem;
      overflow-x: auto;
      scrollbar-width: none;
      gap: 0;
    }
    .tr-tabs::-webkit-scrollbar { display: none; }
    .tr-tab {
      font-family: var(--mono); font-weight: 700;
      font-size: .65rem; letter-spacing: .25em; text-transform: uppercase;
      padding: .85rem 1.6rem;
      border: none; border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--cream-mute);
      cursor: pointer;
      transition: color .15s, border-color .15s;
      margin-bottom: -1px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tr-tab:hover { color: var(--cream); }
    .tr-tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    /* ── Section header ── */
    .tr-section { margin-bottom: 2.5rem; }
    .tr-section-head {
      display: flex; align-items: baseline; gap: .9rem; flex-wrap: wrap;
      padding-bottom: .8rem; margin-bottom: 1rem;
      border-bottom: 1px solid var(--tr-line-soft);
    }
    .tr-section-num {
      font-family: var(--mono); font-size: .68rem;
      letter-spacing: .25em; color: var(--gold);
      text-transform: uppercase;
    }
    .tr-section-title {
      font-family: var(--serif); font-size: 1.3rem; color: var(--cream);
    }
    .tr-section-title em { color: var(--gold); font-style: italic; }
    .tr-section-meta {
      margin-left: auto;
      font-family: var(--mono); font-size: .65rem;
      letter-spacing: .15em; color: var(--cream-mute);
      text-transform: uppercase;
    }
    .tr-section-empty {
      padding: 1.5rem 1rem; text-align: center;
      color: var(--cream-mute); font-size: .85rem;
      background: var(--tr-card); border: 1px dashed var(--tr-line);
      border-radius: 3px;
    }

    /* ── Trade cards ── */
    .tr-list { display: flex; flex-direction: column; gap: 1rem; }

    .tr-card {
      background: var(--tr-card); border: 1px solid var(--tr-line);
      border-radius: 3px; overflow: hidden;
    }

    .tr-card-head {
      display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--tr-line-soft);
      font-family: var(--mono); font-size: .68rem;
      letter-spacing: .18em; text-transform: uppercase;
      color: var(--cream-mute);
    }
    .tr-card-head .tr-date { color: var(--cream); }
    .tr-card-head .tr-week { color: var(--gold); }
    .tr-card-head .tr-plat {
      margin-left: auto;
      border: 1px solid var(--tr-line);
      padding: 1px 6px; border-radius: 2px;
    }

    /* Trade-level recap (one combined 3-4 sentence summary). Rendered
       above the sides; per-side blocks only carry the letter grade now. */
    .tr-summary {
      padding: 1rem 1.1rem .9rem;
      border-bottom: 1px solid var(--tr-line-soft);
      font-size: .92rem;
      line-height: 1.55;
      color: var(--cream-soft);
    }

    .tr-sides {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1px;
      background: var(--tr-line-soft);
    }
    @media (min-width: 720px) {
      .tr-sides[data-count="2"] { grid-template-columns: 1fr 1fr; }
      .tr-sides[data-count="3"] { grid-template-columns: 1fr 1fr 1fr; }
      .tr-sides[data-count="4"] { grid-template-columns: 1fr 1fr 1fr 1fr; }
    }

    .tr-side {
      background: var(--tr-card);
      padding: 1rem 1.1rem;
      display: flex; flex-direction: column; gap: .65rem;
    }

    .tr-side-head { display: flex; align-items: center; gap: .65rem; }
    .tr-side-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--tr-card-2);
      flex-shrink: 0;
      object-fit: cover;
    }
    .tr-side-name {
      font-family: var(--serif); color: var(--cream);
      font-size: 1.05rem; line-height: 1.15;
    }
    .tr-side-team {
      font-family: var(--mono); font-size: .65rem;
      letter-spacing: .15em; color: var(--cream-mute);
      text-transform: uppercase;
    }

    .tr-side-label {
      font-family: var(--mono); font-size: .62rem;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--gold);
    }

    .tr-assets { display: flex; flex-direction: column; gap: .35rem; }
    .tr-asset {
      display: flex; align-items: baseline; gap: .5rem;
      padding: .35rem .55rem;
      background: var(--tr-card-2);
      border-radius: 2px;
      font-size: .9rem; color: var(--cream);
    }
    .tr-asset-pos {
      font-family: var(--mono); font-size: .62rem;
      letter-spacing: .12em;
      color: var(--cream-mute);
      flex-shrink: 0;
      min-width: 30px;
    }
    .tr-asset-name { flex: 1; }
    .tr-asset-team {
      font-family: var(--mono); font-size: .65rem;
      letter-spacing: .12em; color: var(--cream-mute);
    }
    .tr-asset.kind-pick .tr-asset-pos { color: var(--gold); }
    .tr-asset.kind-faab .tr-asset-pos { color: var(--gold); }

    /* ── Per-side grade block ── */
    .tr-grade {
      margin-top: .55rem; padding-top: .65rem;
      border-top: 1px solid var(--tr-line-soft);
      display: flex; flex-direction: column; gap: .4rem;
    }
    .tr-grade-letter {
      font-family: var(--serif); font-size: 1.8rem;
      line-height: 1; font-weight: 700;
      color: var(--cream);
    }
    .tr-grade-letter.g-a { color: #6dcf8a; }   /* trophy-room green */
    .tr-grade-letter.g-b { color: #e8c889; }   /* gold */
    .tr-grade-letter.g-c { color: #c9a878; }   /* dimmer gold */
    .tr-grade-letter.g-d { color: #a04830; }   /* rust */
    .tr-grade-blurb {
      font-size: .82rem; line-height: 1.45;
      color: var(--cream-soft);
      margin: 0;
    }
    .tr-grade-pending {
      margin-top: .55rem; padding-top: .55rem;
      border-top: 1px solid var(--tr-line-soft);
      font-family: var(--mono); font-size: .58rem;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--cream-mute);
    }
    /* Revisit: show the initial grade smaller and dimmed, then arrow, then
       new grade at full size. No strike-through — the dimming + size shift
       already reads as "this was the prior grade." */
    .tr-grade-row { display: flex; align-items: center; gap: .55rem; }
    .tr-grade-then {
      font-size: 1.1rem;
      opacity: .55;
    }
    .tr-grade-arrow { color: var(--cream-mute); font-size: 1rem; }

    .tr-footer {
      margin-top: 3rem; text-align: center;
      font-family: var(--mono); font-size: .65rem;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--cream-mute);
    }
  </style>
</head>
<body>
  <div class="site-glow" aria-hidden="true"></div>

  <nav id="site-nav" data-page="trades" data-chapter="LIVE · TRADE GRADER"
       data-back-href="live-season/" data-back-label="Back to Live Season"></nav>
  <script src="/pams-template/assets/js/nav.js"></script>

  <main class="tr-wrap">

    <header class="tr-page-head">
      <div class="tr-page-sup">{{LEAGUE_NAME_UPPER}}<span class="tr-page-tier">VET</span></div>
      <h1 class="tr-page-title">Trade <em>Grader.</em></h1>
    </header>

    <div id="content">
      <div class="tr-empty">
        <h2>Loading…</h2>
        <p>Pulling completed trades.</p>
      </div>
    </div>

    <div class="tr-footer">{{LEAGUE_ABBR}} · Trade Grader · Auto-graded by AI</div>

  </main>

  <script src="/pams-template/assets/js/trades.js"></script>
</body>
</html>
