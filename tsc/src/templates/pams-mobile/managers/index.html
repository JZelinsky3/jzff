<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Managers · {{LEAGUE_NAME}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">
<link rel="stylesheet" href="/pams-template/assets/css/mobile-app.css">
<style>
.mg-head { text-align: center; padding: 1.1rem 0 1rem; }
.mg-title {
    font-family: var(--serif);
    font-size: 1.7rem; line-height: 1.05;
    color: var(--cream);
}
.mg-title em { font-style: italic; color: var(--gold); }

/* ── Ticket stubs — one admission ticket per member. The stub (avatar side)
      is split off by a dashed perforation with punched semicircle notches. ── */
.mg-tickets { display: flex; flex-direction: column; gap: .55rem; margin-top: .35rem; }
.mg-ticket {
    position: relative;
    display: flex; align-items: stretch;
    background: linear-gradient(135deg, var(--ink-card), var(--ink-soft));
    border: 1px solid var(--ink-line);
    border-radius: 10px;
    overflow: hidden; /* clips the notch circles into semicircle bites */
    text-decoration: none; color: inherit;
}
.mg-stub {
    flex: none; width: 62px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    border-right: 1px dashed var(--ink-line);
}
/* Punched holes riding the perforation line, filled with the page bg. */
.mg-ticket::before, .mg-ticket::after {
    content: '';
    position: absolute; left: 56px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--ink);
    border: 1px solid var(--ink-line);
}
.mg-ticket::before { top: -7px; }
.mg-ticket::after  { bottom: -7px; }
.mg-body {
    flex: 1; min-width: 0; min-height: 58px;
    display: flex; align-items: center; gap: .6rem;
    padding: .55rem .8rem .55rem .7rem;
}
.mg-ava {
    flex: none;
    position: relative; overflow: hidden;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--ink-line);
    background: var(--ink-soft);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif);
    font-size: 1rem; color: var(--gold);
}
.mg-ava img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
}
/* Champion adornments restored from the original ticket-stub design:
   gold border on the ticket, the perforation notches, and the avatar
   ring. Reigning champion = current title-holder; adds a brighter
   gold name on top of the champ treatment. */
.mg-ticket.is-champ { border-color: var(--gold-deep); }
.mg-ticket.is-champ .mg-stub { border-right-color: rgba(232,200,137,.45); }
.mg-ticket.is-champ::before, .mg-ticket.is-champ::after { border-color: var(--gold-deep); }
.mg-ticket.is-champ .mg-ava { border-color: var(--gold-deep); background: rgba(232,200,137,.07); }
.mg-ticket.is-reigning { border-color: var(--gold); }
.mg-ticket.is-reigning .mg-stub { border-right-color: rgba(232,200,137,.55); }
.mg-ticket.is-reigning::before, .mg-ticket.is-reigning::after { border-color: var(--gold); }
.mg-ticket.is-reigning .mg-ava { border-color: var(--gold); background: rgba(232,200,137,.1); }
/* .mg-name color rules consolidated below (with !important to win over
   the body's default cream inheritance). */

/* Active member names render near-white (#fffaf0, "floral white") so
   they pop unmistakably against the card — the body's default cream
   is too close to the bg to read as a distinct highlight. Alumni stay
   muted cream so past members read as "lower tier." Reigning champion
   gets a saturated amber gold (the default --gold token is too pale
   and reads as cream too). */
.mg-name {
    min-width: 0; flex: 1;
    font-weight: 600; font-size: .95rem;
    color: #fffaf0 !important;
}
.mg-alumni .mg-name { color: var(--cream-mute) !important; }
.mg-ticket.is-reigning .mg-name { color: #f5b840 !important; }
.mg-alumni.is-reigning .mg-name { color: #f5b840 !important; }
/* Two-row layout: name on top, small ("Team · tenure" + championship
   pills) below. The small is a flex row so the team name ellipsizes
   while the tenure tail + pills hug the right and never wrap. */
.mg-name small {
    display: flex;
    align-items: baseline;
    gap: 0;
    font-weight: 400; font-size: .7rem; color: var(--cream-mute);
    margin-top: 2px;
    line-height: 1.35;
    width: 100%;
    min-width: 0;
}
.mg-team {
    flex: 0 1 auto;
    min-width: 0;
    font-size: .68rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
/* Tenure tail + pills are pinned to the right side of the line and
   share `flex: none` so they never compress and never wrap. The team
   name above shrinks via min-width:0 + ellipsis to make room. */
.mg-tenure {
    flex: none;
    white-space: nowrap;
    margin-left: .15rem;
}
/* Championship-year pills — small gold mono pills, one per year,
   inline next to the tenure line under the name. */
.mg-champ-pill {
    flex: none;
    display: inline-flex;
    align-items: center;
    padding: 0 5px;
    margin-left: .25rem;
    border-radius: 4px;
    border: 1px solid rgba(232, 200, 137, .35);
    background: rgba(232, 200, 137, .07);
    color: var(--gold);
    font-family: var(--mono);
    font-weight: 700;
    font-size: .52rem;
    letter-spacing: .06em;
    line-height: 1.4;
}
.mg-rings { flex: none; color: var(--gold); font-size: .7rem; letter-spacing: .08em; }
.mg-rec { flex: none; font-family: var(--mono); font-weight: 700; font-size: .72rem; color: var(--cream-soft); text-align: right; }
.mg-rec small { display: block; font-weight: 400; font-size: .56rem; color: var(--cream-mute); }
/* Alumni tickets are slightly dimmed via opacity (still readable, just
   reads as "past member") — but their NAMES use the same bright cream
   as active members. The opacity gives a subtle hierarchy without
   downgrading the name color itself. */
.mg-alumni { opacity: .85; }
.mg-alumni .mg-ava { color: var(--cream-mute); }
</style>
</head>
<body>
<div class="site-glow"></div>

<nav id="site-nav" data-page="managers" data-chapter="Ch. II · The Society" data-back-href="./"></nav>
<script src="/pams-template/assets/js/mobile-app.js"></script>

<main class="m-main">
    <header class="mg-head">
        <div class="m-kicker">The Society</div>
        <h1 class="mg-title">The <em>Managers.</em></h1>
        <div class="m-mono" id="mgCount" style="margin-top:.35rem"></div>
    </header>

    <section id="currentSection" hidden class="m-section" style="margin-top:0">
        <div class="m-kicker">Current Members</div>
        <div class="mg-tickets" id="currentList"></div>
    </section>

    <section id="alumniSection" hidden class="m-section" style="margin-bottom:1rem">
        <div class="m-kicker">Alumni</div>
        <div class="mg-tickets" id="alumniList"></div>
    </section>

    <div class="m-empty" id="emptyMsg" hidden>No managers on file yet.</div>
</main>

<script>
(function () {
    'use strict';

    function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
    }

    fetch('data/managers_directory.json')
        .then(function (r) { return r.ok ? r.json() : null; })
        .catch(function () { return null; })
        .then(function (dir) {
            var managers = (dir && dir.managers) || [];
            if (!managers.length) {
                document.getElementById('emptyMsg').hidden = false;
                return;
            }
            // Sort by total wins first — championships are a decorative
            // signal but raw wins are the truer "who's been the better
            // manager?" question. Ties broken by win pct, then name.
            managers.sort(function (a, b) {
                return (b.win_pct - a.win_pct) || (b.wins - a.wins) || a.name.localeCompare(b.name);
            });
            var current = managers.filter(function (m) { return m.is_current; });
            var alumni = managers.filter(function (m) { return !m.is_current; });

            document.getElementById('mgCount').textContent =
                current.length + ' active' + (alumni.length ? ' · ' + alumni.length + ' alumni' : '');

            if (current.length) {
                document.getElementById('currentSection').hidden = false;
                document.getElementById('currentList').innerHTML = current.map(row).join('');
            }
            if (alumni.length) {
                document.getElementById('alumniSection').hidden = false;
                document.getElementById('alumniList').innerHTML = alumni.map(function (m) { return row(m, true); }).join('');
            }
        });

    function row(m, isAlumni) {
        var initial = (m.name || '?').trim().charAt(0).toUpperCase();
        // Real team avatar from the platform when the export has one;
        // the initial underneath is the fallback if the image 404s.
        var img = m.avatar
            ? '<img src="' + esc(m.avatar) + '" alt="" loading="lazy" onerror="this.remove()">'
            : '';
        // Championship year pills — one per title, newest first, capped
        // at 3 visible (older collapse to "+N" so a 6× champ doesn't push
        // the row off-screen). No star glyph — the gold pill itself
        // already carries the championship signal.
        var champYears = (m.championship_seasons || []).slice().sort(function (a, b) { return b - a; });
        var maxPills = 3;
        var pills = champYears.slice(0, maxPills).map(function (y) {
            return '<span class="mg-champ-pill">' + esc(y) + '</span>';
        }).join('');
        if (champYears.length > maxPills) {
            pills += '<span class="mg-champ-pill">+' + (champYears.length - maxPills) + '</span>';
        }
        var tenure = m.seasons_played + (m.seasons_played === 1 ? ' season' : ' seasons');
        // is-champ: ever won (gives the gold ticket-stub border + avatar ring).
        // is-reigning: holds the most recent title (adds gold name + brighter border).
        var classes = 'mg-ticket';
        if (m.championships) classes += ' is-champ';
        if (m.is_reigning_champion) classes += ' is-reigning';
        if (isAlumni) classes += ' mg-alumni';
        // Color the big name inline so no external CSS rule can override
        // it. Inline styles beat class !important on the same element,
        // so this is the most resilient way to make the cream/gold show
        // when something downstream (cache, an unrelated rule) is
        // suppressing the change.
        var nameColor = m.is_reigning_champion
            ? '#f5b840'                   // reigning: saturated amber gold
            : isAlumni
                ? 'var(--cream-mute)'     // alumni: muted cream
                : '#fffaf0';              // active: bright floral white
        return '<a class="' + classes + '" href="managers/manager.html?id=' + encodeURIComponent(m.user_id) + '">' +
            '<span class="mg-stub"><span class="mg-ava">' + esc(initial) + img + '</span></span>' +
            '<span class="mg-body">' +
                '<span class="mg-name" style="color:' + nameColor + '">' + esc(m.name) +
                    '<small>' +
                        '<span class="mg-team">' + esc(m.team_latest || '') + '</span>' +
                        '<span class="mg-tenure"> · ' + tenure + '</span>' +
                        pills +
                    '</small>' +
                '</span>' +
                '<span class="mg-rec">' + esc(m.total_record) + '<small>' + (m.win_pct * 100).toFixed(0) + '% win</small></span>' +
            '</span>' +
        '</a>';
    }
})();
</script>
</body>
</html>
