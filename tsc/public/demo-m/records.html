<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Record Book · The Lakeside League</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">

<style>
/* Trophy-room green — full chapter theme. Re-pointing the shared tokens
   recolors the m-* primitives, the bottom sheets, AND (via the chrome vars)
   the fixed app bar + tab bar so the whole shell sits in the green room. */
:root {
    --rec: #8fb89a; --rec-deep: #5f8a6c;
    --ink:           #0d1512;
    --ink-soft:      #101a15;
    --ink-card:      #131e18;
    --ink-line:      #24352b;
    --ink-line-soft: #1c2a22;
    --m-chrome-bg:   #0e1713;
    --m-chrome-bg2:  #101a15;
    /* Good/bad title tints — muted gold + dusty clay so they read as
       positive/negative without fighting the trophy-room green. */
    --good: #d4b14e;
    --bad:  #cd6f5f;
}
.rb-card-label.is-good { color: var(--good); }
.rb-card-label.is-bad  { color: var(--bad); }
.m-tab.is-active { color: var(--rec); }
.m-tab.is-active::before { background: var(--rec); }

.rb-head { text-align: center; padding: 1.1rem 0 .9rem; }
.rb-title {
    font-family: var(--serif);
    font-size: 1.7rem; line-height: 1.05;
    color: var(--cream);
}
.rb-title em { font-style: italic; color: var(--rec); }

.rb-seg button.is-active { background: var(--rec); color: #0d1512; }

.rb-card { position: relative; }
.rb-card + .rb-card { margin-top: .55rem; }
/* Numbered-ledger header: every record carries its position in the chapter,
   so the stack reads as ordered entries instead of identical tiles. */
.rb-card-head { display: flex; align-items: center; gap: .55rem; margin-bottom: .1rem; }
.rb-idx {
    flex: none;
    font-family: var(--serif); font-size: 1.05rem; line-height: 1;
    color: var(--rec-deep); font-variant-numeric: tabular-nums;
}
.rb-card-label {
    font-family: var(--mono); font-weight: 700;
    font-size: .54rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--rec-deep);
}
.rb-card-head .rb-card-label { flex: 1; min-width: 0; }
/* The #1 record of each tab is the chapter's headline — accent rule, brighter
   number + label, and a small tag set it apart as the showpiece. */
.rb-lead-tag {
    flex: none; margin-left: auto;
    font-family: var(--mono); font-weight: 700;
    font-size: .48rem; letter-spacing: .16em; text-transform: uppercase;
    color: #0d1512; background: var(--rec);
    padding: .14rem .42rem; border-radius: 999px;
}
.rb-card.rb-lead {
    border-color: var(--rec-deep);
    /* clip the accent rule to the rounded corners so it can't poke out */
    overflow: hidden;
    background:
        linear-gradient(180deg, rgba(143, 184, 154, .07), transparent 55%),
        var(--ink-card);
}
.rb-card.rb-lead::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    border-radius: 12px 12px 0 0;
    /* even strip across the full top edge (was fading out to the right) */
    background: var(--rec);
}
.rb-card.rb-lead .rb-idx,
.rb-card.rb-lead .rb-card-label { color: var(--rec); }
.rb-top {
    display: flex; align-items: baseline; gap: .65rem;
    margin-top: .35rem;
}
.rb-top-value {
    font-family: var(--serif);
    font-size: 1.7rem; line-height: 1;
    color: var(--rec);
    white-space: nowrap;
}
/* When a value carries a stacked rate (PPG), let it become a little column
   so the small line sits directly under the number. */
.rb-top-value.has-sub { display: inline-flex; flex-direction: column; align-items: flex-start; }
.rb-top-value small {
    font-family: var(--mono); font-weight: 600;
    font-size: .5rem; letter-spacing: .08em; text-transform: uppercase;
    color: var(--cream-mute);
    margin-top: 3px;
}
/* Inline tag riding next to a number (games-played on the full-season
   total). Raised to sit against the big serif figure's baseline. */
.rb-val-g {
    font-style: normal;
    font-family: var(--mono); font-weight: 700;
    font-size: .46rem; letter-spacing: .06em; text-transform: uppercase;
    color: var(--cream-mute);
    margin-left: 5px; vertical-align: .34em;
}
.rb-name-g {
    font-style: normal;
    font-family: var(--mono); font-weight: 700;
    font-size: .46rem; letter-spacing: .06em; text-transform: uppercase;
    color: var(--cream-mute); margin-left: 1px;
}
.rb-top-holder { min-width: 0; }
.rb-top-holder b {
    display: block;
    font-family: var(--serif); font-weight: 400;
    font-size: 1rem; color: var(--cream);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rb-top-holder small {
    font-family: var(--mono); font-size: .56rem;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--cream-mute);
}
.rb-others {
    margin-top: .6rem;
    padding-top: .5rem;
    border-top: 1px solid #1c2a22;
}
.rb-other {
    display: flex; align-items: center; gap: .6rem;
    padding: .22rem 0;
}
.rb-other-rank { flex: none; font-family: var(--mono); font-size: .58rem; color: var(--cream-mute); width: 1.2rem; }
/* Collapsed: top 3 visible; tap unfolds the rest. */
.rb-extra { display: none; }
.rb-card.is-open .rb-extra { display: flex; }
.rb-expand-hint {
    margin-top: .5rem;
    font-family: var(--mono); font-weight: 700;
    font-size: .54rem; letter-spacing: .18em; text-transform: uppercase;
    color: var(--rec-deep);
    text-align: center;
}
.rb-card.is-open .rb-hint-more { display: none; }
.rb-card:not(.is-open) .rb-hint-less { display: none; }
.rb-other-name { min-width: 0; flex: 1; font-size: .8rem; font-weight: 500; color: var(--cream-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rb-other-name small {
    display: block;
    font-family: var(--mono); font-size: .52rem;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--cream-mute);
}
.rb-other-val { flex: none; font-family: var(--mono); font-weight: 700; font-size: .68rem; color: var(--rec); }
.rb-other-val.has-sub { display: inline-flex; flex-direction: column; align-items: flex-end; line-height: 1.05; }
.rb-other-val small {
    font-family: var(--mono); font-weight: 600;
    font-size: .46rem; letter-spacing: .05em; text-transform: uppercase;
    color: var(--cream-mute);
    margin-top: 2px;
}
.rb-other-val .rb-val-g { font-size: .44rem; vertical-align: .1em; margin-left: 4px; }

/* ── Seasons: marquee leader ───────────────────────────────────── */
/* The #1 season is pulled out as an oversized editorial block so it
   reads as the headline, not just the top row of a list. */
.rb-hero { margin-top: .5rem; }
.rb-hero-top { display: flex; align-items: flex-end; justify-content: space-between; gap: .8rem; }
.rb-hero-who { min-width: 0; }
.rb-hero-who b {
    display: block;
    font-family: var(--serif); font-weight: 400;
    font-size: 1.4rem; line-height: 1.04; color: var(--cream);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rb-hero-who small {
    font-family: var(--mono); font-size: .56rem;
    letter-spacing: .1em; text-transform: uppercase; color: var(--cream-mute);
}
.rb-hero-val { flex: none; font-family: var(--serif); font-size: 2.6rem; line-height: .85; color: var(--rec); text-align: right; font-variant-numeric: tabular-nums; }
/* Lowest PPG has no bars — bigger names + more line spacing hold the collapsed
   card level with Highest PPG (which gets its height from the bars). */
.rb-bars-bare { gap: 1.25rem; }
.rb-bars-bare .rb-bar-name { font-size: .96rem; }
.rb-hero-val.has-sub { display: inline-flex; flex-direction: column; align-items: flex-end; }
.rb-hero-val small {
    font-family: var(--mono); font-weight: 600;
    font-size: .52rem; letter-spacing: .06em; text-transform: uppercase;
    color: var(--cream-mute); margin-top: 4px;
}
.rb-hero-val .rb-val-g { font-size: .4rem; vertical-align: .42em; margin-left: 5px; }
.rb-hero + .rb-bars { margin-top: .65rem; padding-top: .6rem; border-top: 1px solid var(--ink-line-soft); }

/* ── Seasons: leaderboard bars ─────────────────────────────────── */
.rb-bars { margin-top: .5rem; display: flex; flex-direction: column; gap: .55rem; }
.rb-bar-row { display: grid; grid-template-columns: 1.1rem 1fr auto; align-items: center; column-gap: .55rem; }
/* `.rb-bar-row` is defined after `.rb-extra`, so it would otherwise win the
   cascade and leave the extras visible — re-hide them at matching specificity. */
.rb-bar-row.rb-extra { display: none; }
.rb-card.is-open .rb-bar-row.rb-extra { display: grid; }
.rb-bar-rank { align-self: start; padding-top: .12rem; font-family: var(--mono); font-size: .56rem; color: var(--cream-mute); }
.rb-bar-main { min-width: 0; }
.rb-bar-name { display: block; font-size: .82rem; font-weight: 500; color: var(--cream-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rb-bar-row.is-lead .rb-bar-name { color: var(--cream); font-weight: 600; }
.rb-bar-track { display: block; height: 5px; margin: 4px 0 3px; border-radius: 3px; background: var(--ink-line-soft); overflow: hidden; }
.rb-bar-fill { display: block; height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--rec-deep), var(--rec)); }
.rb-bar-row.is-lead .rb-bar-fill { background: linear-gradient(90deg, var(--rec), #d2ead8); }
.rb-bar-sub { display: block; font-family: var(--mono); font-size: .5rem; letter-spacing: .08em; text-transform: uppercase; color: var(--cream-mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rb-bar-val { flex: none; font-family: var(--serif); font-size: 1.05rem; line-height: 1; color: var(--rec); text-align: right; font-variant-numeric: tabular-nums; }
.rb-bar-val.has-sub { display: inline-flex; flex-direction: column; align-items: flex-end; }
.rb-bar-row.is-lead .rb-bar-val { font-size: 1.3rem; }
.rb-bar-val small { font-family: var(--mono); font-weight: 600; font-size: .46rem; letter-spacing: .05em; text-transform: uppercase; color: var(--cream-mute); margin-top: 2px; }
.rb-bar-val .rb-val-g { font-size: .44rem; vertical-align: .12em; margin-left: 4px; }

/* ── Games: marquee scorecard ──────────────────────────────────── */
/* The leader is a compact stub: the headline stat sits big on the left
   (score, or +margin for blowout/closest), the mini boxscore rides to
   its right — far less vertical room than the old stacked ticket. */
.rb-ghero { margin-top: .5rem; display: flex; align-items: center; gap: .85rem; }
.rb-gstat { flex: none; min-width: 3.4rem; font-family: var(--serif); font-size: 2.4rem; line-height: .85; color: var(--rec); }
.rb-gstat small { display: block; font-family: var(--mono); font-weight: 600; font-size: .48rem; letter-spacing: .14em; text-transform: uppercase; color: var(--rec-deep); margin-top: 5px; }
.rb-gcard { flex: 1; min-width: 0; border-left: 1px solid var(--ink-line); padding-left: .85rem; }
.rb-gline { display: flex; align-items: baseline; justify-content: space-between; gap: .5rem; padding: .1rem 0; }
.rb-gline-name { font-family: var(--serif); font-size: .98rem; color: var(--cream-mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rb-gline-score { flex: none; font-family: var(--mono); font-weight: 700; font-size: .84rem; color: var(--cream-mute); }
.rb-gline.is-win .rb-gline-name { color: var(--cream); }
.rb-gline.is-win .rb-gline-score { color: var(--rec); }
.rb-gstamp { margin-top: .32rem; font-family: var(--mono); font-size: .5rem; letter-spacing: .16em; text-transform: uppercase; color: var(--rec-deep); }
/* Combined-score records list both managers; the "vs Opponent" tail reads
   as context, not a co-holder — smaller and dimmer than the lead name. */
.rb-vs { font-size: .72em; color: var(--cream-mute); }

/* ── Grouped swipe rails ───────────────────────────────────────── */
/* Related records are bundled into a horizontal carousel: swipe sideways
   between the pair/set, scroll down between groups. */
.rb-group { margin-bottom: 1.4rem; }
.rb-group-head { display: flex; align-items: baseline; justify-content: space-between; margin: 0 .15rem .5rem; }
.rb-group-title { font-family: var(--serif); font-size: 1.2rem; color: var(--cream); }
.rb-group-hint { font-family: var(--mono); font-weight: 700; font-size: .5rem; letter-spacing: .16em; text-transform: uppercase; color: var(--rec-deep); }
.rb-rail { display: flex; gap: .7rem; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; padding: .15rem .15rem .3rem; scrollbar-width: none; align-items: flex-start; }
.rb-rail::-webkit-scrollbar { display: none; }
.rb-slide { flex: 0 0 89%; scroll-snap-align: center; }
.rb-rail.is-solo .rb-slide { flex: 0 0 100%; }
.rb-dots { display: flex; gap: .35rem; justify-content: center; margin-top: .5rem; }
.rb-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ink-line); transition: width .2s, background .2s; }
.rb-dot.on { background: var(--rec); width: 15px; border-radius: 3px; }

/* ── Careers: podium ───────────────────────────────────────────── */
.rb-podium { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .5rem; align-items: end; margin-top: .7rem; }
.rb-step { border: 1px solid var(--ink-line); border-radius: 12px 12px 0 0; padding: .6rem .35rem .65rem; text-align: center; background: linear-gradient(180deg, var(--ink-card), var(--ink-soft)); }
.rb-step-medal { font-family: var(--mono); font-weight: 700; font-size: .5rem; letter-spacing: .12em; }
.rb-step-name { font-family: var(--serif); font-size: .9rem; color: var(--cream-soft); margin-top: .2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rb-step-val { font-family: var(--mono); font-weight: 700; font-size: 1.05rem; color: var(--rec); margin-top: .15rem; }
.rb-step-sub { font-family: var(--mono); font-size: .44rem; letter-spacing: .03em; color: var(--cream-mute); margin-top: .25rem; line-height: 1.35; }
.rb-s1 { border-color: #d9b441; border-top: 3px solid #d9b441; padding-bottom: 1.4rem; }
.rb-s1 .rb-step-medal { color: #d9b441; } .rb-s1 .rb-step-name { font-size: 1rem; color: var(--cream); }
.rb-s2 { border-color: #9fb2c2; border-top: 3px solid #9fb2c2; padding-bottom: .95rem; } .rb-s2 .rb-step-medal { color: #9fb2c2; }
.rb-s3 { border-color: #c08a5a; border-top: 3px solid #c08a5a; padding-bottom: .55rem; } .rb-s3 .rb-step-medal { color: #c08a5a; }
/* Ranks 4-10 unfold below the podium with extra air above them. */
.rb-pod-more { margin-top: .95rem; padding-top: .7rem; border-top: 1px solid var(--ink-line-soft); display: none; }
.rb-card.is-open .rb-pod-more { display: block; }

/* ── Careers: no-podiums roll ──────────────────────────────────── */
.rb-nopod-note { margin-top: .5rem; font-family: var(--mono); font-size: .54rem; letter-spacing: .04em; color: var(--cream-mute); }
.rb-nopod-rows { display: flex; flex-direction: column; margin-top: .7rem; }
.rb-nopod-row { display: flex; align-items: baseline; justify-content: space-between; gap: .6rem; padding: .4rem .1rem; border-bottom: 1px solid var(--ink-line-soft); }
.rb-nopod-row:last-child { border-bottom: none; }
.rb-nopod-name { min-width: 0; font-family: var(--serif); font-size: .88rem; color: var(--cream-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rb-nopod-name small { font-family: var(--mono); font-size: .5rem; letter-spacing: .05em; text-transform: uppercase; color: var(--cream-mute); margin-left: .45rem; }
.rb-nopod-best { flex: none; font-family: var(--mono); font-size: .5rem; letter-spacing: .1em; text-transform: uppercase; color: var(--cream-mute); }
.rb-nopod-best b { font-weight: 700; font-size: .82rem; letter-spacing: 0; color: var(--rec); margin-left: .3rem; }
</style>
</head>
<body>
<div class="site-glow"></div>

<nav id="site-nav" data-page="records" data-chapter="Ch. V · Record Book" data-back-href="./"></nav>
<script src="/pams-template/assets/js/mobile-app.js"></script>

<main class="m-main">
    <header class="rb-head">
        <div class="m-kicker" style="color:var(--rec-deep)">The Trophy Room</div>
        <h1 class="rb-title">The Record <em>Book.</em></h1>
    </header>

    <div class="m-seg rb-seg" id="seg" style="margin-bottom:.7rem">
        <button data-sec="weekly" class="is-active">Games</button>
        <button data-sec="season">Seasons</button>
        <button data-sec="career">Careers</button>
        <button data-sec="feats">Feats</button>
    </div>

    <div id="cards"><div class="m-empty">Dusting off the ledgers…</div></div>
</main>

<script>
(function () {
    'use strict';

    function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
    }
    function num(n, d) {
        if (n == null || isNaN(n)) return '—';
        // Fixed precision (min == max) so a whole number still prints its
        // trailing .0 — keeps the PPG / score columns vertically aligned
        // instead of integers rendering narrower than decimals.
        var fd = d == null ? 1 : d;
        return Number(n).toLocaleString('en-US', { minimumFractionDigits: fd, maximumFractionDigits: fd });
    }
    function ord(n) {
        if (n == null || isNaN(n)) return '—';
        n = Math.round(n);
        var s = ['th', 'st', 'nd', 'rd'], v = n % 100;
        return n + (s[(v - 20) % 10] || s[v] || s[0]);
    }

    var book = null;
    var section = 'weekly';

    fetch('data/record_book.json')
        .then(function (r) { return r.ok ? r.json() : null; })
        .catch(function () { return null; })
        .then(function (data) {
            book = data && data.full_book;
            render();
        });

    // Per-record config: label + how to read value/context out of an entry.
    function gameCtx(e) {
        return e.season + ' · W' + e.week + ' · vs ' + (e.opp_owner || '—') + ' · ' + num(e.score) + '–' + num(e.opp_score);
    }
    var DEFS = {
        weekly: [
            ['highest_single_week_score', 'Highest Score', function (e) { return num(e.score); }, gameCtx],
            ['lowest_single_week_score', 'Lowest Score', function (e) { return num(e.score); }, gameCtx],
            ['biggest_blowouts', 'Biggest Blowout', function (e) { return '+' + num(e.margin); }, gameCtx],
            ['closest_games', 'Closest Game', function (e) { return '+' + num(e.margin, 2); }, gameCtx],
            ['luckiest_wins', 'Luckiest Win', function (e) { return num(e.score); }, gameCtx],
            ['unluckiest_losses', 'Unluckiest Loss', function (e) { return num(e.score); }, gameCtx],
            ['highest_combined_score', 'Highest Combined', function (e) { return num(e.score + e.opp_score); }, gameCtx],
            ['lowest_combined_score', 'Lowest Combined', function (e) { return num(e.score + e.opp_score); }, gameCtx],
        ],
        season: [
            // Headline number on the right carries its rate beneath it:
            // reg PPG for the season title, games-played for the full-season
            // title (see valExtra). Context line stays season + team + record.
            ['highest_season_pf', 'Most Points', function (e) { return num(e.reg_pf, 0); }, seasonCtx],
            // Full-season variant folds in championship-bracket playoff
            // points so deep title runs sit alongside the regular-season
            // ledger; games-played rides next to the total.
            ['highest_total_season_pf', 'Most Points, Full Season', function (e) { return num(e.total_pf, 0); }, seasonCtx],
            ['highest_ppg', 'Highest PPG', function (e) { return num(e.reg_ppg != null ? e.reg_ppg : e.avg_ppg); }, seasonCtx],
            ['best_reg_season_records', 'Best Record', function (e) { return rec(e.reg_record); }, seasonCtx],
            ['worst_reg_season_records', 'Worst Record', function (e) { return rec(e.reg_record); }, seasonCtx],
            // Per-game, not total: 2019/2020 ran a shorter schedule, so raw
            // season totals unfairly stack the bottom of this list.
            ['lowest_ppg', 'Lowest PPG', function (e) { return num(e.reg_ppg); }, seasonCtx],
            ['most_points_against', 'Most Points Against', function (e) { return num(e.reg_pa, 0); }, seasonCtx],
        ],
        career: [
            ['longest_win_streaks', 'Longest Win Streak', function (e) { return e.length + 'W'; }, streakCtx],
            ['longest_loss_streaks', 'Longest Skid', function (e) { return e.length + 'L'; }, streakCtx],
            ['most_championships', 'Most Championships', function (e) { return countOf(e, 'championships_won') + '×'; }, champCtx],
            ['most_top_3_finishes', 'Most Podiums', function (e) { return countOf(e, 'top_3_finishes') + '×'; }, careerCtx],
            ['no_podiums', 'No Podiums', null, null],
            ['most_playoff_appearances', 'Most Playoff Trips', function (e) { return countOf(e, 'playoff_appearances') + '×'; }, careerCtx],
            ['most_championship_appearances', 'Most Title Games', function (e) { return countOf(e, 'championship_appearances') + '×'; }, careerCtx],
            // Best avg finish is active-members-only (the builder filters
            // alumni out) so it reads as "where the current league stands".
            ['best_avg_finish', 'Best Avg Finish', function (e) { return num(e.avg_final_rank); }, careerCtx],
        ],
        feats: [
            // One-score games merged into a single W–L record per manager,
            // same as the desktop Clutch column.
            ['__clutch5', 'One-Score Record (<5 pts)', clutchVal, clutchCtx],
            ['__clutch1', 'Walk-Off Record (<1 pt)', clutchVal, clutchCtx],
            ['boom_150', '150-Point Games', countVal, featCtx, 'boom_bust'],
            ['boom_175', '175-Point Games', countVal, featCtx, 'boom_bust'],
            ['bust_80', 'Sub-80 Stinkers', countVal, featCtx, 'boom_bust'],
            ['bust_70', 'Sub-70 Disasters', countVal, featCtx, 'boom_bust'],
        ],
    };
    // Good/bad tone for the card title (Games + Seasons only). Drives the
    // gold/clay label color; everything unlisted stays neutral green.
    var TONE_GOOD = {
        highest_single_week_score: 1, biggest_blowouts: 1, luckiest_wins: 1, highest_combined_score: 1,
        highest_season_pf: 1, highest_total_season_pf: 1, highest_ppg: 1, best_reg_season_records: 1,
    };
    var TONE_BAD = {
        lowest_single_week_score: 1, unluckiest_losses: 1, lowest_combined_score: 1,
        most_points_against: 1, lowest_ppg: 1, worst_reg_season_records: 1,
    };
    function toneFor(key) {

    }
    function countVal(e) { return String(e.count != null ? e.count : (e.value != null ? e.value : '—')); }
    function countOf(e, key) { return String(e[key] != null ? e[key] : (e.count != null ? e.count : '—')); }
    // "59-42-0" → "59-42" when there are no ties to show.
    function rec(r) { return String(r == null ? '' : r).replace(/^(\d+-\d+)-0$/, '$1'); }
    function seasonCtx(e) { return e.season + ' · ' + (e.team_name || '') + (e.reg_record ? ' · ' + rec(e.reg_record) : ''); }
    // Secondary stat shown ON the value (right side), mirroring how each
    // name carries a small year/season tag beneath it. `below` stacks under
    // the number (PPG); `inline` sits next to it (games-played). Applies to
    // every ranked row, not just the leader.
    function valExtra(key, e) {
        if (section !== 'season') return {};
        if (key === 'highest_season_pf')   return { below: e.reg_ppg    != null ? num(e.reg_ppg)    + ' ppg' : '' };
        if (key === 'most_points_against') {
            // Prefer the precomputed PA-per-game; fall back to reg_pa over
            // games played so the rate always shows under the total.
            var paPpg = e.reg_pa_ppg;
            if (paPpg == null && e.reg_pa != null && e.reg_record) {
                var g = recGames(e.reg_record);
                if (g > 0) paPpg = e.reg_pa / g;
            }
            return { below: paPpg != null ? num(paPpg) + ' ppg' : '' };
        }
        if (key === 'highest_total_season_pf') {
            // Full-season PPG sits under the total like the other point titles.
            // Games-played moves up next to the name (see seasonNameExtra).
            var g = e.total_games != null
                ? e.total_games
                : (e.reg_record ? recGames(e.reg_record) : 0) + (e.playoff_games || 0);
            var tppg = e.avg_ppg != null ? e.avg_ppg : (g > 0 && e.total_pf != null ? e.total_pf / g : null);

    // Builds the inner HTML of a value cell: the main number, an optional
    // inline tag (games), and an optional stacked sub-line (ppg).
    function valHtml(cls, mainText, key, e) {

        return '<span class="' + cls + (ex.below ? ' has-sub' : '') + '">' +
            esc(mainText) +
            (ex.inline ? '<i class="rb-val-g">' + esc(ex.inline) + '</i>' : '') +
            (ex.below ? '<small>' + esc(ex.below) + '</small>' : '') +
            '</span>';
    }
    function recGames(r) {
        var p = String(r).split('-').map(Number);

    }
    function streakCtx(e) {
        var span = e.start_season === e.end_season
            ? e.start_season + ' · W' + e.start_week + '–W' + e.end_week
            : e.start_season + ' W' + e.start_week + ' – ' + e.end_season + ' W' + e.end_week;
        return span;

    function careerCtx(e) {
        if (e.seasons_played == null) return '';

    // Championship years won — the "when" behind the crown count.

            ? e.championship_years.join(' · ')
            : careerCtx(e);

    function featCtx(e) {
        return e.last_year ? 'Last: ' + e.last_year + ' · W' + e.last_week + (e.last_opp_name ? ' vs ' + e.last_opp_name : '') : '';
    }
    function clutchVal(e) { return e.wins + '–' + e.losses; }
    function clutchCtx(e) {

            ? 'Last ' + e.last.type + ': ' + e.last.year + ' · W' + e.last.week + (e.last.opp ? ' vs ' + e.last.opp : '')
            : '';
    }

    // Merge clutch wins + losses by manager into one W–L row — ported from
    // the desktop record book so both show the same combined record.
    function mergeClutch(wins, losses) {
        var map = {};
        function ensure(r) {
            if (!map[r.user_id]) map[r.user_id] = { user_id: r.user_id, name: r.name, wins: 0, losses: 0, last: null };
            return map[r.user_id];
        }
        function take(r, type) {
            var cur = ensure(r);
            if (type === 'W') cur.wins = r.count; else cur.losses = r.count;
            if (r.count > 0) {
                var stamp = (r.last_year || 0) * 100 + (r.last_week || 0);
                if (!cur.last || stamp > cur.last.stamp) {
                    cur.last = { stamp: stamp, type: type, week: r.last_week, year: r.last_year, opp: r.last_opp_name };
                }
            }
        }
        (wins || []).forEach(function (r) { take(r, 'W'); });
        (losses || []).forEach(function (r) { take(r, 'L'); });
        return Object.keys(map).map(function (k) { return map[k]; })
            .filter(function (r) { return r.wins + r.losses > 0; })
            .sort(function (a, b) {
                return (b.wins - a.wins) || (a.losses - b.losses) || a.name.localeCompare(b.name);
            });
    }

    function entriesFor(def) {
        var key = def[0];
        if (key === '__clutch5') return mergeClutch((book.clutch || {}).clutch_5pt, (book.clutch || {}).unclutch_5pt);
        if (key === '__clutch1') return mergeClutch((book.clutch || {}).clutch_1pt, (book.clutch || {}).unclutch_1pt);
        var src = book[def[4] || section] || {};
        return src[key];
    }

    function holderName(e) { return e.owner || e.name || e.holder || '—'; }
    // Returns escaped HTML, not plain text — combined-score games show both
    // managers, with the opponent demoted to a smaller, dimmer tail.
    function holderHtmlFor(key, e) {
        if (key.indexOf('combined_score') !== -1 && e.opp_owner) {
            // Winner (higher score) leads the "A vs B" pairing.
            var oppWon = (e.opp_score || 0) > (e.score || 0);
            var a = oppWon ? e.opp_owner : holderName(e);
            var b = oppWon ? holderName(e) : e.opp_owner;

    }
    // Short context shown on every ranked row (the big top entry keeps the

    function rowCtx(e) {
        if (section === 'weekly') return e.season != null ? e.season + (e.week != null ? ' · Wk ' + e.week : '') : '';
        if (section === 'season') return e.season != null ? String(e.season) : '';
        return '';
    }

    // Shared card wrapper + expand hint used by every section variant.
    // `idx` is the record's position in the tab — drives the ledger number
    // and promotes the first record to the chapter headline.
    function cardShell(label, hasMore, total, inner, idx, tone) {
        // idx == null → rail card (no ledger number / headline tag; the group
        // header carries the structure instead).
        var hasIdx = idx != null;
        var lead = hasIdx && idx === 0;
        var n = hasIdx ? (idx + 1 < 10 ? '0' : '') + (idx + 1) : '';
        return '<div class="m-card rb-card' + (lead ? ' rb-lead' : '') + (hasMore ? ' rb-can-expand' : '') + '">' +
            '<div class="rb-card-head">' +
                (hasIdx ? '<span class="rb-idx">' + n + '</span>' : '') +
                '<div class="rb-card-label' + (tone ? ' ' + tone : '') + '">' + esc(label) + '</div>' +
                (lead ? '<span class="rb-lead-tag">Headline</span>' : '') +
            '</div>' +
            inner +
            (hasMore
                ? '<div class="rb-expand-hint">' +
                    '<span class="rb-hint-more">Show top ' + total + ' ▾</span>' +
                    '<span class="rb-hint-less">Show less ▴</span>' +
                  '</div>'
                : '') +
        '</div>';
    }

    // ── Standard card — Careers + Feats keep the original look ────
    function renderStandard(key, label, val, ctx, entries, idx) {
        var top = entries[0];
        var others = entries.slice(1);
        var inner =
            '<div class="rb-top">' +
                valHtml('rb-top-value', val(top), key, top) +
                '<span class="rb-top-holder"><b>' + holderHtmlFor(key, top) + '</b>' +
                    '<small>' + esc(ctx(top) || '') + '</small></span>' +
            '</div>' +
            (others.length
                ? '<div class="rb-others">' + others.map(function (e, i) {
                    var sub = rowCtx(e);

                        '<span class="rb-other-rank">' + (i + 2) + '</span>' +
                        '<span class="rb-other-name">' + holderHtmlFor(key, e) +
                            (sub ? '<small>' + esc(sub) + '</small>' : '') + '</span>' +
                        valHtml('rb-other-val', val(e), key, e) +
                    '</div>';
                }).join('') + '</div>'
                : '');

    }

    // ── Seasons → leaderboard bars ───────────────────────────────
    // Bar width is proportional to a numeric basis per record (PF, PPG,
    // PA, or win% for the record-title lists), anchored to the list max.
    // Games-played tag that rides next to the holder name on the full-season
    // points title (same size/color as the old inline tag, just relocated).
    function seasonNameExtra(key, e) {
        if (key !== 'highest_total_season_pf' || e.total_games == null) return '';
        return ' <i class="rb-name-g">' + e.total_games + 'g</i>';
    }
    function seasonBasis(key, e) {

        if (key === 'most_points_against') return e.reg_pa || 0;
        if (key === 'best_reg_season_records' || key === 'worst_reg_season_records') return e.reg_win_pct || 0;
        return e.reg_pf || 0;

    function renderSeasonBars(key, label, val, ctx, entries, idx, opts) {

        // larger names + extra line spacing (.rb-bars-bare) so the collapsed
        // card stays level with Highest PPG, which gets its height from bars.

        function barTrack(e) {

            return '<span class="rb-bar-track"><span class="rb-bar-fill" style="width:' + w.toFixed(1) + '%"></span></span>';
        }

        // context. No bar (against the list max it would always be full).

            '<div class="rb-hero">' +
                '<div class="rb-hero-top">' +

                '<span class="rb-bar-val' + (ex.below ? ' has-sub' : '') + '">' + esc(val(e)) +
                    (ex.inline ? '<i class="rb-val-g">' + esc(ex.inline) + '</i>' : '') +
                    (ex.below ? '<small>' + esc(ex.below) + '</small>' : '') +

    // ── Games → marquee scorecard ────────────────────────────────
    // The leader is a compact stub: headline stat on the left, mini
    // boxscore on the right. Margin records get a "Margin" tag under the
    // stat so the +number reads as the gap, not a score.
    function gameHero(key, e, val) {
        var isCombined = key.indexOf('combined') !== -1;
        var isLowest = key === 'lowest_single_week_score';
        var statTag = (key.indexOf('blowout') !== -1 || key.indexOf('closest') !== -1) ? 'Margin'
            : (isCombined ? 'Combined' : '');

        // Line order: combined games have no single protagonist, so the higher
        // score sits on top. Every other record keeps its holder (e.owner)
        // first — including Lowest Score, where the holder is the low scorer.
        var swap = isCombined && (e.opp_score || 0) > (e.score || 0);
        var n1 = swap ? e.opp_owner : e.owner;
        var s1 = swap ? e.opp_score : e.score;
        var n2 = swap ? e.owner : e.opp_owner;
        var s2 = swap ? e.score : e.opp_score;

        // Emphasis: normally the winner, but a Lowest Score record celebrates
        // its holder (the low scorer on line 1) even though they lost.

            '<span class="rb-gstat">' + esc(val(e)) +
                (statTag ? '<small>' + statTag + '</small>' : '') + '</span>' +
            '<div class="rb-gcard">' +
                '<div class="rb-gline' + (hi1 ? ' is-win' : '') + '">' +
                    '<span class="rb-gline-name">' + esc(n1 || '—') + '</span>' +
                    '<span class="rb-gline-score">' + num(s1) + '</span>' +
                '</div>' +
                '<div class="rb-gline' + (!hi1 ? ' is-win' : '') + '">' +

            ? '<div class="rb-others">' + others.map(function (e, i) {
                return '<div class="rb-other' + (i >= 2 ? ' rb-extra' : '') + '">' +
                    '<span class="rb-other-rank">' + (i + 2) + '</span>' +
                    '<span class="rb-other-name">' + holderHtmlFor(key, e) +
                        '<small>' + esc(e.season + ' · Wk ' + e.week) + '</small></span>' +
                    '<span class="rb-other-val">' + esc(val(e)) + '</span>' +
                '</div>';
            }).join('') + '</div>'
            : '';
        return cardShell(label, others.length > 2, entries.length, gameHero(key, top, val) + rest, idx, toneFor(key));
    }

    // ── Careers → podium ─────────────────────────────────────────
    // Top 3 on a gold/silver/bronze podium; ranks 4-10 unfold beneath.
    function renderPodium(key, label, val, ctx, entries) {
        function stepSub(e) {
            return (key === 'most_championships' && e.championship_years && e.championship_years.length)
                ? e.championship_years.join(' · ') : '';
        }
        function step(e, cls, medal) {
            if (!e) return '<div class="rb-step ' + cls + '"><div class="rb-step-medal">' + medal + '</div><div class="rb-step-name">—</div></div>';
            var sub = stepSub(e);
            return '<div class="rb-step ' + cls + '">' +
                '<div class="rb-step-medal">' + medal + '</div>' +
                '<div class="rb-step-name">' + holderHtmlFor(key, e) + '</div>' +
                '<div class="rb-step-val">' + esc(val(e)) + '</div>' +
                // Always render the sub line (placeholder when a podium has no
                // years) so podiums with and without years share one height and
                // every podium card in the rail lines up.
                '<div class="rb-step-sub">' + (sub ? esc(sub) : '&nbsp;') + '</div>' +
            '</div>';
        }

            step(entries[1], 'rb-s2', '2ND') +

            step(entries[2], 'rb-s3', '3RD') +
        '</div>';
        var rest = entries.slice(3);
        var more = rest.length
            ? '<div class="rb-others rb-pod-more">' + rest.map(function (e, i) {
                var sub = ctx ? ctx(e) : '';
                return '<div class="rb-other">' +
                    '<span class="rb-other-rank">' + (i + 4) + '</span>' +
                    '<span class="rb-other-name">' + holderHtmlFor(key, e) +
                        (sub ? '<small>' + esc(sub) + '</small>' : '') + '</span>' +
                    '<span class="rb-other-val">' + esc(val(e)) + '</span>' +
                '</div>';
            }).join('') + '</div>'
            : '';
        var hasMore = rest.length > 0;
        return '<div class="m-card rb-card' + (hasMore ? ' rb-can-expand' : '') + '">' +
            '<div class="rb-card-head"><div class="rb-card-label">' + esc(label) + '</div></div>' +
            podium + more +
            (hasMore
                ? '<div class="rb-expand-hint">' +
                    '<span class="rb-hint-more">Show top ' + Math.min(entries.length, 10) + ' ▾</span>' +
                    '<span class="rb-hint-less">Show less ▴</span>' +
                  '</div>'
                : '') +
        '</div>';
    }

    // ── Careers → the podium-less roll (managers with zero top-3s) ─
    function renderNoPodium(label, entries) {
        // Worst "best finish" on top — someone whose peak is 10th sits above
        // someone who's reached 6th, so the list reads furthest-from-a-podium
        // down to knocking-on-the-door.
        var rows = entries.slice().sort(function (a, b) {
            return (b.best_finish || 0) - (a.best_finish || 0)
                || (b.seasons_played || 0) - (a.seasons_played || 0)
                || holderName(a).localeCompare(holderName(b));
        }).map(function (e) {
            var sp = e.seasons_played != null
                ? '<small>' + e.seasons_played + (e.seasons_played === 1 ? ' szn' : ' szns') + '</small>' : '';
            return '<div class="rb-nopod-row">' +
                '<span class="rb-nopod-name">' + esc(holderName(e)) + sp + '</span>' +
                '<span class="rb-nopod-best">Best <b>' + (e.best_finish ? ord(e.best_finish) : '—') + '</b></span>' +
            '</div>';
        }).join('');
        return '<div class="m-card rb-card">' +
            '<div class="rb-card-head"><div class="rb-card-label">' + esc(label) + '</div></div>' +
            '<div class="rb-nopod-note">Still chasing a top-3 finish.</div>' +
            '<div class="rb-nopod-rows">' + rows + '</div>' +
        '</div>';
    }

    // Render one record into a (rail) card, picking the right card style.
    function renderCard(sec, def, entries) {
        var key = def[0], label = def[1], val = def[2], ctx = def[3];
        if (sec === 'weekly') return renderGameTickets(key, label, val, ctx, entries, null);
        if (sec === 'season') {
            // Win/Loss records use the plain card.
            if (key === 'best_reg_season_records' || key === 'worst_reg_season_records')
                return renderStandard(key, label, val, ctx, entries, null);
            // Lowest PPG drops the bar (it read backwards — worst season =
            // shortest bar). Bigger names + line spacing keep it level with
            // Highest PPG when collapsed. See .rb-bars-bare.
            if (key === 'lowest_ppg')
                return renderSeasonBars(key, label, val, ctx, entries, null, { bare: true });
            return renderSeasonBars(key, label, val, ctx, entries, null);
        }
        if (sec === 'career') {
            if (key === 'no_podiums') return renderNoPodium(label, entries);
            // Streaks read fine as a plain card — no podium needed.
            if (key === 'longest_win_streaks' || key === 'longest_loss_streaks')
                return renderStandard(key, label, val, ctx, entries, null);
            return renderPodium(key, label, val, ctx, entries);
        }
        return renderStandard(key, label, val, ctx, entries, null);
    }

    // Related records bundled into swipe groups (Feats stays a plain list).
    var GROUPS = {
        weekly: [
            { title: 'Scores',   keys: ['highest_single_week_score', 'lowest_single_week_score'] },
            { title: 'Margins',  keys: ['biggest_blowouts', 'closest_games'] },
            { title: 'Luck',     keys: ['luckiest_wins', 'unluckiest_losses'] },
            { title: 'Combined', keys: ['highest_combined_score', 'lowest_combined_score'] },
        ],
        season: [
            { title: 'Points',       keys: ['highest_season_pf', 'highest_total_season_pf', 'most_points_against'] },
            { title: 'PPG Leaders', keys: ['highest_ppg', 'lowest_ppg'] },
            { title: 'Records',      keys: ['best_reg_season_records', 'worst_reg_season_records'] },
        ],
        career: [
            { title: 'Hardware', keys: ['most_championships', 'most_top_3_finishes', 'no_podiums'] },
            { title: 'Appearances',      keys: ['most_playoff_appearances', 'most_championship_appearances', 'best_avg_finish'] },
            { title: 'Streaks',          keys: ['longest_win_streaks', 'longest_loss_streaks'] },
        ],
    };
    var DEF_BY_KEY = {};
    Object.keys(DEFS).forEach(function (sec) {
        DEF_BY_KEY[sec] = {};
        DEFS[sec].forEach(function (d) { DEF_BY_KEY[sec][d[0]] = d; });
    });

    function render() {
        var box = document.getElementById('cards');
        if (!book) {
            box.innerHTML = '<div class="m-empty">The record book is sealed for this league.</div>';
            return;
        }
        // Feats stays a plain vertical list (the only un-grouped chapter).
        if (section === 'feats') { renderFeats(box); return; }

        var groups = GROUPS[section] || [];
        var html = groups.map(function (g, gi) {
            var slides = g.keys.map(function (key) {
                var def = DEF_BY_KEY[section][key];
                if (!def) return '';
                var entries = entriesFor(def);
                if (!entries || !entries.length) return '';
                return '<div class="rb-slide">' + renderCard(section, def, entries) + '</div>';
            }).filter(Boolean);
            if (!slides.length) return '';
            var solo = slides.length === 1;
            var dots = solo ? '' : '<div class="rb-dots">' + slides.map(function (_, i) {
                return '<span class="rb-dot' + (i === 0 ? ' on' : '') + '"></span>';
            }).join('') + '</div>';
            return '<section class="rb-group">' +
                '<div class="rb-group-head"><span class="rb-group-title">' + esc(g.title) + '</span>' +
                    (solo ? '' : '<span class="rb-group-hint">Swipe ›</span>') + '</div>' +
                '<div class="rb-rail' + (solo ? ' is-solo' : '') + '">' + slides.join('') + '</div>' +
                dots +
            '</section>';
        }).join('');
        box.innerHTML = html || '<div class="m-empty">Nothing in this chapter yet.</div>';
        wireRails();
    }

    // Feats — unchanged plain card list with the ledger numbering.
    function renderFeats(box) {
        var cards = DEFS.feats.map(function (def) {
            var entries = entriesFor(def);
            return (entries && entries.length) ? { def: def, entries: entries } : null;
        }).filter(Boolean);
        var html = cards.map(function (item, idx) {
            var def = item.def;
            return renderStandard(def[0], def[1], def[2], def[3], item.entries, idx);
        }).join('');
        box.innerHTML = html || '<div class="m-empty">Nothing in this chapter yet.</div>';
    }

    // Keep the position dots in sync as each rail is swiped.
    function wireRails() {
        document.querySelectorAll('.rb-rail').forEach(function (rail) {
            var dots = rail.parentNode.querySelector('.rb-dots');
            if (!dots) return;
            rail.addEventListener('scroll', function () {
                var slide = rail.querySelector('.rb-slide');
                if (!slide) return;
                var step = slide.offsetWidth + 11; // slide width + ~.7rem gap
                var idx = Math.round(rail.scrollLeft / step);
                dots.querySelectorAll('.rb-dot').forEach(function (d, i) { d.classList.toggle('on', i === idx); });
            }, { passive: true });
        });
    }

    // Tap a record card to unfold the full top list; tap again to fold it.
    document.getElementById('cards').addEventListener('click', function (e) {
        var card = e.target.closest('.rb-can-expand');
        if (card) card.classList.toggle('is-open');
    });

    document.getElementById('seg').addEventListener('click', function (e) {
        var btn = e.target.closest('button[data-sec]');
        if (!btn) return;
        section = btn.dataset.sec;
        this.querySelectorAll('button').forEach(function (b) { b.classList.toggle('is-active', b === btn); });
        render();
    });
})();
</script>
</body>
</html>
