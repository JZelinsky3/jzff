<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Record Book · The Lakeside League</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">
<link rel="stylesheet" href="/pams-template/assets/css/mobile-app.css">
<style>
/* Trophy-room green — full chapter theme. Re-pointing the shared tokens
   recolors the m-* primitives, the bottom sheets, AND (via the chrome vars)
   the fixed app bar + tab bar so the whole shell sits in the green room. */
:root {
    --rec: #8fb89a; --rec-deep: #5f8a6c;
    --ink:           #0d1512;
    --ink-soft:      #101a15;
    --ink-card:      #131e18;
    --ink-line:      #24352b;
    --ink-line-soft: #1c2a22;
    --m-chrome-bg:   #0e1713;
    --m-chrome-bg2:  #101a15;
}
.m-tab.is-active { color: var(--rec); }
.m-tab.is-active::before { background: var(--rec); }

.rb-head { text-align: center; padding: 1.1rem 0 .9rem; }
.rb-title {
    font-family: var(--serif);
    font-size: 1.7rem; line-height: 1.05;
    color: var(--cream);
}
.rb-title em { font-style: italic; color: var(--rec); }

.rb-seg button.is-active { background: var(--rec); color: #0d1512; }

.rb-card + .rb-card { margin-top: .55rem; }
.rb-card-label {
    font-family: var(--mono); font-weight: 700;
    font-size: .54rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--rec-deep);
}
.rb-top {
    display: flex; align-items: baseline; gap: .65rem;
    margin-top: .35rem;
}
.rb-top-value {
    font-family: var(--serif);
    font-size: 1.7rem; line-height: 1;
    color: var(--rec);
    white-space: nowrap;
}
/* When a value carries a stacked rate (PPG), let it become a little column
   so the small line sits directly under the number. */
.rb-top-value.has-sub { display: inline-flex; flex-direction: column; align-items: flex-start; }
.rb-top-value small {
    font-family: var(--mono); font-weight: 600;
    font-size: .5rem; letter-spacing: .08em; text-transform: uppercase;
    color: var(--cream-mute);
    margin-top: 3px;
}
/* Inline tag riding next to a number (games-played on the full-season
   total). Raised to sit against the big serif figure's baseline. */
.rb-val-g {
    font-style: normal;
    font-family: var(--mono); font-weight: 700;
    font-size: .46rem; letter-spacing: .06em; text-transform: uppercase;
    color: var(--cream-mute);
    margin-left: 5px; vertical-align: .34em;
}
.rb-top-holder { min-width: 0; }
.rb-top-holder b {
    display: block;
    font-family: var(--serif); font-weight: 400;
    font-size: 1rem; color: var(--cream);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rb-top-holder small {
    font-family: var(--mono); font-size: .56rem;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--cream-mute);
}
.rb-others {
    margin-top: .6rem;
    padding-top: .5rem;
    border-top: 1px solid #1c2a22;
}
.rb-other {
    display: flex; align-items: center; gap: .6rem;
    padding: .22rem 0;
}
.rb-other-rank { flex: none; font-family: var(--mono); font-size: .58rem; color: var(--cream-mute); width: 1.2rem; }
/* Collapsed: top 3 visible; tap unfolds the rest. */
.rb-extra { display: none; }
.rb-card.is-open .rb-extra { display: flex; }
.rb-expand-hint {
    margin-top: .5rem;
    font-family: var(--mono); font-weight: 700;
    font-size: .54rem; letter-spacing: .18em; text-transform: uppercase;
    color: var(--rec-deep);
    text-align: center;
}
.rb-card.is-open .rb-hint-more { display: none; }
.rb-card:not(.is-open) .rb-hint-less { display: none; }
.rb-other-name { min-width: 0; flex: 1; font-size: .8rem; font-weight: 500; color: var(--cream-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rb-other-name small {
    display: block;
    font-family: var(--mono); font-size: .52rem;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--cream-mute);
}
.rb-other-val { flex: none; font-family: var(--mono); font-weight: 700; font-size: .68rem; color: var(--rec); }
.rb-other-val.has-sub { display: inline-flex; flex-direction: column; align-items: flex-end; line-height: 1.05; }
.rb-other-val small {
    font-family: var(--mono); font-weight: 600;
    font-size: .46rem; letter-spacing: .05em; text-transform: uppercase;
    color: var(--cream-mute);
    margin-top: 2px;
}
.rb-other-val .rb-val-g { font-size: .44rem; vertical-align: .1em; margin-left: 4px; }

/* ── Seasons: marquee leader ───────────────────────────────────── */
/* The #1 season is pulled out as an oversized editorial block so it
   reads as the headline, not just the top row of a list. */
.rb-hero { margin-top: .5rem; }
.rb-hero-top { display: flex; align-items: flex-end; justify-content: space-between; gap: .8rem; }
.rb-hero-who { min-width: 0; }
.rb-hero-who b {
    display: block;
    font-family: var(--serif); font-weight: 400;
    font-size: 1.4rem; line-height: 1.04; color: var(--cream);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rb-hero-who small {
    font-family: var(--mono); font-size: .56rem;
    letter-spacing: .1em; text-transform: uppercase; color: var(--cream-mute);
}
.rb-hero-val { flex: none; font-family: var(--serif); font-size: 2.6rem; line-height: .85; color: var(--rec); text-align: right; }
.rb-hero-val.has-sub { display: inline-flex; flex-direction: column; align-items: flex-end; }
.rb-hero-val small {
    font-family: var(--mono); font-weight: 600;
    font-size: .52rem; letter-spacing: .06em; text-transform: uppercase;
    color: var(--cream-mute); margin-top: 4px;
}
.rb-hero-val .rb-val-g { font-size: .4rem; vertical-align: .42em; margin-left: 5px; }
.rb-hero-bar { display: block; height: 7px; margin-top: .55rem; border-radius: 4px; background: var(--ink-line-soft); overflow: hidden; }
.rb-hero-bar span { display: block; height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--rec), #d2ead8); }
.rb-hero + .rb-bars { margin-top: .65rem; padding-top: .6rem; border-top: 1px solid var(--ink-line-soft); }

/* ── Seasons: leaderboard bars ─────────────────────────────────── */
.rb-bars { margin-top: .5rem; display: flex; flex-direction: column; gap: .55rem; }
.rb-bar-row { display: grid; grid-template-columns: 1.1rem 1fr auto; align-items: center; column-gap: .55rem; }
/* `.rb-bar-row` is defined after `.rb-extra`, so it would otherwise win the
   cascade and leave the extras visible — re-hide them at matching specificity. */
.rb-bar-row.rb-extra { display: none; }
.rb-card.is-open .rb-bar-row.rb-extra { display: grid; }
.rb-bar-rank { align-self: start; padding-top: .12rem; font-family: var(--mono); font-size: .56rem; color: var(--cream-mute); }
.rb-bar-main { min-width: 0; }
.rb-bar-name { display: block; font-size: .82rem; font-weight: 500; color: var(--cream-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rb-bar-row.is-lead .rb-bar-name { color: var(--cream); font-weight: 600; }
.rb-bar-track { display: block; height: 5px; margin: 4px 0 3px; border-radius: 3px; background: var(--ink-line-soft); overflow: hidden; }
.rb-bar-fill { display: block; height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--rec-deep), var(--rec)); }
.rb-bar-row.is-lead .rb-bar-fill { background: linear-gradient(90deg, var(--rec), #d2ead8); }
.rb-bar-sub { display: block; font-family: var(--mono); font-size: .5rem; letter-spacing: .08em; text-transform: uppercase; color: var(--cream-mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rb-bar-val { flex: none; font-family: var(--serif); font-size: 1.05rem; line-height: 1; color: var(--rec); text-align: right; }
.rb-bar-val.has-sub { display: inline-flex; flex-direction: column; align-items: flex-end; }
.rb-bar-row.is-lead .rb-bar-val { font-size: 1.3rem; }
.rb-bar-val small { font-family: var(--mono); font-weight: 600; font-size: .46rem; letter-spacing: .05em; text-transform: uppercase; color: var(--cream-mute); margin-top: 2px; }
.rb-bar-val .rb-val-g { font-size: .44rem; vertical-align: .12em; margin-left: 4px; }

/* ── Games: marquee scorecard ──────────────────────────────────── */
/* The leader is a compact stub: the headline stat sits big on the left
   (score, or +margin for blowout/closest), the mini boxscore rides to
   its right — far less vertical room than the old stacked ticket. */
.rb-ghero { margin-top: .5rem; display: flex; align-items: center; gap: .85rem; }
.rb-gstat { flex: none; min-width: 3.4rem; font-family: var(--serif); font-size: 2.4rem; line-height: .85; color: var(--rec); }
.rb-gstat small { display: block; font-family: var(--mono); font-weight: 600; font-size: .48rem; letter-spacing: .14em; text-transform: uppercase; color: var(--rec-deep); margin-top: 5px; }
.rb-gcard { flex: 1; min-width: 0; border-left: 1px solid var(--ink-line); padding-left: .85rem; }
.rb-gline { display: flex; align-items: baseline; justify-content: space-between; gap: .5rem; padding: .1rem 0; }
.rb-gline-name { font-family: var(--serif); font-size: .98rem; color: var(--cream-mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rb-gline-score { flex: none; font-family: var(--mono); font-weight: 700; font-size: .84rem; color: var(--cream-mute); }
.rb-gline.is-win .rb-gline-name { color: var(--cream); }
.rb-gline.is-win .rb-gline-score { color: var(--rec); }
.rb-gstamp { margin-top: .32rem; font-family: var(--mono); font-size: .5rem; letter-spacing: .16em; text-transform: uppercase; color: var(--rec-deep); }
/* Combined-score records list both managers; the "vs Opponent" tail reads
   as context, not a co-holder — smaller and dimmer than the lead name. */
.rb-vs { font-size: .72em; color: var(--cream-mute); }
</style>
</head>
<body>
<div class="site-glow"></div>

<nav id="site-nav" data-page="records" data-chapter="Ch. V · Record Book" data-back-href="./"></nav>
<script src="/pams-template/assets/js/mobile-app.js"></script>

<main class="m-main">
    <header class="rb-head">
        <div class="m-kicker" style="color:var(--rec-deep)">The Trophy Room</div>
        <h1 class="rb-title">The Record <em>Book.</em></h1>
    </header>

    <div class="m-seg rb-seg" id="seg" style="margin-bottom:.7rem">
        <button data-sec="weekly" class="is-active">Games</button>
        <button data-sec="season">Seasons</button>
        <button data-sec="career">Careers</button>
        <button data-sec="feats">Feats</button>
    </div>

    <div id="cards"><div class="m-empty">Dusting off the ledgers…</div></div>
</main>

<script>
(function () {
    'use strict';

    function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
    }
    function num(n, d) {
        if (n == null || isNaN(n)) return '—';
        return Number(n).toLocaleString('en-US', { maximumFractionDigits: d == null ? 1 : d });
    }

    var book = null;
    var section = 'weekly';

    fetch('data/record_book.json')
        .then(function (r) { return r.ok ? r.json() : null; })
        .catch(function () { return null; })
        .then(function (data) {
            book = data && data.full_book;
            render();
        });

    // Per-record config: label + how to read value/context out of an entry.
    function gameCtx(e) {
        return e.season + ' · W' + e.week + ' · vs ' + (e.opp_owner || '—') + ' · ' + num(e.score) + '–' + num(e.opp_score);
    }
    var DEFS = {
        weekly: [
            ['highest_single_week_score', 'Highest Score', function (e) { return num(e.score); }, gameCtx],
            ['lowest_single_week_score', 'Lowest Score', function (e) { return num(e.score); }, gameCtx],
            ['biggest_blowouts', 'Biggest Blowout', function (e) { return '+' + num(e.margin); }, gameCtx],
            ['closest_games', 'Closest Game', function (e) { return '+' + num(e.margin, 2); }, gameCtx],
            ['luckiest_wins', 'Luckiest Win', function (e) { return num(e.score); }, gameCtx],
            ['unluckiest_losses', 'Unluckiest Loss', function (e) { return num(e.score); }, gameCtx],
            ['highest_combined_score', 'Highest Combined', function (e) { return num(e.score + e.opp_score); }, gameCtx],
            ['lowest_combined_score', 'Lowest Combined', function (e) { return num(e.score + e.opp_score); }, gameCtx],
        ],
        season: [
            // Headline number on the right carries its rate beneath it:
            // reg PPG for the season title, games-played for the full-season
            // title (see valExtra). Context line stays season + team + record.
            ['highest_season_pf', 'Most Points, Season', function (e) { return num(e.reg_pf, 0); }, seasonCtx],
            // Full-season variant folds in championship-bracket playoff
            // points so deep title runs sit alongside the regular-season
            // ledger; games-played rides next to the total.
            ['highest_total_season_pf', 'Most Points, Full Season', function (e) { return num(e.total_pf, 0); }, seasonCtx],
            ['highest_ppg', 'Best PPG, Season', function (e) { return num(e.reg_ppg != null ? e.reg_ppg : e.avg_ppg); }, seasonCtx],
            ['best_reg_season_records', 'Best Record', function (e) { return rec(e.reg_record); }, seasonCtx],
            ['worst_reg_season_records', 'Worst Record', function (e) { return rec(e.reg_record); }, seasonCtx],
            // Per-game, not total: 2019/2020 ran a shorter schedule, so raw
            // season totals unfairly stack the bottom of this list.
            ['lowest_ppg', 'Lowest PPG, Season', function (e) { return num(e.reg_ppg); }, seasonCtx],
            ['most_points_against', 'Most Points Against', function (e) { return num(e.reg_pa, 0); }, seasonCtx],
        ],
        career: [
            ['longest_win_streaks', 'Longest Win Streak', function (e) { return e.length + 'W'; }, streakCtx],
            ['longest_loss_streaks', 'Longest Skid', function (e) { return e.length + 'L'; }, streakCtx],
            ['most_top_3_finishes', 'Most Podiums', function (e) { return countOf(e, 'top_3_finishes') + '×'; }, careerCtx],
            ['most_playoff_appearances', 'Most Playoff Trips', function (e) { return countOf(e, 'playoff_appearances') + '×'; }, careerCtx],
            ['most_championship_appearances', 'Most Title Games', function (e) { return countOf(e, 'championship_appearances') + '×'; }, careerCtx],
            // Best avg finish is active-members-only (the builder filters
            // alumni out) so it reads as "where the current league stands".
            ['best_avg_finish', 'Best Avg Finish', function (e) { return num(e.avg_final_rank); }, careerCtx],
        ],
        feats: [
            // One-score games merged into a single W–L record per manager,
            // same as the desktop Clutch column.
            ['__clutch5', 'One-Score Record (<5 pts)', clutchVal, clutchCtx],
            ['__clutch1', 'Walk-Off Record (<1 pt)', clutchVal, clutchCtx],
            ['boom_150', '150-Point Games', countVal, featCtx, 'boom_bust'],
            ['boom_175', '175-Point Games', countVal, featCtx, 'boom_bust'],
            ['bust_80', 'Sub-80 Stinkers', countVal, featCtx, 'boom_bust'],
            ['bust_70', 'Sub-70 Disasters', countVal, featCtx, 'boom_bust'],
        ],
    };
    function countVal(e) { return String(e.count != null ? e.count : (e.value != null ? e.value : '—')); }
    function countOf(e, key) { return String(e[key] != null ? e[key] : (e.count != null ? e.count : '—')); }
    // "59-42-0" → "59-42" when there are no ties to show.
    function rec(r) { return String(r == null ? '' : r).replace(/^(\d+-\d+)-0$/, '$1'); }
    function seasonCtx(e) { return e.season + ' · ' + (e.team_name || '') + (e.reg_record ? ' · ' + rec(e.reg_record) : ''); }
    // Secondary stat shown ON the value (right side), mirroring how each
    // name carries a small year/season tag beneath it. `below` stacks under
    // the number (PPG); `inline` sits next to it (games-played). Applies to
    // every ranked row, not just the leader.
    function valExtra(key, e) {
        if (section !== 'season') return {};
        if (key === 'highest_season_pf')   return { below: e.reg_ppg    != null ? num(e.reg_ppg)    + ' ppg' : '' };
        if (key === 'most_points_against') {
            // Prefer the precomputed PA-per-game; fall back to reg_pa over
            // games played so the rate always shows under the total.
            var paPpg = e.reg_pa_ppg;
            if (paPpg == null && e.reg_pa != null && e.reg_record) {
                var g = recGames(e.reg_record);
                if (g > 0) paPpg = e.reg_pa / g;
            }
            return { below: paPpg != null ? num(paPpg) + ' ppg' : '' };
        }
        if (key === 'highest_total_season_pf') {
            var g = e.total_games != null
                ? e.total_games
                : (e.reg_record ? recGames(e.reg_record) : 0) + (e.playoff_games || 0);
            return { inline: g ? g + 'g' : '' };
        }
        return {};
    }
    // Builds the inner HTML of a value cell: the main number, an optional
    // inline tag (games), and an optional stacked sub-line (ppg).
    function valHtml(cls, mainText, key, e) {
        var ex = valExtra(key, e);
        return '<span class="' + cls + (ex.below ? ' has-sub' : '') + '">' +
            esc(mainText) +
            (ex.inline ? '<i class="rb-val-g">' + esc(ex.inline) + '</i>' : '') +
            (ex.below ? '<small>' + esc(ex.below) + '</small>' : '') +
            '</span>';
    }
    function recGames(r) {
        var p = String(r).split('-').map(Number);
        return (p[0] || 0) + (p[1] || 0) + (p[2] || 0);
    }
    function streakCtx(e) {
        var span = e.start_season === e.end_season
            ? e.start_season + ' · W' + e.start_week + '–W' + e.end_week
            : e.start_season + ' W' + e.start_week + ' – ' + e.end_season + ' W' + e.end_week;
        return span;
    }
    function careerCtx(e) {
        if (e.seasons_played == null) return '';
        return e.seasons_played + (e.seasons_played === 1 ? ' season' : ' seasons');
    }
    function featCtx(e) {
        return e.last_year ? 'Last: ' + e.last_year + ' · W' + e.last_week + (e.last_opp_name ? ' vs ' + e.last_opp_name : '') : '';
    }
    function clutchVal(e) { return e.wins + '–' + e.losses; }
    function clutchCtx(e) {
        return e.last
            ? 'Last ' + e.last.type + ': ' + e.last.year + ' · W' + e.last.week + (e.last.opp ? ' vs ' + e.last.opp : '')
            : '';
    }

    // Merge clutch wins + losses by manager into one W–L row — ported from
    // the desktop record book so both show the same combined record.
    function mergeClutch(wins, losses) {
        var map = {};
        function ensure(r) {
            if (!map[r.user_id]) map[r.user_id] = { user_id: r.user_id, name: r.name, wins: 0, losses: 0, last: null };
            return map[r.user_id];
        }
        function take(r, type) {
            var cur = ensure(r);
            if (type === 'W') cur.wins = r.count; else cur.losses = r.count;
            if (r.count > 0) {
                var stamp = (r.last_year || 0) * 100 + (r.last_week || 0);
                if (!cur.last || stamp > cur.last.stamp) {
                    cur.last = { stamp: stamp, type: type, week: r.last_week, year: r.last_year, opp: r.last_opp_name };
                }
            }
        }
        (wins || []).forEach(function (r) { take(r, 'W'); });
        (losses || []).forEach(function (r) { take(r, 'L'); });
        return Object.keys(map).map(function (k) { return map[k]; })
            .filter(function (r) { return r.wins + r.losses > 0; })
            .sort(function (a, b) {
                return (b.wins - a.wins) || (a.losses - b.losses) || a.name.localeCompare(b.name);
            });
    }

    function entriesFor(def) {
        var key = def[0];
        if (key === '__clutch5') return mergeClutch((book.clutch || {}).clutch_5pt, (book.clutch || {}).unclutch_5pt);
        if (key === '__clutch1') return mergeClutch((book.clutch || {}).clutch_1pt, (book.clutch || {}).unclutch_1pt);
        var src = book[def[4] || section] || {};
        return src[key];
    }

    function holderName(e) { return e.owner || e.name || e.holder || '—'; }
    // Returns escaped HTML, not plain text — combined-score games show both
    // managers, with the opponent demoted to a smaller, dimmer tail.
    function holderHtmlFor(key, e) {
        if (key.indexOf('combined_score') !== -1 && e.opp_owner) {
            return esc(holderName(e)) + ' <span class="rb-vs">vs ' + esc(e.opp_owner) + '</span>';
        }
        return esc(holderName(e));
    }
    // Short context shown on every ranked row (the big top entry keeps the
    // full ctx line): games get "year · Wk", seasons get the year.
    function rowCtx(e) {
        if (section === 'weekly') return e.season != null ? e.season + (e.week != null ? ' · Wk ' + e.week : '') : '';
        if (section === 'season') return e.season != null ? String(e.season) : '';
        return '';
    }

    // Shared card wrapper + expand hint used by every section variant.
    function cardShell(label, hasMore, total, inner) {
        return '<div class="m-card rb-card' + (hasMore ? ' rb-can-expand' : '') + '">' +
            '<div class="rb-card-label">' + esc(label) + '</div>' +
            inner +
            (hasMore
                ? '<div class="rb-expand-hint">' +
                    '<span class="rb-hint-more">Show top ' + total + ' ▾</span>' +
                    '<span class="rb-hint-less">Show less ▴</span>' +
                  '</div>'
                : '') +
        '</div>';
    }

    // ── Standard card — Careers + Feats keep the original look ────
    function renderStandard(key, label, val, ctx, entries) {
        var top = entries[0];
        var others = entries.slice(1);
        var inner =
            '<div class="rb-top">' +
                valHtml('rb-top-value', val(top), key, top) +
                '<span class="rb-top-holder"><b>' + holderHtmlFor(key, top) + '</b>' +
                    '<small>' + esc(ctx(top) || '') + '</small></span>' +
            '</div>' +
            (others.length
                ? '<div class="rb-others">' + others.map(function (e, i) {
                    var sub = rowCtx(e);
                    return '<div class="rb-other' + (i >= 2 ? ' rb-extra' : '') + '">' +
                        '<span class="rb-other-rank">' + (i + 2) + '</span>' +
                        '<span class="rb-other-name">' + holderHtmlFor(key, e) +
                            (sub ? '<small>' + esc(sub) + '</small>' : '') + '</span>' +
                        valHtml('rb-other-val', val(e), key, e) +
                    '</div>';
                }).join('') + '</div>'
                : '');
        return cardShell(label, others.length > 2, entries.length, inner);
    }

    // ── Seasons → leaderboard bars ───────────────────────────────
    // Bar width is proportional to a numeric basis per record (PF, PPG,
    // PA, or win% for the record-title lists), anchored to the list max.
    function seasonBasis(key, e) {
        if (key === 'highest_total_season_pf') return e.total_pf || 0;
        if (key === 'highest_ppg' || key === 'lowest_ppg') return e.reg_ppg || 0;
        if (key === 'most_points_against') return e.reg_pa || 0;
        if (key === 'best_reg_season_records' || key === 'worst_reg_season_records') return e.reg_win_pct || 0;
        return e.reg_pf || 0;
    }
    function renderSeasonBars(key, label, val, ctx, entries) {
        var max = 0;
        entries.forEach(function (e) { var b = seasonBasis(key, e); if (b > max) max = b; });

        // #1 becomes the marquee — big serif value, holder as headline,
        // full season context, and a maxed-out bar that anchors the list.
        var lead = entries[0];
        var hero =
            '<div class="rb-hero">' +
                '<div class="rb-hero-top">' +
                    '<span class="rb-hero-who"><b>' + holderHtmlFor(key, lead) + '</b>' +
                        '<small>' + esc(ctx(lead) || '') + '</small></span>' +
                    valHtml('rb-hero-val', val(lead), key, lead) +
                '</div>' +
                '<span class="rb-hero-bar"><span style="width:100%"></span></span>' +
            '</div>';

        // Ranks 2+ stay as proportional bars; 2–3 visible, rest fold away.
        var rows = entries.slice(1).map(function (e, i) {
            var rank = i + 2;
            var w = max > 0 ? Math.max(8, (seasonBasis(key, e) / max) * 100) : 0;
            var ex = valExtra(key, e);
            return '<div class="rb-bar-row' + (rank > 3 ? ' rb-extra' : '') + '">' +
                '<span class="rb-bar-rank">' + rank + '</span>' +
                '<span class="rb-bar-main">' +
                    '<span class="rb-bar-name">' + holderHtmlFor(key, e) + '</span>' +
                    '<span class="rb-bar-track"><span class="rb-bar-fill" style="width:' + w.toFixed(1) + '%"></span></span>' +
                    '<span class="rb-bar-sub">' + esc(ctx(e) || '') + '</span>' +
                '</span>' +
                '<span class="rb-bar-val' + (ex.below ? ' has-sub' : '') + '">' + esc(val(e)) +
                    (ex.inline ? '<i class="rb-val-g">' + esc(ex.inline) + '</i>' : '') +
                    (ex.below ? '<small>' + esc(ex.below) + '</small>' : '') +
                '</span>' +
            '</div>';
        }).join('');

        var inner = hero + (rows ? '<div class="rb-bars">' + rows + '</div>' : '');
        return cardShell(label, entries.length > 3, entries.length, inner);
    }

    // ── Games → marquee scorecard ────────────────────────────────
    // The leader is a compact stub: headline stat on the left, mini
    // boxscore on the right. Margin records get a "Margin" tag under the
    // stat so the +number reads as the gap, not a score.
    function gameHero(key, e, val) {
        var aWin = (e.score || 0) >= (e.opp_score || 0);
        var statTag = (key.indexOf('blowout') !== -1 || key.indexOf('closest') !== -1) ? 'Margin'
            : (key.indexOf('combined') !== -1 ? 'Combined' : '');
        return '<div class="rb-ghero">' +
            '<span class="rb-gstat">' + esc(val(e)) +
                (statTag ? '<small>' + statTag + '</small>' : '') + '</span>' +
            '<div class="rb-gcard">' +
                '<div class="rb-gline' + (aWin ? ' is-win' : '') + '">' +
                    '<span class="rb-gline-name">' + esc(e.owner || '—') + '</span>' +
                    '<span class="rb-gline-score">' + num(e.score) + '</span>' +
                '</div>' +
                '<div class="rb-gline' + (!aWin ? ' is-win' : '') + '">' +
                    '<span class="rb-gline-name">' + esc(e.opp_owner || '—') + '</span>' +
                    '<span class="rb-gline-score">' + num(e.opp_score) + '</span>' +
                '</div>' +
                '<div class="rb-gstamp">' + esc(e.season + ' · Week ' + e.week) + '</div>' +
            '</div>' +
        '</div>';
    }
    function renderGameTickets(key, label, val, ctx, entries) {
        var top = entries[0];
        var others = entries.slice(1);
        var rest = others.length
            ? '<div class="rb-others">' + others.map(function (e, i) {
                return '<div class="rb-other' + (i >= 2 ? ' rb-extra' : '') + '">' +
                    '<span class="rb-other-rank">' + (i + 2) + '</span>' +
                    '<span class="rb-other-name">' + holderHtmlFor(key, e) +
                        '<small>' + esc(e.season + ' · Wk ' + e.week) + '</small></span>' +
                    '<span class="rb-other-val">' + esc(val(e)) + '</span>' +
                '</div>';
            }).join('') + '</div>'
            : '';
        return cardShell(label, others.length > 2, entries.length, gameHero(key, top, val) + rest);
    }

    function render() {
        var box = document.getElementById('cards');
        if (!book) {
            box.innerHTML = '<div class="m-empty">The record book is sealed for this league.</div>';
            return;
        }
        var defs = DEFS[section] || [];
        var html = defs.map(function (def) {
            var key = def[0], label = def[1], val = def[2], ctx = def[3], currentOnly = def[5];
            var entries = entriesFor(def);
            if (!entries || !entries.length) return '';
            if (currentOnly) {
                entries = entries.filter(function (e) { return e.is_current_member !== false; });
                if (!entries.length) return '';
            }
            // Bars suit the points races; W–L records read better as the
            // plain card, so they keep the original look.
            if (section === 'season') {
                if (key === 'best_reg_season_records' || key === 'worst_reg_season_records')
                    return renderStandard(key, label, val, ctx, entries);
                return renderSeasonBars(key, label, val, ctx, entries);
            }
            if (section === 'weekly') return renderGameTickets(key, label, val, ctx, entries);
            return renderStandard(key, label, val, ctx, entries);
        }).filter(Boolean).join('');
        box.innerHTML = html || '<div class="m-empty">Nothing in this chapter yet.</div>';
    }

    // Tap a record card to unfold the full top list; tap again to fold it.
    document.getElementById('cards').addEventListener('click', function (e) {
        var card = e.target.closest('.rb-can-expand');
        if (card) card.classList.toggle('is-open');
    });

    document.getElementById('seg').addEventListener('click', function (e) {
        var btn = e.target.closest('button[data-sec]');
        if (!btn) return;
        section = btn.dataset.sec;
        this.querySelectorAll('button').forEach(function (b) { b.classList.toggle('is-active', b === btn); });
        render();
    });
})();
</script>
</body>
</html>
