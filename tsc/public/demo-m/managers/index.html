<!DOCTYPE html>
<html lang="en">
<head>
<base href="/demo-m/">
<script>(function(){var u=navigator.userAgent;var m=/\b(iPhone|iPod)\b/.test(u)||(/\bAndroid\b/.test(u)&&/\bMobile\b/.test(u))||/\bWindows Phone\b/.test(u);if(m)return;if(/(?:^|;\s*)dc_view=mobile/.test(document.cookie))return;var p=location.pathname.replace(/^\/demo-m\//,"/demo/");if(p!==location.pathname)location.replace(p+location.search+location.hash)})()</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Managers · The Lakeside League</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">
<link rel="stylesheet" href="/pams-template/assets/css/mobile-app.css">
<style>
.mg-head { text-align: center; padding: 1.1rem 0 1rem; }
.mg-title {
    font-family: var(--serif);
    font-size: 1.7rem; line-height: 1.05;
    color: var(--cream);
}
.mg-title em { font-style: italic; color: var(--gold); }

/* ── Ticket stubs — one admission ticket per member. The stub (avatar side)
      is split off by a dashed perforation with punched semicircle notches. ── */
.mg-tickets { display: flex; flex-direction: column; gap: .55rem; margin-top: .35rem; }
.mg-ticket {
    position: relative;
    display: flex; align-items: stretch;
    background: linear-gradient(135deg, var(--ink-card), var(--ink-soft));
    border: 1px solid var(--ink-line);
    border-radius: 10px;
    overflow: hidden; /* clips the notch circles into semicircle bites */
    text-decoration: none; color: inherit;
}
.mg-stub {
    flex: none; width: 62px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    border-right: 1px dashed var(--ink-line);
}
/* Punched holes riding the perforation line, filled with the page bg. */
.mg-ticket::before, .mg-ticket::after {
    content: '';
    position: absolute; left: 56px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--ink);
    border: 1px solid var(--ink-line);
}
.mg-ticket::before { top: -7px; }
.mg-ticket::after  { bottom: -7px; }
.mg-body {
    flex: 1; min-width: 0; min-height: 58px;
    display: flex; align-items: center; gap: .6rem;
    padding: .55rem .8rem .55rem .7rem;
}
.mg-ava {
    flex: none;
    position: relative; overflow: hidden;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--ink-line);
    background: var(--ink-soft);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif);
    font-size: 1rem; color: var(--gold);
}
.mg-ava img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
}
.mg-ticket.is-champ { border-color: var(--gold-deep); }
.mg-ticket.is-champ .mg-stub { border-right-color: rgba(232,200,137,.45); }
.mg-ticket.is-champ::before, .mg-ticket.is-champ::after { border-color: var(--gold-deep); }
.mg-ticket.is-champ .mg-ava { border-color: var(--gold-deep); background: rgba(232,200,137,.07); }
.mg-name { min-width: 0; flex: 1; font-weight: 600; font-size: .95rem; }
.mg-name small {
    display: block; font-weight: 400; font-size: .7rem; color: var(--cream-mute);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.mg-rings { flex: none; color: var(--gold); font-size: .7rem; letter-spacing: .08em; }
.mg-rec { flex: none; font-family: var(--mono); font-weight: 700; font-size: .72rem; color: var(--cream-soft); text-align: right; }
.mg-rec small { display: block; font-weight: 400; font-size: .56rem; color: var(--cream-mute); }
.mg-alumni { opacity: .82; }
.mg-alumni .mg-name, .mg-alumni .mg-ava { color: var(--cream-mute); }
</style>
</head>
<body>
<div class="site-glow"></div>

<nav id="site-nav" data-page="managers" data-chapter="Ch. II · The Society" data-back-href="./"></nav>
<script>window.__DC={slug:"demo",name:"The Lakeside League",isCommish:false,isSignedIn:false,isBookmarked:false,leagueTier:"demo",pageLocked:false}</script>
<script src="/pams-template/assets/js/mobile-app.js"></script>

<main class="m-main">
    <header class="mg-head">
        <div class="m-kicker">The Society</div>
        <h1 class="mg-title">The <em>Managers.</em></h1>
        <div class="m-mono" id="mgCount" style="margin-top:.35rem"></div>
    </header>

    <section id="currentSection" hidden class="m-section" style="margin-top:0">
        <div class="m-kicker">Current Members</div>
        <div class="mg-tickets" id="currentList"></div>
    </section>

    <section id="alumniSection" hidden class="m-section" style="margin-bottom:1rem">
        <div class="m-kicker">Alumni</div>
        <div class="mg-tickets" id="alumniList"></div>
    </section>

    <div class="m-empty" id="emptyMsg" hidden>No managers on file yet.</div>
</main>

<script>
(function () {
    'use strict';

    function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
    }

    fetch('data/managers_directory.json')
        .then(function (r) { return r.ok ? r.json() : null; })
        .catch(function () { return null; })
        .then(function (dir) {
            var managers = (dir && dir.managers) || [];
            if (!managers.length) {
                document.getElementById('emptyMsg').hidden = false;
                return;
            }
            // Most decorated first within each group.
            managers.sort(function (a, b) {
                return (b.championships - a.championships) || (b.win_pct - a.win_pct) || a.name.localeCompare(b.name);
            });
            var current = managers.filter(function (m) { return m.is_current; });
            var alumni = managers.filter(function (m) { return !m.is_current; });

            document.getElementById('mgCount').textContent =
                current.length + ' active' + (alumni.length ? ' · ' + alumni.length + ' alumni' : '');

            if (current.length) {
                document.getElementById('currentSection').hidden = false;
                document.getElementById('currentList').innerHTML = current.map(row).join('');
            }
            if (alumni.length) {
                document.getElementById('alumniSection').hidden = false;
                document.getElementById('alumniList').innerHTML = alumni.map(function (m) { return row(m, true); }).join('');
            }
        });

    function row(m, isAlumni) {
        var initial = (m.name || '?').trim().charAt(0).toUpperCase();
        // Real team avatar from the platform when the export has one;
        // the initial underneath is the fallback if the image 404s.
        var img = m.avatar
            ? '<img src="' + esc(m.avatar) + '" alt="" loading="lazy" onerror="this.remove()">'
            : '';
        var rings = m.championships ? '<span class="mg-rings">' + '✦'.repeat(Math.min(m.championships, 4)) + '</span>' : '';
        var tenure = m.seasons_played + (m.seasons_played === 1 ? ' season' : ' seasons');
        return '<a class="mg-ticket' + (m.championships ? ' is-champ' : '') + (isAlumni ? ' mg-alumni' : '') + '" href="managers/manager.html?id=' + encodeURIComponent(m.user_id) + '">' +
            '<span class="mg-stub"><span class="mg-ava">' + esc(initial) + img + '</span></span>' +
            '<span class="mg-body">' +
                '<span class="mg-name">' + esc(m.name) + '<small>' + esc(m.team_latest || '') + ' · ' + tenure + '</small></span>' +
                rings +
                '<span class="mg-rec">' + esc(m.total_record) + '<small>' + (m.win_pct * 100).toFixed(0) + '% win</small></span>' +
            '</span>' +
        '</a>';
    }
})();
</script>
</body>
</html>
